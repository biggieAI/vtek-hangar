  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;background:#121418;overflow:hidden}
    body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:80px;background:#121418;z-index:0}

      /* iOS SCROLL LOCK — body never moves, only main scrolls */
      html {
        height: 100%; overflow: hidden;
        position: fixed; width: 100%;
      }
      body {
        height: 100%; overflow: hidden;
        position: fixed; width: 100%;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
        touch-action: none;
      }

      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;700;900&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      .vtek-app-shell {
        width: 100%; max-width: 430px; height: 100dvh;
        margin: 0 auto; background-color: #121418;
        display: flex; flex-direction: column;
        position: relative; overflow: visible;
        font-family: 'Inter', sans-serif;
        color: #e2e8f0; font-weight: 900; text-transform: uppercase;
      }

      /* NEUMORPHIC */
      .nm-raised       { box-shadow: 10px 10px 20px rgba(0,0,0,0.65), -4px -4px 12px rgba(255,255,255,0.03); }
      .nm-inset        { box-shadow: inset 8px 8px 16px rgba(0,0,0,0.7), inset -2px -2px 8px rgba(255,255,255,0.02); }
      .nm-inset-tight  { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.7), inset -1px -1px 4px rgba(255,255,255,0.02); }
      .nm-raised-purple{ box-shadow: 10px 10px 20px rgba(0,0,0,0.65), -4px -4px 12px rgba(255,255,255,0.03), inset 0 0 0 1px rgba(124,58,237,0.08); }

      /* HEADER */
      header {
        flex-shrink: 0;
        padding-top: calc(env(safe-area-inset-top) + 20px);
        padding-left: 24px; padding-right: 24px; padding-bottom: 28px;
        background: #121418; z-index: 100;
        position: relative; display: flex;
        justify-content: space-between; align-items: center;
        box-shadow: none;
      }
      header::after {
        content: ''; position: absolute; bottom: 0; left: 50%;
        transform: translateX(-50%); width: 90%; height: 1px;
        background: radial-gradient(circle, #7c3aed 0%, rgba(124,58,237,0) 80%);
        box-shadow: 0 5px 25px rgba(124,58,237,0.35);
      }
      .vtek-logo { font-weight: 100; letter-spacing: 1.2em; font-size: 0.75rem; line-height: 1; margin-right: -1.2em; color: #e2e8f0; }
      .vtek-sub  { font-size: 0.45rem; letter-spacing: 0.3em; color: rgba(255,255,255,0.4); margin-top: 6px; font-weight: 200; }

      /* MAIN SCROLL AREA */
      main {
        flex-grow: 1; overflow-y: auto; overflow-x: hidden;
        padding: 36px 16px 140px; min-height: 0;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        overscroll-behavior-y: contain;
      }
      main::-webkit-scrollbar { width: 0; }

      /* NAV */
      nav {
        flex-shrink: 0; padding: 10px 16px calc(20px + env(safe-area-inset-bottom));
        background: #121418; border-top: 1px solid rgba(255,255,255,0.04);
        z-index: 50; display: flex; justify-content: space-between;
        align-items: flex-end; position: relative; overflow: hidden;
      }

      /* CARDS */
      .vtek-card {
        background: #121418; border-radius: 10px;
        border-left: 4px solid #7c3aed;
        box-shadow: 12px 12px 24px rgba(0,0,0,0.65), 0 0 50px rgba(124,58,237,0.12);
        transition: transform 0.15s;
      }

// ─── CLAUDE API ───────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  return data.content?.find(b => b.type === 'text')?.text || 'SIGNAL LOST.';
}

async function parseVoiceIntent(transcript, shows) {
  const raw = await callClaude(`Parse this VFX voice command into JSON only. No markdown, no backticks.
Schema: {"action":"ADD_TASK|NAV","page":"hub|tasks|shows|ops|intel","title":"","project":"","assignedTo":"UNASSIGNED","pri":"LOW|MED|HIGH|CRITICAL","date":"TODAY|TOMORROW|THIS WEEK"}
Defaults: action=ADD_TASK, pri=MED, date=TODAY, assignedTo=UNASSIGNED
Active shows: ${shows.map(s => s.code).join(', ')}
Input: "${transcript}"`);
  return JSON.parse(raw.trim());
}

// Copy-to-clipboard button with float toast
function CopyBtn({ value, label }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(value).catch(() => {
      const el = document.createElement('textarea');
      el.value = value; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    });
    setCopied(true);
    setTimeout(() => setCopied(false), 1200);
  };
  return (
    <div style={{ position:'relative', display:'inline-flex' }}>
      {copied && <span className="copy-toast">✓ COPIED</span>}
      <button onClick={copy} title={`Copy ${label||value}`} style={{
        background:'none', padding:'2px 4px', borderRadius:4,
        color: copied ? '#34d399' : 'rgba(255,255,255,0.2)',
        fontSize:10, display:'flex', alignItems:'center', transition:'color .2s',
      }}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {copied
            ? <polyline points="20,6 9,17 4,12"/>

        </svg>
      </button>
    </div>
  );
}

// ─── FOCUS MODE ──────────────────────────────────────────────────────────────
function FocusMode({ task, onClose, onLogTime }) {
  const [running, setRunning]   = useState(false);
  const [elapsed, setElapsed]   = useState(0); // ms
  const [finished, setFinished] = useState(false);
  const intervalRef = useRef(null);
  const startRef    = useRef(null);

  const start = () => {
    startRef.current = Date.now() - elapsed;
    intervalRef.current = setInterval(() => {
      setElapsed(Date.now() - startRef.current);
    }, 87); // ~11fps, smooth enough
    setRunning(true);
  };

  const pause = () => {
    clearInterval(intervalRef.current);
    setRunning(false);
  };

  const stop = () => {
    clearInterval(intervalRef.current);
    setRunning(false);
    setFinished(true);
  };

  useEffect(() => () => clearInterval(intervalRef.current), []);

  const fmt = (ms) => {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  };

  const priColor = { CRITICAL:'#ff3b3b', HIGH:'#ff9d00', MED:'#7c3aed', LOW:'rgba(255,255,255,0.3)' };

  return (
    <div className="focus-shell">
      {/* Ambient pulse when running */}
      {running && (
        <div style={{ position:'absolute', inset:0, background:`radial-gradient(circle at center, ${priColor[task.pri]||'#7c3aed'}12 0%, transparent 60%)`, animation:'vtek-breath 3s ease-in-out infinite', pointerEvents:'none' }} />
      )}

      {/* Close */}
      <button onClick={onClose} style={{ position:'fixed', top:'calc(env(safe-area-inset-top) + 16px)', right:24, color:'rgba(255,255,255,0.25)', zIndex:10, padding:8 }}>
        <Icons.X size={22} />
      </button>

      {/* Task info */}
      <div style={{ textAlign:'center', marginBottom:48, maxWidth:300 }}>
        <div style={{ fontSize:8, fontWeight:900, letterSpacing:'0.5em', color:'rgba(255,255,255,0.2)', textTransform:'uppercase', marginBottom:16 }}>FOCUS MODE</div>
        <div style={{ fontSize:16, fontWeight:900, color:'#fff', lineHeight:1.3, letterSpacing:'0.02em' }}>{task.title}</div>
        <div style={{ display:'flex', gap:8, justifyContent:'center', marginTop:12, flexWrap:'wrap' }}>
          <span style={{ fontSize:8, padding:'3px 10px', borderRadius:4, background:`${priColor[task.pri]||'#7c3aed'}22`, border:`1px solid ${priColor[task.pri]||'#7c3aed'}44`, color:priColor[task.pri]||'#7c3aed', letterSpacing:'0.2em', fontWeight:900 }}>{task.pri}</span>
          <span style={{ fontSize:8, padding:'3px 10px', borderRadius:4, background:'rgba(124,58,237,0.1)', border:'1px solid rgba(124,58,237,0.3)', color:'rgba(124,58,237,0.8)', letterSpacing:'0.2em', fontWeight:900 }}>{task.project}</span>
        </div>
      </div>

      {/* Stopwatch */}
      <div style={{ textAlign:'center', marginBottom:56 }}>
        <div style={{ fontSize:finished ? 56 : 64, fontWeight:100, color: running ? '#fff' : 'rgba(255,255,255,0.5)', letterSpacing:'-0.04em', lineHeight:1, fontFamily:'Inter,sans-serif', transition:'color .3s', fontVariantNumeric:'tabular-nums' }}>
          {fmt(elapsed)}
        </div>
        {task.timeLogged > 0 && (
          <div style={{ fontSize:9, color:'rgba(255,255,255,0.2)', letterSpacing:'0.3em', marginTop:12 }}>
            PREV: {fmt(task.timeLogged * 1000)}
          </div>
        )}
      </div>

      {/* Controls */}
      {!finished ? (
        <div style={{ display:'flex', gap:20, alignItems:'center' }}>
          {elapsed > 0 && !running && (
            <button onClick={() => { setElapsed(0); setRunning(false); }} style={{ width:52, height:52, borderRadius:'50%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.4)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, letterSpacing:'0.2em', fontWeight:900 }}>RESET</button>
          )}
          <button onClick={running ? pause : start}
            style={{ width:80, height:80, borderRadius:'50%', background: running ? 'rgba(255,157,0,0.15)' : 'rgba(52,211,153,0.15)', border:`2px solid ${running ? '#ff9d00' : '#34d399'}`, color: running ? '#ff9d00' : '#34d399', display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, boxShadow:`0 0 30px ${running ? '#ff9d0044' : '#34d39944'}`, transition:'all .25s' }}>
            {running ? '⏸' : '▶'}
          </button>
          {elapsed > 0 && (
            <button onClick={stop} style={{ width:52, height:52, borderRadius:'50%', background:'rgba(255,59,59,0.1)', border:'1px solid rgba(255,59,59,0.4)', color:'#ff3b3b', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>■</button>
          )}
        </div>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16 }}>
          <div style={{ fontSize:11, color:'#34d399', letterSpacing:'0.3em', fontWeight:900 }}>SESSION COMPLETE</div>
          <div style={{ fontSize:9, color:'rgba(255,255,255,0.3)', letterSpacing:'0.2em' }}>Log {fmt(elapsed)} to this task?</div>
          <div style={{ display:'flex', gap:12 }}>
            <button onClick={onClose} style={{ padding:'12px 20px', borderRadius:8, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.4)', fontSize:9, fontWeight:900, letterSpacing:'0.25em' }}>DISCARD</button>
            <button onClick={() => { onLogTime(Math.round(elapsed/1000)); onClose(); }} style={{ padding:'12px 24px', borderRadius:8, background:'rgba(52,211,153,0.15)', border:'1px solid rgba(52,211,153,0.5)', color:'#34d399', fontSize:9, fontWeight:900, letterSpacing:'0.25em' }}>LOG TIME ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TASKS PAGE ───────────────────────────────────────────────────────────────
const PRI_COLOR = { CRITICAL:'#ff3b3b', HIGH:'#ff9d00', MED:'#7c3aed', LOW:'rgba(255,255,255,0.3)' };
const ALL_TAGS = ['comp','fx','roto','light','anim','nuke','review','delivery','pipeline','client','admin','sim','dev','ops'];

function TasksPage({ tasks, setTasks, openWizard, onFocus }) {
  const [copied,        setCopied]       = useState(false);
  const [activeTag,     setActiveTag]    = useState(null);
  const [completedOpen, setCompletedOpen]= useState(false);

  const syncToAkiflow = () => {
    const active = tasks.filter(t => !t.done);
    if (!active.length) return;
    const payload = active.map(t => `${t.title}||${t.desc||''}||${t.pri}||${t.assignedTo}`).join('&&');
    navigator.clipboard.writeText(payload).catch(() => {
      const el = document.createElement('textarea');
      el.value = payload; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    });
    setCopied(true); setTimeout(() => setCopied(false), 2500); triggerHaptic();
  };

  const completeDone  = (id) => setTasks(prev => prev.map(t => t.id===id ? {...t, done:true}  : t));
  const restoreTask   = (id) => setTasks(prev => prev.map(t => t.id===id ? {...t, done:false} : t));
  const deleteForever = (id) => setTasks(prev => prev.filter(t => t.id !== id));
  const logTime       = (id, secs) => setTasks(prev => prev.map(t => t.id===id ? {...t, timeLogged:(t.timeLogged||0)+secs} : t));

  const fmtTime = (secs) => {
    if (!secs) return null;
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  };

  const pending   = tasks.filter(t => !t.done && (!activeTag || (t.tags||[]).includes(activeTag)));
  const completed = tasks.filter(t =>  t.done);

  // Collect all tags actually used
  const usedTags = [...new Set(tasks.flatMap(t => t.tags||[]))].filter(Boolean);

  const TaskCard = ({ t }) => (
    <div className="vtek-card nm-raised" style={{ padding:'14px 16px', display:'flex', alignItems:'center', gap:14, borderLeft:`3px solid ${PRI_COLOR[t.pri]||'#7c3aed'}` }}>
      {/* Complete toggle */}
      <button onClick={() => completeDone(t.id)} style={{ width:30, height:30, borderRadius:'50%', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.2)', color:'rgba(52,211,153,0.5)', transition:'all .2s' }} title="Mark complete">
        <Icons.CheckCircle size={14} />
      </button>
      {/* Content */}
      <div style={{ flex:1, minWidth:0 }} onClick={() => onFocus(t)} >
        <div style={{ fontSize:11, color:'#fff', fontWeight:900, lineHeight:1.3 }}>{t.title}</div>
        <div style={{ fontSize:8, color:'rgba(255,255,255,0.4)', marginTop:4, fontWeight:400, textTransform:'none' }}>{t.assignedTo} · {t.project}</div>
        {/* Tags */}
        {(t.tags||[]).length > 0 && (
          <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:6 }}>
            {(t.tags||[]).map(tag => (
              <span key={tag} onClick={e => { e.stopPropagation(); setActiveTag(activeTag===tag?null:tag); }}
                style={{ fontSize:7, padding:'2px 6px', borderRadius:3, background: activeTag===tag ? 'rgba(124,58,237,0.3)' : 'rgba(255,255,255,0.06)', border:`1px solid ${activeTag===tag ? 'rgba(124,58,237,0.5)' : 'rgba(255,255,255,0.08)'}`, color: activeTag===tag ? '#7c3aed' : 'rgba(255,255,255,0.35)', letterSpacing:'0.15em', cursor:'pointer', fontWeight:900, textTransform:'uppercase' }}>
                {tag}
              </span>
            ))}
          </div>
        )}
        {/* Time logged */}
        {t.timeLogged > 0 && (
          <div style={{ fontSize:7, color:'rgba(124,58,237,0.6)', marginTop:5, letterSpacing:'0.2em', fontWeight:900 }}>⏱ {fmtTime(t.timeLogged)} LOGGED</div>
        )}
      </div>
      {/* Focus button */}
      <button onClick={() => onFocus(t)} style={{ flexShrink:0, width:32, height:32, borderRadius:8, background:'rgba(124,58,237,0.1)', border:'1px solid rgba(124,58,237,0.25)', display:'flex', alignItems:'center', justifyContent:'center', color:'rgba(124,58,237,0.7)' }} title="Focus mode">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M3 12h3M18 12h3M12 3v3M12 18v3"/></svg>
      </button>
    </div>
  );

  return (
    <div className="page-in" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <PageHeader title="Tasks" tag={`${pending.length} Active`} tagUnderline />

      {/* Akiflow Sync */}
      <div className="sync-block nm-inset">
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <span style={{ color:'#ff3b3b' }}><Icons.Refresh size={18} /></span>
          <div>
            <div style={{ fontSize:10, color:'#fff', letterSpacing:'0.15em', lineHeight:1 }}>AKIFLOW SYNC</div>
            <div style={{ fontSize:7, color:'rgba(255,255,255,0.35)', marginTop:4 }}>READY FOR EXPORT</div>
          </div>
        </div>
        <button onClick={syncToAkiflow} style={{ background: copied ? 'rgba(52,211,153,0.1)' : 'rgba(255,59,59,0.1)', border:`1px solid ${copied ? '#34d399' : 'rgba(255,59,59,0.3)'}`, padding:'8px 16px', borderRadius:6, fontSize:9, color: copied ? '#34d399' : '#ff3b3b', letterSpacing:'0.2em', transition:'all .2s' }}>
          {copied ? 'SYNCED' : 'SYNC'}
        </button>
      </div>

      {/* Tag filter pills */}
      {usedTags.length > 0 && (
        <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
          {activeTag && (
            <button onClick={() => setActiveTag(null)} style={{ fontSize:8, padding:'4px 10px', borderRadius:20, background:'rgba(255,59,59,0.1)', border:'1px solid rgba(255,59,59,0.3)', color:'#ff3b3b', fontWeight:900, letterSpacing:'0.15em' }}>✕ CLEAR</button>
          )}
          {usedTags.map(tag => (
            <button key={tag} onClick={() => setActiveTag(activeTag===tag?null:tag)}
              style={{ fontSize:8, padding:'4px 10px', borderRadius:20, fontWeight:900, letterSpacing:'0.15em', textTransform:'uppercase', background: activeTag===tag ? 'rgba(124,58,237,0.2)' : 'rgba(255,255,255,0.05)', border:`1px solid ${activeTag===tag ? 'rgba(124,58,237,0.5)' : 'rgba(255,255,255,0.08)'}`, color: activeTag===tag ? '#7c3aed' : 'rgba(255,255,255,0.35)', transition:'all .15s' }}>
              {tag}
            </button>
          ))}
        </div>
      )}

      {/* Active task sections */}
      {['TODAY','TOMORROW','THIS WEEK'].map(time => {
        const items = pending.filter(t => t.date === time && !t.done);
        if (!items.length) return null;
        return (
          <div key={time} style={{ display:'flex', flexDirection:'column', gap:8 }}>
            <div style={{ fontSize:8, fontWeight:900, color:'rgba(255,255,255,0.3)', letterSpacing:'0.35em', borderBottom:'1px solid rgba(255,255,255,0.05)', paddingBottom:7 }}>{time}</div>
            {items.map(t => <TaskCard key={t.id} t={t} />)}
          </div>
        );
      })}

      {pending.filter(t=>!t.done).length === 0 && (
        <div style={{ padding:'40px 0', textAlign:'center', fontSize:9, color:'rgba(255,255,255,0.15)', letterSpacing:'0.3em' }}>
          {activeTag ? `NO TASKS TAGGED '${activeTag.toUpperCase()}'` : 'ALL CLEAR'}
        </div>
      )}

      {/* Completed section */}
      {completed.length > 0 && (
        <div>
          <button onClick={() => setCompletedOpen(o=>!o)} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%', padding:'10px 0', background:'none', color:'rgba(255,255,255,0.3)', fontSize:8, letterSpacing:'0.35em', fontWeight:900, borderTop:'1px solid rgba(255,255,255,0.05)' }}>
            <span>COMPLETED — {completed.length}</span>
            <span style={{ fontSize:12, transition:'transform .2s', transform: completedOpen ? 'rotate(180deg)' : 'rotate(0deg)' }}>⌄</span>
          </button>
          {completedOpen && (
            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:8 }}>
              {completed.map(t => (
                <div key={t.id} className="vtek-card no-border" style={{ padding:'12px 16px', display:'flex', alignItems:'center', gap:12, opacity:0.45, filter:'grayscale(0.6)', borderLeft:'3px solid rgba(52,211,153,0.3)' }}>
                  <div style={{ width:22, height:22, borderRadius:'50%', background:'rgba(52,211,153,0.15)', border:'1px solid rgba(52,211,153,0.3)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="3" strokeLinecap="round"><polyline points="20,6 9,17 4,12"/></svg>
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:10, color:'rgba(255,255,255,0.6)', fontWeight:900, textDecoration:'line-through', textDecorationColor:'rgba(255,255,255,0.2)' }}>{t.title}</div>
                    {t.timeLogged > 0 && <div style={{ fontSize:7, color:'rgba(124,58,237,0.5)', marginTop:3, letterSpacing:'0.2em', fontWeight:900 }}>⏱ {fmtTime(t.timeLogged)}</div>}
                  </div>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={() => restoreTask(t.id)} style={{ fontSize:7, padding:'4px 8px', borderRadius:4, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.4)', fontWeight:900, letterSpacing:'0.15em' }}>RESTORE</button>
                    <button onClick={() => deleteForever(t.id)} style={{ fontSize:7, padding:'4px 8px', borderRadius:4, background:'rgba(255,59,59,0.06)', border:'1px solid rgba(255,59,59,0.2)', color:'rgba(255,59,59,0.5)', fontWeight:900, letterSpacing:'0.15em' }}>DELETE</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const ProfileRow = ({ label, value, accent, copyable=true }) => value ? (

    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>

function MemberProfile({ member, tasks, onBack, onRemove, onSave }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft]     = useState({...member});
  const assigned = tasks.filter(t => t.assignedTo === member.name && !t.done);
  const color    = memberColor(member.id);
  const initials = member.name.split(' ').map(w=>w[0]).join('').substring(0,2);

  const set = (k,v) => setDraft(d => ({...d, [k]:v}));
  const save = () => { onSave(draft); setEditing(false); };

  // Editable text field
  const EF = ({ label, k, multi, placeholder }) => (
    <div className="edit-field">
      <label>{label}</label>
      {multi
        ? <textarea rows={3} value={draft[k]||''} onChange={e=>set(k,e.target.value)} placeholder={placeholder||''} style={{ fontFamily:'Inter,sans-serif' }} />
        : <input   type="text"  value={draft[k]||''} onChange={e=>set(k,e.target.value)} placeholder={placeholder||''} />}
    </div>
  );
  // Chip selector field
  const CF = ({ label, k, options }) => (
    <div style={{ display:'flex', flexDirection:'column', gap:6, paddingBottom:12, borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
      <label style={{ fontSize:7, fontWeight:900, letterSpacing:'0.35em', color:'rgba(255,255,255,0.38)', textTransform:'uppercase' }}>{label}</label>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        {options.map(o => (
          <button key={o} onClick={()=>set(k,o)} style={{ fontSize:9, padding:'4px 10px', borderRadius:6, fontWeight:900, letterSpacing:'0.15em', textTransform:'uppercase', background: draft[k]===o ? 'rgba(124,58,237,0.25)' : 'rgba(255,255,255,0.05)', border:`1px solid ${draft[k]===o ? '#7c3aed' : 'rgba(255,255,255,0.08)'}`, color: draft[k]===o ? '#7c3aed' : 'rgba(255,255,255,0.45)', transition:'all .15s' }}>
            {o}
          </button>
        ))}
      </div>
    </div>
  );

  return (
    <div className="page-in" style={{ display:'flex', flexDirection:'column', gap:0 }}>
      {/* Top bar */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:8, color:'rgba(255,255,255,0.35)', fontSize:10, letterSpacing:'0.15em' }}>
          <Icons.Back size={16} /> BACK
        </button>
        <div style={{ display:'flex', gap:10 }}>
          {editing
            ? <>
                <button onClick={()=>{setEditing(false);setDraft({...member});}} style={{ fontSize:8, fontWeight:900, letterSpacing:'0.25em', padding:'6px 14px', borderRadius:6, background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.4)' }}>CANCEL</button>
                <button onClick={save} style={{ fontSize:8, fontWeight:900, letterSpacing:'0.25em', padding:'6px 14px', borderRadius:6, background:'rgba(124,58,237,0.2)', border:'1px solid rgba(124,58,237,0.5)', color:'#7c3aed' }}>SAVE</button>
              </>
            : <>
                <button onClick={()=>setEditing(true)} style={{ fontSize:8, fontWeight:900, letterSpacing:'0.25em', padding:'6px 14px', borderRadius:6, background:'rgba(124,58,237,0.15)', border:'1px solid rgba(124,58,237,0.4)', color:'#7c3aed' }}>EDIT</button>
                <button onClick={onRemove} style={{ fontSize:8, fontWeight:900, letterSpacing:'0.25em', padding:'6px 14px', borderRadius:6, background:'rgba(255,59,59,0.08)', border:'1px solid rgba(255,59,59,0.3)', color:'#ff3b3b' }}>REMOVE</button>
              </>
          }
        </div>
      </div>

      {/* Avatar headline */}
      <div className="vtek-card nm-raised" style={{ padding:20, display:'flex', alignItems:'center', gap:18, marginBottom:16 }}>
        <div style={{ width:60, height:60, borderRadius:12, background:`${color}22`, border:`2px solid ${color}66`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:19, fontWeight:900, color, flexShrink:0 }}>{initials}</div>
        <div style={{ flex:1, minWidth:0 }}>
          {editing
            ? <input value={draft.name||''} onChange={e=>set('name',e.target.value)} style={{ fontSize:15, fontWeight:900, color:'#fff', background:'transparent', border:'none', outline:'none', borderBottom:'1px solid rgba(124,58,237,0.4)', width:'100%', paddingBottom:4, fontFamily:'Inter,sans-serif', textTransform:'none' }} />
            : <div style={{ fontSize:15, fontWeight:900, color:'#fff', marginBottom:6 }}>{member.name}</div>}
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center', marginTop:6 }}>
            <span style={{ fontSize:8, fontWeight:900, padding:'2px 8px', borderRadius:4, background:`${color}22`, border:`1px solid ${color}44`, color, letterSpacing:'0.2em' }}>{editing ? draft.role : member.role}</span>
            <span style={{ fontSize:8, fontWeight:900, padding:'2px 8px', borderRadius:4, background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'rgba(255,255,255,0.5)', letterSpacing:'0.2em' }}>{member.group}</span>
            {(editing ? draft.nda : member.nda) && <span style={{ fontSize:7, padding:'2px 6px', borderRadius:4, background:'rgba(52,211,153,0.1)', border:'1px solid rgba(52,211,153,0.3)', color:'#34d399', letterSpacing:'0.15em' }}>NDA ✓</span>}
          </div>
        </div>
        {!editing && <StatusDot status={member.status} size={10} />}
      </div>

      {editing ? (
        /* ── EDIT FORM ─────────────────────────────────── */
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <CF label="Status"       k="status"   options={['ONLINE','OFFLINE','DND']} />
          <CF label="Availability" k="avail"    options={['AVAILABLE NOW','FROM NEXT WEEK','BUSY — CHECK BACK','ON HOLD']} />
          <CF label="Discipline"   k="role"     options={['COMP','FX','TD','DIR','LIGHT','ROTO','ANIM','3D']} />

          <EF label="Email"        k="email"    placeholder="name@studio.com" />
          <EF label="Phone"        k="phone"    placeholder="+1 310 555 0000" />
          <EF label="Day Rate ($)" k="rate"     placeholder="800" />
          <EF label="Strengths"    k="strengths" placeholder="Nuke, keying, comp..." />
          <EF label="Growth Areas" k="weaknesses" placeholder="FX sims, 3D..." />
          <EF label="Credit As"   k="credit"   placeholder="Full name as credited" />
          <EF label="LinkedIn / Web" k="linkedin" placeholder="linkedin.com/in/..." />
          <EF label="Notes"        k="notes"    multi placeholder="Anything worth knowing..." />
          <div style={{ display:'flex', gap:10, paddingTop:8 }}>

  const F = ({ label, k, placeholder, multi }) => (
    <div className="edit-field">
      <label>{label}</label>
      {multi
        ? <textarea rows={3} value={data[k]||''} onChange={e=>set(k,e.target.value)} placeholder={placeholder||''} />
        : <input type="text" value={data[k]||''} onChange={e=>set(k,e.target.value)} placeholder={placeholder||''} />}

function TeamPage({ team, setTeam, tasks, selectedOp, setSelectedOp, openWizard }) {
  const [entryMode, setEntryMode] = useState(null);
  const [showManual, setShowManual] = useState(false);

  const removeTeamMember = (id) => {
    setTeam(prev => prev.filter(m => m.id !== id));
    setSelectedOp(null);
    triggerHaptic();
  };

  const saveMember = (updated) => {
    setTeam(prev => prev.map(m => m.id === updated.id ? updated : m));
    setSelectedOp(updated);
    triggerHaptic();
  };

  if (selectedOp) {
    return (
      <div className="page-in">
        <MemberProfile
          member={selectedOp}
          tasks={tasks}
          onBack={() => setSelectedOp(null)}
          onSave={saveMember}
          onRemove={() => removeTeamMember(selectedOp.id)}
        />
      </div>
    );
  }

  const staff     = team.filter(m => m.group === 'STAFF');
  const freelance = team.filter(m => m.group === 'FREELANCE');

  const MemberCard = ({ m }) => {
    const color = memberColor(m.id);

    return (
      <button onClick={() => { setSelectedOp(m); triggerHaptic(); }} className="vtek-card nm-raised"

          <div style={{ fontSize:11, color:'#fff', fontWeight:900, marginBottom:3 }}>{m.name}</div>
          <div style={{ fontSize:8, color:'rgba(255,255,255,0.45)', letterSpacing:'0.12em', textTransform:'none', fontWeight:400 }}>
            {m.role}{m.group==='FREELANCE' && m.rate ? ` · $${m.rate}/day` : ''}{m.timezone ? ` · ${m.timezone}` : ''}

        </div>
        {m.group==='FREELANCE' && m.avail && (
          <div style={{ fontSize:6, padding:'2px 7px', borderRadius:4, background:'rgba(52,211,153,0.1)', border:'1px solid rgba(52,211,153,0.25)', color:'#34d399', letterSpacing:'0.1em', textTransform:'uppercase', flexShrink:0 }}>
            {m.avail==='AVAILABLE NOW' ? 'AVAIL' : m.avail.replace('FROM ','↗')}

        + ADD MEMBER
      </button>

      {staff.length > 0 && (
        <div>
          <div style={{ fontSize:8, fontWeight:900, letterSpacing:'0.4em', color:'rgba(255,255,255,0.3)', textTransform:'uppercase', marginBottom:10, paddingBottom:6, borderBottom:'1px solid rgba(255,255,255,0.05)' }}>Staff — {staff.length}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>{staff.map(m => <MemberCard key={m.id} m={m} />)}</div>

      {freelance.length > 0 && (
        <div>
          <div style={{ fontSize:8, fontWeight:900, letterSpacing:'0.4em', color:'rgba(255,255,255,0.3)', textTransform:'uppercase', marginBottom:10, paddingBottom:6, borderBottom:'1px solid rgba(255,255,255,0.05)' }}>Freelance — {freelance.length}</div>

            </div>
          </div>
        </div>
      )}

      {/* Manual entry form */}
      {showManual && (
        <ManualMemberForm
          onClose={() => setShowManual(false)}
          onSave={(data) => {
            setTeam(prev => [...prev, { id:uid(), signal:85, rateType:'day', nda:false, credit:'', ...data }]);
            setShowManual(false);
          }}
        />
      )}
    </div>
  );
}

function IntelPage({ shows, tasks }) {
  const [stream, setStream] = useState(null); // null = index, string = result
  const [processing, setProcessing] = useState(false);
  const [query, setQuery] = useState('');

  const runWorkflow = async (wf) => {
    setStream(''); setProcessing(true);
    try { setStream(await callClaude(wf.buildPrompt(tasks, shows))); }
    catch { setStream('NEURAL LINK FAILURE. CHECK NETWORK.'); }
    setProcessing(false);
  };

  const runQuery = async () => {
    if (!query.trim()) return;
    setProcessing(true); setStream('');
    try { setStream(await callClaude(`VTEK INTEL — tactical AI for CBFX VFX production. Terse, ALL CAPS key terms, no markdown.\n\nQUERY: ${query}`)); }
    catch { setStream('SIGNAL LOST.'); }
    setProcessing(false);
    setQuery('');
  };

  if (stream !== null) return (
    <div className="page-in" style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <button onClick={() => { setStream(null); setProcessing(false); }} style={{ display:'flex', alignItems:'center', gap:8, color:'rgba(255,255,255,0.3)', fontSize:10, letterSpacing:'0.15em', alignSelf:'flex-start' }}>
        <Icons.Back size={16} /> BACK
      </button>

      <div className="intel-terminal">
        {processing && <div className="scan-line" />}
        <div style={{ fontSize:8, color:'#7c3aed', letterSpacing:'0.3em', marginBottom:14, paddingBottom:10, borderBottom:'1px solid rgba(255,255,255,0.04)' }}>✦ INTEL STREAM</div>
        <div style={{ fontSize:11, color:'#e2e8f0', lineHeight:1.8, whiteSpace:'pre-wrap', fontFamily:"'JetBrains Mono','Courier New',monospace", fontWeight:400, textTransform:'none' }}>
          {processing ? <span style={{ color:'#7c3aed', animation:'blink 1s infinite' }}>PROCESSING...</span> : stream || <span style={{ color:'rgba(255,255,255,0.2)' }}>// STREAM READY</span>}
        </div>
      </div>

      <div className="nm-inset" style={{ background:'#08080a', borderRadius:8, padding:'12px 16px', display:'flex', alignItems:'center', gap:12 }}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&runQuery()} placeholder="QUERY INTEL CORE..." style={{ flex:1, fontSize:11, color:'#e2e8f0', letterSpacing:'0.05em', textTransform:'none', fontWeight:400, fontFamily:"'JetBrains Mono',monospace" }} />
        <button onClick={runQuery} style={{ background:'#7c3aed', borderRadius:6, padding:'8px 14px', fontSize:9, color:'#fff', letterSpacing:'0.25em', flexShrink:0 }}>RUN</button>
      </div>
    </div>
  );

  return (
    <div className="page-in" style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <PageHeader title="Intel" tag="Go Flight" tagColor="#7c3aed" tagUnderline />

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        {INTEL_WF.map(wf => (
          <button key={wf.id} onClick={() => runWorkflow(wf)} className="vtek-card nm-raised" style={{ padding:16, display:'flex', flexDirection:'column', gap:12, textAlign:'left', opacity: processing ? 0.5 : 1 }}>
            <div className="nm-inset-tight" style={{ width:40, height:40, borderRadius:'50%', background:'#1c1f24', display:'flex', alignItems:'center', justifyContent:'center', color:'#7c3aed' }}>
              <wf.Icon size={14} />
            </div>
            <div style={{ fontSize:10, color:'#fff', letterSpacing:'0.15em' }}>{wf.label}</div>
          </button>
        ))}
      </div>

      {/* Circleback */}
      <button onClick={() => window.open('circleback://','_blank')} className="vtek-card nm-raised" style={{ padding:16, display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%', textAlign:'left' }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div className="nm-inset-tight" style={{ width:40, height:40, borderRadius:'50%', background:'#1c1f24', display:'flex', alignItems:'center', justifyContent:'center', color:'#7c3aed' }}>
            <Icons.Mic2 size={18} />
          </div>
          <div>
            <div style={{ fontSize:12, color:'#fff', letterSpacing:'0.15em' }}>Record Session</div>
            <div style={{ fontSize:7, color:'rgba(255,255,255,0.3)', marginTop:4 }}>Launch Circleback</div>
          </div>
        </div>
        <span style={{ color:'rgba(255,255,255,0.15)', fontSize:14 }}><Icons.ExtLink size={14} /></span>
      </button>
    </div>
  );
}

      steps: [
        { key:'status',    q:'Status',           type:'chips', options:['ONLINE','OFFLINE','DND'] },
        { key:'avail',     q:'Availability',     type:'chips', options:['AVAILABLE NOW','FROM NEXT WEEK','BUSY — CHECK BACK','ON HOLD'] },
        { key:'rate',      q:'Day Rate (USD)',   type:'text',  placeholder:'E.G. 800' },
        { key:'email',     q:'Email',            type:'text',  placeholder:'NAME@STUDIO.COM' },
        { key:'phone',     q:'Phone',            type:'text',  placeholder:'+1 310 555 0000' },
        { key:'strengths', q:'Strengths',        type:'text',  placeholder:'E.G. NUKE, KEYING, COMP' },
        { key:'weaknesses',q:'Growth Areas',     type:'text',  placeholder:'E.G. FX SIMS' },
        { key:'notes',     q:'Notes',            type:'text',  placeholder:'ANYTHING WORTH KNOWING...' },
      ],
    },
  }), [shows, team]);

  const config = WIZARD_CONFIG[wizard.type];
  const curStep = config.steps[wizard.step];

  const handleNext = (val) => {
    const cur = config.steps[wizard.step];
    const actualVal = val !== undefined ? val : wizInput;
    // Multi-select: toggle value in array
    if (cur.multi) {
      const existing = wizard.data[cur.key] || [];
      const toggled = existing.includes(val) ? existing.filter(v => v !== val) : [...existing, val];
      setWizard(w => ({ ...w, data: { ...w.data, [cur.key]: toggled } }));
      return;
    }
    // Text step with no value AND not a skip — block
    if (!actualVal && cur.type === 'text' && val !== '') return;
    const newData = { ...wizard.data, [cur.key]: actualVal };
    setWizInput('');
    if (wizard.step < config.steps.length - 1) {
      setWizard(w => ({ ...w, step: w.step + 1, data: newData }));
    } else {
      onCommit(wizard.type, newData);
      setWizard(w => ({ ...w, isOpen: false }));
    }
  };

  const commitMulti = () => {
    const cur = config.steps[wizard.step];
    const newData = { ...wizard.data };
    if (!newData[cur.key]) newData[cur.key] = [];
    setWizInput('');
    if (wizard.step < config.steps.length - 1) {
      setWizard(w => ({ ...w, step: w.step + 1, data: newData }));
    } else {
      onCommit(wizard.type, newData);
      setWizard(w => ({ ...w, isOpen: false }));
    }
  };

  return (
    <div className="wizard-shell">
      {/* Purple ambient */}
      <div style={{ position:'absolute', inset:0, opacity:0.25, pointerEvents:'none', boxShadow:'inset 0 0 120px rgba(124,58,237,0.15)' }} />

      {/* Fixed top bar — always visible above keyboard */}
      <div style={{ position:'fixed', top:0, left:0, right:0, maxWidth:430, margin:'0 auto', zIndex:1010, display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:'calc(env(safe-area-inset-top) + 16px)', paddingLeft:24, paddingRight:24, paddingBottom:14, background:'#121418' }}>
        <div>
          <span style={{ fontWeight:100, letterSpacing:'1.2em', fontSize:'0.75rem', color:'rgba(255,255,255,0.12)' }}>VTEK</span>
          {/* Step progress dots */}
          <div style={{ display:'flex', gap:4, marginTop:8 }}>
            {config.steps.map((_,i) => (
              <div key={i} style={{ width: i===wizard.step?18:5, height:3, borderRadius:2, background: i<=wizard.step ? '#7c3aed' : 'rgba(255,255,255,0.1)', transition:'all .3s', boxShadow: i===wizard.step ? '0 0 6px #7c3aed' : 'none' }} />
            ))}
          </div>
        </div>
        <button onClick={() => setWizard(w => ({ ...w, isOpen: false }))} style={{ color:'rgba(255,255,255,0.4)', padding:8, margin:-8 }}>
          <Icons.X size={24} />
        </button>
      </div>

      {/* Question block — anchored from top, scrolls with content */}
      <div style={{ position:'relative', zIndex:10, paddingTop:'calc(env(safe-area-inset-top) + 90px)', padding:'calc(env(safe-area-inset-top) + 90px) 28px 28px' }}>
        <div key={`q-${wizard.step}`} className="wiz-step">
          {/* Step label */}
          <div style={{ fontSize:8, fontWeight:900, letterSpacing:'0.4em', color:'rgba(255,255,255,0.35)', textTransform:'uppercase', marginBottom:14 }}>
            {config.title} &nbsp;·&nbsp; Step {wizard.step+1} of {config.steps.length}
          </div>

          {/* Question */}
          <h2 style={{ fontSize:26, fontWeight:900, color:'#fff', lineHeight:1.15, marginBottom:10, letterSpacing:'-0.01em' }}>
            {curStep.q}
          </h2>
          {/* Purple underline */}
          <div style={{ width:40, height:3, background:'#7c3aed', borderRadius:2, marginBottom:32, boxShadow:'0 0 10px rgba(124,58,237,0.7)' }} />

          {curStep.type === 'text' ? (
            <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
              <input
                autoFocus
                key={`${wizard.type}-${wizard.step}`}
                style={{
                  fontSize:22, width:'100%', caretColor:'#7c3aed',
                  color:'#e2e8f0', fontFamily:'Inter,sans-serif',
                  textTransform:'none', fontWeight:300, letterSpacing:'0.01em',
                  background:'transparent', border:'none', outline:'none',
                  borderBottom:'2px solid rgba(124,58,237,0.35)',
                  paddingBottom:14, paddingTop:4,
                }}
                value={wizInput}
                onChange={e => setWizInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && wizInput && handleNext()}
                placeholder={curStep.placeholder}
              />
              <button
                onClick={() => handleNext()}
                disabled={!wizInput}
                style={{ background:'rgba(124,58,237,0.15)', border:'1px solid rgba(124,58,237,0.5)', width:'100%', padding:'18px 0', borderRadius:10, fontSize:11, letterSpacing:'0.3em', color:'#7c3aed', transition:'all .2s', opacity: wizInput ? 1 : 0.35 }}>
                {wizard.step === config.steps.length-1 ? 'COMMIT ✓' : 'CONTINUE →'}
              </button>
              {wizard.step > 0 && (
                <button onClick={() => handleNext('')} style={{ background:'none', color:'rgba(255,255,255,0.2)', fontSize:9, letterSpacing:'0.3em', textTransform:'uppercase', fontWeight:900 }}>SKIP</button>
              )}

            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {curStep.options.map(opt => {
                  const sel = curStep.multi ? (wizard.data[curStep.key]||[]).includes(opt) : false;
                  return (
                    <button key={opt} onClick={() => handleNext(opt)}
                      style={{ padding:'18px 12px', borderRadius:10, background: sel ? 'rgba(124,58,237,0.2)' : '#1c1f24', boxShadow:'8px 8px 16px rgba(0,0,0,0.6)', border:`1px solid ${sel ? 'rgba(124,58,237,0.6)' : 'rgba(255,255,255,0.07)'}`, fontSize:10, letterSpacing:'0.12em', color: sel ? '#7c3aed' : 'rgba(255,255,255,0.75)', textTransform:'uppercase', fontWeight:900, transition:'all .15s' }}>
                      {opt}

                  {(wizard.data[curStep.key]||[]).length > 0 ? `DONE · ${(wizard.data[curStep.key]||[]).length} SELECTED` : 'SKIP'}

              ) : wizard.step > 0 && (

          )}
        </div>
      </div>
    </div>
  );

// ─── VOICE MODAL ──────────────────────────────────────────────────────────────
const NUM_BARS = 12;

function VoiceModal({ onClose, onResult, shows }) {
  const [status, setStatus]     = useState('idle');
  const [transcript, setTranscript] = useState('');
  const [bars, setBars]         = useState(Array(NUM_BARS).fill(4));
  const [parsed, setParsed]     = useState(null);

  const recRef      = useRef(null);
  const audioCtxRef = useRef(null);
  const analyserRef = useRef(null);
  const streamRef   = useRef(null);
  const animRef     = useRef(null);

  const stopAudio = useCallback(() => {
    cancelAnimationFrame(animRef.current);
    try { analyserRef.current?.disconnect(); audioCtxRef.current?.close(); } catch {}
    streamRef.current?.getTracks().forEach(t => t.stop());
    setBars(Array(NUM_BARS).fill(4));
  }, []);

  // Idle breathe
  useEffect(() => {
    if (status !== 'idle') return;
    let f;
    const loop = () => { setBars(Array(NUM_BARS).fill(0).map((_,i) => 4 + Math.round(Math.abs(Math.sin(Date.now()/700 + i*0.6)) * 10))); f = requestAnimationFrame(loop); };
    f = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(f);
  }, [status]);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR(); rec.continuous = false; rec.interimResults = true;
    rec.onresult = e => setTranscript(Array.from(e.results).map(r => r[0].transcript).join(''));
    rec.onend = () => { stopAudio(); setStatus(p => p === 'listening' ? 'idle' : p); };
    recRef.current = rec;
    return () => { recRef.current?.abort(); stopAudio(); };
  }, [stopAudio]);

  const startListening = async () => {
    setTranscript(''); setParsed(null); setStatus('listening');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      streamRef.current = stream;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const analyser = ctx.createAnalyser(); analyser.fftSize = 64;
      ctx.createMediaStreamSource(stream).connect(analyser);
      audioCtxRef.current = ctx; analyserRef.current = analyser;
      const buf = new Uint8Array(analyser.frequencyBinCount);
      const loop = () => {
        analyser.getByteFrequencyData(buf);
        setBars(Array.from({length:NUM_BARS}, (_,i) => Math.max(4, Math.round((buf[Math.floor(i*buf.length/NUM_BARS)]||0)/255*56))));
        animRef.current = requestAnimationFrame(loop);
      };
      animRef.current = requestAnimationFrame(loop);
      recRef.current?.start();
    } catch { setStatus('error'); }
  };

  const stopListening = () => { recRef.current?.stop(); stopAudio(); setStatus('idle'); };

  const process = async () => {
    if (!transcript.trim()) return;
    setStatus('processing');
    try { const p = await parseVoiceIntent(transcript, shows); setParsed(p); setStatus('done'); }
    catch { setStatus('error'); }
  };

  const commit = () => { if (parsed) onResult(parsed); onClose(); };

  const barColor = status === 'listening' ? '#ff3b3b' : status === 'done' ? '#10b981' : '#7c3aed';

  return (
    <div style={{ position:'fixed', inset:0, zIndex:2000, background:'rgba(0,0,0,0.95)', backdropFilter:'blur(20px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:28, fontFamily:"'Inter',sans-serif" }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:7, fontWeight:900, letterSpacing:'0.5em', color:'rgba(255,255,255,0.2)', textTransform:'uppercase' }}>GO FLIGHT</div>
        <div style={{ fontSize:8, fontWeight:900, letterSpacing:'0.3em', color:barColor, textTransform:'uppercase', marginTop:6, animation: status==='listening' ? 'blink 1.4s infinite' : 'none' }}>
          {status==='idle' && '— STANDBY —'}{status==='listening' && '● RECORDING'}{status==='processing' && '⟳ PARSING'}{status==='done' && '✓ INTENT LOCKED'}{status==='error' && '✗ LINK FAILURE'}
        </div>
      </div>

      {/* Real waveform */}
      <div style={{ display:'flex', alignItems:'center', gap:4, height:64 }}>
        {bars.map((h,i) => (
          <div key={i} style={{ width:4, height:h, borderRadius:2, background:barColor, boxShadow: status==='listening' ? `0 0 6px ${barColor}` : 'none', transition:'height 0.07s linear, background 0.3s', opacity: status==='idle' ? 0.22 : 0.9 }} />
        ))}
      </div>

      {transcript && <div style={{ maxWidth:300, textAlign:'center', fontSize:14, fontWeight:200, color:'#e2e8f0', lineHeight:1.7, letterSpacing:'0.04em', textTransform:'none' }}>{transcript}</div>}

      {parsed && status === 'done' && (
        <div style={{ background:'#08080a', borderRadius:8, padding:'14px 18px', maxWidth:300, width:'100%', boxShadow:'inset 6px 6px 14px rgba(0,0,0,0.85)' }}>
          <div style={{ fontSize:7, fontWeight:900, letterSpacing:'0.3em', color:'#10b981', textTransform:'uppercase', marginBottom:8 }}>✓ PARSED</div>
          {Object.entries(parsed).filter(([k,v]) => v && k !== 'action').map(([k,v]) => (
            <div key={k} style={{ display:'flex', gap:10, fontSize:10, marginBottom:4 }}>
              <span style={{ fontSize:7, fontWeight:900, letterSpacing:'0.2em', color:'rgba(255,255,255,0.2)', textTransform:'uppercase', minWidth:60 }}>{k}</span>
              <span style={{ color:'#e2e8f0', fontWeight:400, textTransform:'none' }}>{v}</span>
            </div>
          ))}
        </div>
      )}

      <div style={{ display:'flex', gap:16, alignItems:'center' }}>
        <button onClick={onClose} style={{ padding:'12px 20px', borderRadius:8, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', color:'rgba(255,255,255,0.4)', fontSize:10, fontWeight:900, letterSpacing:'0.25em', textTransform:'uppercase' }}>ABORT</button>
        {status !== 'done' && (
          <button onClick={status==='listening' ? stopListening : startListening} style={{ width:72, height:72, borderRadius:'50%', background: status==='listening' ? '#ff3b3b' : '#7c3aed', fontSize:24, boxShadow:`0 0 28px ${status==='listening' ? '#ff3b3b' : '#7c3aed'}88`, transition:'all .25s', display:'flex', alignItems:'center', justifyContent:'center' }}>
            {status==='listening' ? '⏹' : '🎙'}
          </button>
        )}
        {status==='idle' && transcript && <button onClick={process} style={{ padding:'12px 20px', borderRadius:8, background:'rgba(124,58,237,0.15)', border:'1px solid rgba(124,58,237,0.4)', color:'#7c3aed', fontSize:10, fontWeight:900, letterSpacing:'0.25em', textTransform:'uppercase' }}>PARSE</button>}
        {status==='done' && <button onClick={commit} style={{ padding:'12px 24px', borderRadius:8, background:'#10b981', color:'#000', fontSize:10, fontWeight:900, letterSpacing:'0.25em', textTransform:'uppercase' }}>COMMIT</button>}
      </div>
    </div>
  );
}

              width:44, height:44, borderRadius:'50%', background:'#1c1f24',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow: voiceOpen ? '0 0 16px rgba(255,59,59,0.35), 10px 10px 20px rgba(0,0,0,0.65), -4px -4px 12px rgba(255,255,255,0.03)' : undefined,
              transition:'all .2s',
            }}>
            <Icons.Mic size={18} active={voiceOpen} />
          </button>
          <button
            onClick={() => {
              setReloading(true);
              setTimeout(() => window.location.reload(), 500);
            }}
            className="nm-raised"
            style={{
              width:44, height:44, borderRadius:'50%', background:'#1c1f24',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all .2s',
            }}>
            <span className={reloading ? 'spin' : ''} style={{ display:'flex' }}>
              <Icons.Refresh size={16} color={reloading ? 'rgba(124,58,237,0.9)' : 'rgba(255,255,255,0.28)'} />
            </span>
          </button>
          <button
            onClick={canAdd ? handlePlus : undefined}
            className="nm-raised"
            style={{
              width:44, height:44, borderRadius:'50%', background:'#1c1f24',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow: canAdd
                ? '0 0 20px rgba(255,59,59,0.25), 10px 10px 20px rgba(0,0,0,0.65), -4px -4px 12px rgba(255,255,255,0.03)'
                : '10px 10px 20px rgba(0,0,0,0.65), -4px -4px 12px rgba(255,255,255,0.03)',
              cursor: canAdd ? 'pointer' : 'default',
              transition:'all .3s',
            }}>
            <Icons.Plus size={18} active={canAdd} />
          </button>
        </div>
      </header>

      {/* MAIN */}
      <main className="main-scroll">
        {activePage === 'hub'   && <HangarPage   tasks={tasks} shows={shows} openWizard={handlePlus} />}
        {activePage === 'shows' && <ShowsPage     shows={shows} shots={shots} selectedShow={selectedShow} setSelectedShow={setSelectedShow} matrixFilter={matrixFilter} setMatrixFilter={setMatrixFilter} openWizard={handlePlus} />}
        {activePage === 'tasks' && <TasksPage     tasks={tasks} setTasks={setTasks} openWizard={handlePlus} onFocus={setFocusTask} />}
        {activePage === 'ops'   && <TeamPage      team={team} setTeam={setTeam} tasks={tasks} selectedOp={selectedOp} setSelectedOp={setSelectedOp} openWizard={(type) => setWizard({ isOpen:true, type, step:0, data:{} })} />}
        {activePage === 'intel' && <IntelPage     shows={shows} tasks={tasks} />}
      </main>

      {/* PILL NAV — TASKS · SHOWS · [V HOME] · TEAM · INTEL */}
      <div className="bnav-wrap">
        <nav className="bnav">
          {NAV_LEFT.map(n => (
            <button key={n.id} className={`nb${activePage===n.id?' on':''}`} onClick={() => navigateTo(n.id)}>
              {sculpt(IP[n.iconKey], activePage===n.id)}
              <span className="nl">{n.label}</span>
            </button>
          ))}
          <button className={`nb-home${activePage==='hub'?' on':''}`} onClick={() => navigateTo('hub')}>
            <HomeIcon active={activePage==='hub'} />
          </button>
          {NAV_RIGHT.map(n => (
            <button key={n.id} className={`nb${activePage===n.id?' on':''}`} onClick={() => navigateTo(n.id)}>
              {sculpt(IP[n.iconKey], activePage===n.id)}
              <span className="nl">{n.label}</span>
            </button>
          ))}
        </nav>
      </div>

      {/* WIZARD */}
      {wizard.isOpen && (
        <Wizard wizard={wizard} setWizard={setWizard} shows={shows} team={team} onCommit={handleCommit} />
      )}

      {/* VOICE */}
      {voiceOpen && (
        <VoiceModal onClose={() => setVoiceOpen(false)} onResult={handleVoiceResult} shows={shows} />
      )}

      {/* FOCUS MODE — rendered at root to escape stacking context */}
      {focusTask && (
        <FocusMode
          task={focusTask}
          onClose={() => setFocusTask(null)}
          onLogTime={(secs) => logTime(focusTask.id, secs)}
        />
      )}
    </div>
  );
}

// iOS scroll lock — prevent body drag, allow only .main-scroll touchmove
document.addEventListener('touchmove', function(e) {
  // Walk up from target to see if we're inside the scrollable main
  let el = e.target;
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains('main-scroll')) return;
    el = el.parentElement;
  }
  e.preventDefault();
}, { passive: false });

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
