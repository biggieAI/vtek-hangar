<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VTEK // Vault</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1a1a1c;--s1:#1f1f21;--s2:#222224;--s3:#272729;--s4:#2e2e30;--s5:#353537;
  --t0:#ececee;--t1:#b0b0bc;--t2:#787882;--t3:#505058;
  --accent:rgba(244,247,250,0.92);--accent-hi:#f4f7fa;--teal:#21e1df;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --b1:1px solid rgba(255,255,255,0.07);--b2:1px solid rgba(255,255,255,0.10);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.4;overflow:hidden;height:100dvh;width:100vw;}
body{display:flex;flex-direction:column;height:100dvh;min-height:-webkit-fill-available;overflow:hidden;}

/* TOPBAR — single row, no wrap, fixed height */
.topbar{display:flex;align-items:center;gap:6px;padding:calc(var(--safe-t)+6px) 8px 6px;background:var(--s1);border-bottom:var(--b1);flex-shrink:0;touch-action:manipulation;position:relative;min-height:44px;}
.topbar::after{content:'';position:absolute;bottom:-1px;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,220,232,0.5) 50%,transparent);opacity:0.3;}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--teal);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;padding:8px;min-height:40px;min-width:44px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;flex-shrink:0;}
.back-btn svg,.back-btn span{pointer-events:none;}
.title{font-family:var(--mono);font-size:13px;font-weight:800;letter-spacing:0.08em;color:var(--accent-hi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.actions{margin-left:auto;display:flex;gap:4px;align-items:center;flex-shrink:0;}
.tb-btn{padding:6px 10px;background:var(--s3);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.05em;cursor:pointer;min-height:32px;border-radius:8px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.tb-btn.primary{background:#fff;color:#000;border-color:#fff;}

/* SECONDARY EDITOR BAR (row 2 in edit mode) */
.editor-bar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--s1);border-bottom:var(--b1);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;}
.editor-bar::-webkit-scrollbar{display:none;}
.editor-bar > *{flex-shrink:0;}

.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;display:flex;flex-direction:column;}
.main > #v-list{flex:1;min-height:0;}
.main > #v-edit{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
#v-edit > .editor-textarea,
#v-edit > .vault-preview,
#v-edit > .code-preview,
#v-edit > .checklist-view,
#v-edit > .snippet-view{flex:1;min-height:0;}

/* SEARCH BAR */
.vault-search{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s1);border-bottom:var(--b1);flex-shrink:0;}
.vault-search-in{flex:1;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;border-radius:8px;min-height:36px;}
.vault-search-in::placeholder{color:var(--t3);}
.vault-search-x{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px 8px;min-height:36px;min-width:36px;touch-action:manipulation;}
.vault-arch-toggle{background:var(--s3);border:var(--b2);color:var(--t2);font-family:var(--mono);font-size:9px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;letter-spacing:0.06em;min-height:32px;touch-action:manipulation;}
.vault-arch-toggle.on{background:rgba(33,225,223,0.12);color:var(--teal);border-color:rgba(33,225,223,0.3);}

/* VAULT LIST */
.vault-new-row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:var(--b1);touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.vault-new-row:active{background:var(--s2);}
.vault-new-icon{width:32px;height:32px;border-radius:8px;background:var(--s3);border:var(--b2);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t1);flex-shrink:0;}
.vault-new-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t1);letter-spacing:0.06em;}
.vault-list-section{padding-top:4px;}
.vault-list-sec-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);letter-spacing:0.12em;padding:14px 16px 6px;}
.vault-doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-top:var(--b1);touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.vault-doc-row:active,.vault-doc-row.on{background:var(--s2);}
.vault-doc-icon{width:32px;height:32px;border-radius:8px;background:var(--s3);border:var(--b2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);flex-shrink:0;}
.vault-doc-info{flex:1;min-width:0;}
.vault-doc-title{font-size:13px;font-weight:600;color:var(--t0);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vault-doc-meta{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vault-doc-chevron{color:var(--t3);font-size:12px;flex-shrink:0;}

/* EDITOR */
.editor-view{display:flex;flex-direction:column;flex:1;min-height:0;}
.editor-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:var(--b1);background:var(--s1);flex-shrink:0;}
.editor-back{background:none;border:none;color:var(--teal);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;padding:8px;cursor:pointer;touch-action:manipulation;}
.editor-title-in{width:100%;background:transparent;border:none;color:var(--t0);font-family:var(--sans);font-size:20px;font-weight:700;padding:14px 20px 4px;outline:none;letter-spacing:-0.01em;flex-shrink:0;flex-grow:0;flex-basis:auto;}
.editor-title-in::placeholder{color:var(--t3);}
.editor-save{background:#fff;color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:7px 14px;border-radius:8px;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}
.editor-del{background:none;border:var(--b2);color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:700;padding:7px 10px;border-radius:8px;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}
.editor-textarea{flex:1;width:100%;background:transparent;border:none;color:var(--t0);font-family:var(--sans);font-size:15px;line-height:1.6;padding:14px 20px;outline:none;resize:none;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Title — Obsidian-quiet, big-ish but no border */

/* TAG ROW */
.vault-tag-row{display:flex;gap:6px;padding:6px 20px 10px;flex-shrink:0;}
.vault-doc-tag{display:inline-block;padding:3px 8px;background:var(--s3);border:var(--b2);color:var(--t1);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;border-radius:4px;}

/* MODE TOGGLE */
.mode-toggle{display:flex;gap:0;background:var(--s2);border:var(--b2);border-radius:8px;overflow:hidden;margin-right:6px;flex-shrink:0;}
.mode-btn{padding:6px 10px;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;cursor:pointer;min-height:32px;min-width:44px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.mode-btn.on{background:var(--s4);color:var(--t0);}

/* PREVIEW */
.vault-preview{flex:1;width:100%;padding:14px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.7;}
.vault-preview h1{font-size:20px;font-weight:800;margin:12px 0 8px;color:var(--t0);letter-spacing:-0.01em;}
.vault-preview h2{font-size:17px;font-weight:700;margin:10px 0 6px;color:var(--t0);}
.vault-preview h3{font-size:14px;font-weight:700;margin:8px 0 4px;color:var(--t1);letter-spacing:0.02em;}
.vault-preview p{margin:6px 0;}
.vault-preview ul{margin:6px 0;padding-left:20px;}
.vault-preview li{margin:2px 0;}
.vault-preview hr{border:none;border-top:var(--b1);margin:14px 0;}
.vault-preview code{background:var(--s3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px;color:var(--teal);}
.vault-preview strong{color:var(--accent-hi);}
.vault-preview em{color:var(--t1);font-style:italic;}

/* TYPE PICKER in editor bar */
.type-picker{display:flex;gap:0;background:var(--s2);border:var(--b2);border-radius:8px;overflow:hidden;flex-shrink:0;}
.type-btn{padding:6px 9px;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.04em;cursor:pointer;min-height:32px;min-width:42px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.type-btn.on{background:var(--s4);color:var(--teal);}

/* DOC ROW - pinned + multi-tag indicator */
.vault-doc-row.pinned{border-left:2px solid var(--teal);}
.vault-doc-row-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.vault-doc-row-tag{display:inline-block;padding:1px 5px;background:var(--s4);border:1px solid rgba(255,255,255,0.06);color:var(--t2);font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.06em;border-radius:3px;}
.vault-doc-type-icon{display:inline-block;width:14px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;font-weight:800;}

/* TAG ROW (editor) - now multi */
.vault-tag-row{display:flex;gap:6px;padding:6px 20px 10px;flex-shrink:0;flex-wrap:wrap;align-items:center;flex-grow:0;}
.vault-tag-row .vault-doc-tag{cursor:pointer;touch-action:manipulation;}
.vault-tag-row .vault-doc-tag.show-tag{background:var(--s4);color:var(--accent-hi);}
.vault-tag-row .vault-doc-tag.user-tag{background:rgba(33,225,223,0.1);color:var(--teal);border-color:rgba(33,225,223,0.2);}
.vault-tag-row .tag-add{background:var(--s2);color:var(--t2);border:1px dashed rgba(255,255,255,0.15);cursor:pointer;min-height:20px;}

/* CODE MODE textarea */
.editor-textarea.code-mode{font-family:var(--mono);font-size:12.5px;line-height:1.55;letter-spacing:0;tab-size:2;white-space:pre;color:#d4d4d8;background:#0d0e13;border-top:1px solid #1a1c24;}
.editor-textarea.code-mode::placeholder{color:#3e4452;font-style:italic;}
.code-meta{display:flex;gap:10px;padding:6px 16px;background:#0d0e13;border-bottom:1px solid #1a1c24;flex-shrink:0;font-family:var(--mono);font-size:10px;color:#6b7280;}
.code-meta select{background:#1a1c24;color:#d4d4d8;border:1px solid #2a2d37;border-radius:4px;padding:2px 8px;font-family:var(--mono);font-size:10px;outline:none;}
.code-meta .code-copy{margin-left:auto;background:#1a1c24;border:1px solid #2a2d37;color:var(--teal);padding:3px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}

/* CODE PREVIEW syntax */
.code-preview{flex:1;overflow:auto;background:#0d0e13;padding:0;position:relative;}
.code-preview pre{margin:0;padding:14px 16px 14px 48px;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:#d4d4d8;white-space:pre;counter-reset:ln;}
.code-preview .ln{display:block;position:relative;}
.code-preview .ln::before{content:counter(ln);counter-increment:ln;position:absolute;left:-36px;width:28px;text-align:right;color:#3e4452;font-size:10px;user-select:none;}
.code-preview .k{color:#c586c0;}
.code-preview .s{color:#ce9178;}
.code-preview .n{color:#b5cea8;}
.code-preview .c{color:#6a9955;font-style:italic;}
.code-preview .f{color:#dcdcaa;}
.code-preview .t{color:#4ec9b0;}
.code-preview .p{color:#d4d4d8;}
.code-preview .copy-code-btn{position:absolute;top:8px;right:8px;background:#1a1c24;border:1px solid #2a2d37;color:var(--teal);padding:4px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;z-index:5;letter-spacing:0.06em;touch-action:manipulation;}

/* CHECKLIST */
.checklist-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0;}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:var(--b1);cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.chk-row:active{background:var(--s2);}
.chk-box{width:20px;height:20px;border:1.5px solid var(--t2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.12s;}
.chk-row.done .chk-box{background:var(--teal);border-color:var(--teal);}
.chk-row.done .chk-box::after{content:'✓';color:#000;font-weight:800;font-size:13px;}
.chk-text{flex:1;font-size:14px;line-height:1.4;color:var(--t0);}
.chk-row.done .chk-text{text-decoration:line-through;color:var(--t2);}
.chk-copy{background:none;border:none;color:var(--t3);font-family:var(--mono);font-size:9px;font-weight:700;padding:4px 6px;cursor:pointer;flex-shrink:0;letter-spacing:0.06em;}
.chk-copy:active{color:var(--teal);}
.chk-add-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:var(--b1);}
.chk-add-in{flex:1;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;border-radius:6px;min-height:36px;}
.chk-add-btn{background:var(--teal);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:8px 14px;border-radius:6px;cursor:pointer;letter-spacing:0.06em;min-height:36px;touch-action:manipulation;}

/* SNIPPET */
.snippet-view{flex:1;display:flex;flex-direction:column;min-height:0;}
.snippet-big-copy{background:var(--teal);color:#000;border:none;font-family:var(--mono);font-size:13px;font-weight:800;padding:14px;cursor:pointer;letter-spacing:0.12em;flex-shrink:0;touch-action:manipulation;}
.snippet-big-copy:active{background:#18c0be;}
.snippet-big-copy.copied{background:var(--s-app,#4ade80);}

/* SHEET (bottom-up) */
.v-sheet-wrap{position:fixed;inset:0;z-index:900;pointer-events:none;}
.v-sheet-ovl{position:absolute;inset:0;background:rgba(0,0,0,0.6);opacity:0;transition:opacity 0.2s;pointer-events:none;}
.v-sheet-wrap.open{pointer-events:auto;}
.v-sheet-wrap.open .v-sheet-ovl{opacity:1;pointer-events:auto;}
.v-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--s1);border-top:var(--b2);border-radius:14px 14px 0 0;max-height:72dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 28px calc(var(--safe-b)+28px);transform:translateY(100%);transition:transform 0.22s cubic-bezier(0.16,1,0.3,1);box-shadow:0 -8px 30px rgba(0,0,0,0.5);}
.v-sheet-wrap.open .v-sheet{transform:translateY(0);}
.v-sh-handle{width:36px;height:4px;background:var(--t3);border-radius:2px;margin:0 auto 14px;}
.v-sh-title{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t1);letter-spacing:0.1em;margin-bottom:4px;padding:6px 4px 10px;}
.v-sh-row{display:flex;align-items:center;gap:14px;padding:14px 4px;border-bottom:var(--b1);cursor:pointer;touch-action:manipulation;}
.v-sh-row:last-of-type{border-bottom:none;}
.v-sh-row:active{background:var(--s2);margin:0 -14px;padding-left:14px;padding-right:14px;border-radius:6px;}
.v-sh-row-lbl{flex:1;font-size:14px;color:var(--t0);}
.v-sh-row-chk{color:var(--teal);font-weight:800;font-size:16px;}
.v-sh-chip-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.v-sh-chip{padding:6px 10px;background:var(--s3);border:var(--b2);color:var(--t1);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;border-radius:6px;cursor:pointer;touch-action:manipulation;}
.v-sh-chip.on{background:rgba(33,225,223,0.15);color:var(--teal);border-color:rgba(33,225,223,0.3);}
.v-sh-chip .x{color:var(--t3);margin-left:4px;}
.v-sh-input{width:100%;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;border-radius:8px;min-height:40px;margin-bottom:10px;}
.v-sh-btn{width:100%;background:var(--s4);border:var(--b2);color:var(--t0);font-family:var(--mono);font-size:11px;font-weight:700;padding:12px;border-radius:8px;cursor:pointer;letter-spacing:0.08em;touch-action:manipulation;margin-top:6px;min-height:44px;}
.v-sh-btn.primary{background:var(--teal);color:#000;border-color:var(--teal);}
.v-sh-btn.danger{background:none;color:#f87171;border-color:#f87171;}

/* PIN button */
.pin-btn{background:none;border:var(--b2);color:var(--t2);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:6px;cursor:pointer;min-height:32px;min-width:32px;touch-action:manipulation;}
.pin-btn.on{color:var(--teal);border-color:rgba(33,225,223,0.3);}

/* ═══ WAVE 2: MD TOOLBAR ═══ */
.md-toolbar{display:flex;gap:3px;padding:6px 10px;background:var(--s1);border-top:var(--b1);border-bottom:var(--b1);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;}
.md-toolbar::-webkit-scrollbar{display:none;}
.md-tb-btn{background:var(--s3);border:var(--b2);color:var(--t1);font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 8px;border-radius:5px;cursor:pointer;min-width:34px;min-height:30px;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;user-select:none;letter-spacing:0.04em;}
.md-tb-btn:active{background:var(--s4);color:var(--teal);}
.md-tb-btn.b{font-weight:900;}
.md-tb-btn.i{font-style:italic;}
.md-tb-btn.mono{font-family:var(--mono);font-size:10px;}

/* WAVE 2: auto-link + tap-to-copy code in preview */
.vault-preview a,.code-preview a{color:var(--teal);text-decoration:underline;word-break:break-all;}
.md-code-block{position:relative;background:#0d0e13;border:1px solid #1a1c24;border-radius:6px;margin:10px 0;overflow:hidden;}
.md-code-block pre{margin:0;padding:12px 14px;padding-right:60px;font-family:var(--mono);font-size:12px;line-height:1.5;color:#d4d4d8;white-space:pre;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.md-code-block .copy-inline{position:absolute;top:6px;right:6px;background:#1a1c24;border:1px solid #2a2d37;color:var(--teal);padding:3px 8px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:700;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}

/* footer: word/char count */
.edit-footer{padding:2px 12px;background:var(--s1);border-top:var(--b1);font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.08em;display:flex;gap:12px;flex-shrink:0;height:18px;line-height:14px;align-items:center;}
.edit-footer.hide{display:none;}

/* ═══ WAVE 3: ATTACHMENTS ═══ */
.att-strip{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--s1);border-top:var(--b1);flex-shrink:0;touch-action:pan-x;}
.att-strip:empty{display:none;}
.att-item{position:relative;width:64px;height:64px;border-radius:6px;background:var(--s3);border:var(--b2);flex-shrink:0;overflow:hidden;cursor:pointer;touch-action:manipulation;}
.att-item img{width:100%;height:100%;object-fit:cover;}

<script>
'use strict';
const BUILD_ID='VTEK-VAULT-20260417-12';
const LS='vtek9';
let S=JSON.parse(localStorage.getItem(LS)||'null')||{shows:[],shots:[],tasks:[],vaultDocs:[],vaultTags:[]};
if(!S.vaultDocs)S.vaultDocs=[];
if(!S.vaultTags)S.vaultTags=[];

let activeId=null;
let mode='edit';                // 'edit' | 'preview'
let _lpTimer=null;               // long-press timer
let _lpTriggered=false;
let _activeAttIdx=-1;            // active attachment in viewer
let vaultSearchQ='';             // current search query
let showArchived=false;          // list toggle

// ═══ INDEXEDDB ATTACHMENTS ═══
const IDB_NAME='vtek_vault';
const IDB_STORE='att';
let _idb=null;
function idbOpen(){
  return new Promise((res,rej)=>{
    if(_idb){res(_idb);return;}
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbPut(rec){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(rec);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function idbGet(id){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readonly');
    const req=tx.objectStore(IDB_STORE).get(id);
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbDelete(id){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

function save(){localStorage.setItem(LS,JSON.stringify(S));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function dbg(m){const el=document.getElementById('dbg-log');el.textContent+=new Date().toTimeString().slice(0,8)+' '+m+'\n';}
window.addEventListener('error',e=>dbg('ERR:'+e.message));

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return escHtml(s).replace(/'/g,'&#39;');}
function gs(id){return (S.shows||[]).find(s=>s.id===id);}
function bytesHuman(b){if(b<1024)return b+' B';if(b<1024*1024)return (b/1024).toFixed(1)+' KB';return (b/1024/1024).toFixed(1)+' MB';}

// ── MIGRATION: add missing fields to old docs ──
S.vaultDocs.forEach(d=>{
  if(!d.type) d.type='md';
  if(!d.tags) d.tags=[];
  if(!('pinned' in d)) d.pinned=false;
  if(!('codeLang' in d)) d.codeLang='plain';
  if(!d.checklist) d.checklist=[];
  if(!d.att) d.att=[]; // [{id,name,mime,size,kind:'img'|'file'}]
  if(!('archived' in d)) d.archived=false;
  if(!('archivedAt' in d)) d.archivedAt=0;
});

// Auto-purge archived docs older than 30 days
const THIRTY_DAYS=30*24*60*60*1000;
const now=Date.now();
const toPurge=S.vaultDocs.filter(d=>d.archived&&d.archivedAt&&(now-d.archivedAt>THIRTY_DAYS));
if(toPurge.length){
  toPurge.forEach(d=>{
    (d.att||[]).forEach(a=>{idbDelete(a.id).catch(()=>{});});
  });
  S.vaultDocs=S.vaultDocs.filter(d=>!(d.archived&&d.archivedAt&&(now-d.archivedAt>THIRTY_DAYS)));
  save();
  dbg('[VAULT] purged '+toPurge.length+' archived >30d');
}

// ── CLIPBOARD ──
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('COPIED')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('COPIED');}catch(e){toast('COPY FAILED');}
  document.body.removeChild(ta);
}

// ── MARKDOWN (wave 2: fenced code + linkify) ──
function md2html(md){
  if(!md) return '';
  // Extract fenced code blocks first so internal markdown doesn't get transformed
  const blocks=[];
  let s=md.replace(/```([\w-]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const i=blocks.length;
    blocks.push({lang:lang||'plain',code});
    return '\x00CB'+i+'\x00';
  });
  // Escape HTML
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Headings
  s=s.replace(/^### (.+)/gm,'<h3>$1</h3>').replace(/^## (.+)/gm,'<h2>$1</h2>').replace(/^# (.+)/gm,'<h1>$1</h1>');
  // Bold/italic/inline code
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');
  // HR
  s=s.replace(/^---$/gm,'<hr>');
  // Lists (naive)
  s=s.replace(/^- \[([ xX])\] (.+)/gm,(_,c,t)=>'<li class="mdchk"><span class="mdchk-box">'+(c.toLowerCase()==='x'?'☑':'☐')+'</span> '+t+'</li>');
  s=s.replace(/^- (.+)/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/gs,'<ul>$1</ul>');
  // Auto-linkify (before paragraph wrapping, skip inside code tokens)
  s=s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  // Paragraphs
  s=s.replace(/\n\n/g,'</p><p>').replace(/^(?!<[hul]|<\/[hul]|<hr|<p|<li|\x00CB)/gm,'<p>').replace(/<p>$|^<\/p>/gm,'');
  // Restore code blocks with inline copy buttons
  s=s.replace(/\x00CB(\d+)\x00/g,(_,i)=>{
    const b=blocks[+i];
    const hi=highlight(b.code.replace(/\n$/,''),b.lang);
    return '<div class="md-code-block"><button class="copy-inline" onclick="copyText(this.nextElementSibling.textContent)">COPY</button><pre>'+hi+'</pre></div>';
  });
  return s;
}

// ── SYNTAX HIGHLIGHTER (lightweight, regex-based) ──
const LANG_RULES={
  js:{k:/\b(const|let|var|function|return|if|else|for|while|class|new|this|await|async|try|catch|throw|import|export|from|default|break|continue|typeof|instanceof|of|in|null|undefined|true|false)\b/g,f:/\b([a-zA-Z_$][\w$]*)(?=\s*\()/g,s:/(["'`])(?:\\.|(?!\1)[^\\])*\1/g,n:/\b(\d+\.?\d*)\b/g,c:/(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g},
  py:{k:/\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|raise|with|lambda|pass|break|continue|global|nonlocal|yield|in|is|not|and|or|True|False|None|self|print)\b/g,f:/\b([a-zA-Z_][\w]*)(?=\s*\()/g,s:/(["'])(?:\\.|(?!\1)[^\\])*\1|"""[\s\S]*?"""|'''[\s\S]*?'''/g,n:/\b(\d+\.?\d*)\b/g,c:/(#[^\n]*)/g},
  bash:{k:/\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|exit|echo|export|source|local|read)\b/g,f:/\b([a-zA-Z_][\w-]*)(?=\s*\()/g,s:/(["'])(?:\\.|(?!\1)[^\\])*\1/g,n:/\b(\d+)\b/g,c:/(#[^\n]*)/g},
  json:{k:/\b(true|false|null)\b/g,f:null,s:/"(?:\\.|[^"\\])*"/g,n:/\b(\d+\.?\d*)\b/g,c:null},
  html:{k:/(&lt;\/?[a-zA-Z][\w-]*|\/?&gt;)/g,f:null,s:/(["'])(?:\\.|(?!\1)[^\\])*\1/g,n:null,c:/(&lt;!--[\s\S]*?--&gt;)/g},
  css:{k:/\b(\.[a-zA-Z_-][\w-]*|#[a-zA-Z_-][\w-]*|@\w+)\b/g,f:/([a-zA-Z-]+)(?=\s*:)/g,s:/(["'])(?:\\.|(?!\1)[^\\])*\1/g,n:/\b(\d+\.?\d*(?:px|em|rem|%|vh|vw|s|ms)?)\b/g,c:/(\/\*[\s\S]*?\*\/)/g},
  nuke:{k:/\b(def|class|return|if|elif|else|for|while|import|from|as|try|except|finally|raise|with|lambda|pass|break|continue|True|False|None|self|nuke|knob|node|input|output)\b/g,f:/\b([a-zA-Z_][\w]*)(?=\s*\()/g,s:/(["'])(?:\\.|(?!\1)[^\\])*\1/g,n:/\b(\d+\.?\d*)\b/g,c:/(#[^\n]*)/g}
};

function highlight(code,lang){
  const rules=LANG_RULES[lang];
  // escape first
  let s=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(!rules){return s;}
  // Use tokenizer-lite: replace with placeholder, re-insert
  const tokens=[];
  function push(cls,val){const id='\x00'+tokens.length+'\x00';tokens.push('<span class="'+cls+'">'+val+'</span>');return id;}
  // order: comments, strings, numbers, keywords, functions
  if(rules.c) s=s.replace(rules.c,m=>push('c',m));
  if(rules.s) s=s.replace(rules.s,m=>push('s',m));
  if(rules.n) s=s.replace(rules.n,m=>push('n',m));
  if(rules.k) s=s.replace(rules.k,m=>push('k',m));
  if(rules.f) s=s.replace(rules.f,m=>push('f',m));
  // re-insert tokens
  s=s.replace(/\x00(\d+)\x00/g,(_,i)=>tokens[+i]);
  // wrap each line with .ln for line numbers
  s=s.split('\n').map(l=>'<span class="ln">'+(l||' ')+'</span>').join('\n');
  return s;
}

// ── LIST ──
function renderList(){
  // Filter by archive view
  let pool=S.vaultDocs.filter(d=>showArchived ? d.archived : !d.archived);

  // Filter by search query
  const q=vaultSearchQ.trim().toLowerCase();
  if(q){
    pool=pool.filter(d=>{
      const inTitle=(d.title||'').toLowerCase().includes(q);
      const inContent=(d.content||'').toLowerCase().includes(q);
      const inTags=(d.tags||[]).some(t=>t.toLowerCase().includes(q));
      const inShow=(()=>{const s=gs(d.showId);return s?s.code.toLowerCase().includes(q):false;})();
      const inChk=(d.checklist||[]).some(c=>(c.text||'').toLowerCase().includes(q));
      return inTitle||inContent||inTags||inShow||inChk;
    });
  }

  const pinned=pool.filter(d=>d.pinned);
  const unpinned=pool.filter(d=>!d.pinned);

  const groups=[];
  if(pinned.length && !showArchived) groups.push({label:'📌 PINNED',docs:pinned,isPinGroup:true});
  if(showArchived){
    groups.push({label:'🗄 ARCHIVED (auto-deletes after 30d)',docs:pool});
  } else {
    groups.push({label:'GENERAL',docs:unpinned.filter(d=>!d.showId)});
    (S.shows||[]).forEach(s=>groups.push({label:s.code,docs:unpinned.filter(d=>d.showId===s.id)}));
    // Custom tags
    const tagsInUse=[...new Set(unpinned.flatMap(d=>d.tags||[]))];
    tagsInUse.forEach(t=>{
      const docs=unpinned.filter(d=>(d.tags||[]).includes(t) && !d.showId);
      if(docs.length) groups.push({label:'#'+t,docs,isTagGroup:true});
    });
  }

  const filtered=groups.filter(g=>g.docs.length>0);

  const typeIcon={md:'M',code:'</>',check:'☐',snip:'⎘'};

  let h='';
  filtered.forEach(g=>{
    h+='<div class="vault-list-section"><div class="vault-list-sec-lbl">'+g.label+'</div>';
    g.docs.forEach(d=>{
      const date=new Date(d.updated||Date.now()).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const preview=(d.content||'').replace(/[#*`]/g,'').trim().slice(0,50)||'Empty note';
      const tagsHtml=(d.tags||[]).length?'<div class="vault-doc-row-tags">'+(d.tags||[]).map(t=>'<span class="vault-doc-row-tag">#'+escHtml(t)+'</span>').join('')+'</div>':'';
      h+='<div class="vault-doc-row'+(d.pinned?' pinned':'')+'" data-did="'+d.id+'">'+
        '<div class="vault-doc-icon"><span class="vault-doc-type-icon">'+(typeIcon[d.type||'md']||'M')+'</span></div>'+
        '<div class="vault-doc-info">'+
          '<div class="vault-doc-title">'+escHtml(d.title||'Untitled')+'</div>'+
          '<div class="vault-doc-meta">'+date+' &nbsp;&bull;&nbsp; '+escHtml(preview)+'</div>'+
          tagsHtml+
        '</div>'+
        '<div class="vault-doc-chevron">&#x203A;</div>'+
      '</div>';
    });
    h+='</div>';
  });
  if(!h){
    if(q) h='<div style="padding:40px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;">NO MATCH FOR "'+escHtml(q).toUpperCase()+'"</div>';
    else if(showArchived) h='<div style="padding:40px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;">NO ARCHIVED NOTES</div>';
    else h='<div style="padding:40px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;">NO DOCS &mdash; TAP + NEW</div>';
  }
  document.getElementById('doc-list').innerHTML=h;

  // wire click + long-press on every row
  document.querySelectorAll('.vault-doc-row').forEach(el=>{
    const did=el.dataset.did;
    el.addEventListener('touchstart',e=>{
      _lpTriggered=false;
      _lpTimer=setTimeout(()=>{_lpTriggered=true;if(navigator.vibrate)navigator.vibrate(30);openMoveSheet(did);},500);
    },{passive:true});
    el.addEventListener('touchend',e=>{
      clearTimeout(_lpTimer);
      if(!_lpTriggered) openDoc(did);
    });
    el.addEventListener('touchmove',()=>clearTimeout(_lpTimer),{passive:true});
    el.addEventListener('click',e=>{if(!('ontouchstart' in window)) openDoc(did);});
    el.addEventListener('contextmenu',e=>{e.preventDefault();openMoveSheet(did);});
  });
}

function showList(){
  activeId=null;
  mode='edit';
  document.getElementById('v-list').classList.remove('hide');
  document.getElementById('v-edit').classList.add('hide');
  document.getElementById('list-actions').classList.remove('hide');
  document.getElementById('edit-actions').classList.add('hide');
  document.getElementById('editor-bar').classList.add('hide');
  document.getElementById('back-lbl').textContent='HOME';
  document.getElementById('title-lbl').textContent='VAULT';
  // hide wave 2/3 editor UI
  ['md-toolbar','edit-footer','att-strip'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('hide');});
  renderList();
}

// ── OPEN / RENDER DOC ──
function openDoc(id){
  const doc=S.vaultDocs.find(d=>d.id===id);if(!doc)return;
  activeId=id;
  mode='edit';

  document.getElementById('edit-title').value=doc.title||'';
  document.getElementById('edit-body').value=doc.content||'';
  document.getElementById('snip-body').value=doc.content||'';
  document.getElementById('code-lang').value=doc.codeLang||'plain';

  document.getElementById('title-lbl').textContent=(doc.title||'UNTITLED').toUpperCase().slice(0,18);
  document.getElementById('v-list').classList.add('hide');
  document.getElementById('v-edit').classList.remove('hide');
  document.getElementById('list-actions').classList.add('hide');
  document.getElementById('edit-actions').classList.remove('hide');
  document.getElementById('editor-bar').classList.remove('hide');
  document.getElementById('back-lbl').textContent='VAULT';

  // Pin state
  document.getElementById('pin-btn').classList.toggle('on',!!doc.pinned);

  // Type picker active state
  document.querySelectorAll('#type-picker .type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===(doc.type||'md')));

  renderTagRow(doc);
  renderTypeView(doc);
  dbg('[VAULT] opened '+id+' type='+doc.type);
}

function renderTagRow(doc){
  const row=document.getElementById('tag-row');
  const show=gs(doc.showId);
  let h='';
  h+='<span class="vault-doc-tag show-tag" onclick="openShowPicker()">'+(show?show.code:'GENERAL')+' ▾</span>';
  (doc.tags||[]).forEach(t=>{
    h+='<span class="vault-doc-tag user-tag" onclick="removeTag(\''+escAttr(t)+'\')">#'+escHtml(t)+' ×</span>';
  });
  h+='<span class="vault-doc-tag tag-add" onclick="openTagSheet()">+ TAG</span>';
  row.innerHTML=h;
}

function renderTypeView(doc){
  const t=doc.type||'md';
  // Hide everything
  ['edit-body','edit-preview','code-meta','code-preview','check-view','snip-view','mode-toggle','md-toolbar'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.add('hide');
  });

  if(t==='md'){
    document.getElementById('mode-toggle').classList.remove('hide');
    if(mode==='preview'){
      document.getElementById('edit-preview').classList.remove('hide');
      document.getElementById('edit-preview').innerHTML=md2html(doc.content||'');
    } else {
      document.getElementById('edit-body').classList.remove('hide');
      document.getElementById('edit-body').classList.remove('code-mode');
      document.getElementById('md-toolbar').classList.remove('hide');
    }
  } else if(t==='code'){
    document.getElementById('mode-toggle').classList.remove('hide');
    document.getElementById('code-meta').classList.remove('hide');
    if(mode==='preview'){
      const pv=document.getElementById('code-preview');
      pv.classList.remove('hide');
      pv.innerHTML='<button class="copy-code-btn" onclick="copyActiveBody()">COPY</button><pre>'+highlight(doc.content||'',doc.codeLang||'plain')+'</pre>';
    } else {
      document.getElementById('edit-body').classList.remove('hide');
      document.getElementById('edit-body').classList.add('code-mode');
    }
  } else if(t==='check'){
    document.getElementById('check-view').classList.remove('hide');
    renderChecklist(doc);
  } else if(t==='snip'){
    document.getElementById('snip-view').classList.remove('hide');
  }

  renderAttStrip(doc);
  updateFooter(doc);
}

// ═══ WAVE 3: ATTACHMENT STRIP ═══
function renderAttStrip(doc){
  const strip=document.getElementById('att-strip');
  if(!strip) return;
  const atts=doc.att||[];
  if(!atts.length){strip.classList.add('hide');strip.innerHTML='';return;}
  strip.classList.remove('hide');
  let h='';
  atts.forEach((a,i)=>{
    if(a.kind==='img'){
      h+='<div class="att-item" data-ai="'+i+'" onclick="openAttViewer('+i+')">'+
           '<img id="att-thumb-'+a.id+'" alt="">'+
           '<button class="x-btn" onclick="event.stopPropagation();removeAtt('+i+')">✕</button>'+
         '</div>';
    } else {
      const ext=(a.name||'').split('.').pop().toUpperCase().slice(0,4);
      h+='<div class="att-item file" data-ai="'+i+'" onclick="openAttViewer('+i+')">'+
           '<div class="icon">📄</div>'+
           '<div class="name">'+escHtml(ext)+'</div>'+
           '<button class="x-btn" onclick="event.stopPropagation();removeAtt('+i+')">✕</button>'+
         '</div>';
    }
  });
  h+='<div class="att-add" onclick="attachAdd()"><div class="plus">+</div><div>ADD</div></div>';
  strip.innerHTML=h;
  // Load image thumbs from IndexedDB
  atts.forEach(async a=>{
    if(a.kind!=='img') return;
    try{
      const rec=await idbGet(a.id);
      if(rec&&rec.blob){
        const img=document.getElementById('att-thumb-'+a.id);
        if(img) img.src=URL.createObjectURL(rec.blob);
      }
    }catch(e){dbg('thumb err '+e.message);}
  });
}

function attachAdd(){
  if(!activeId){toast('OPEN A NOTE FIRST');return;}
  document.getElementById('att-file-in').click();
}

document.getElementById('att-file-in').addEventListener('change',async function(e){
  const files=Array.from(e.target.files||[]);
  if(!files.length)return;
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  if(!doc.att) doc.att=[];
  for(const f of files){
    try{
      const id='a'+Date.now()+Math.random().toString(36).slice(2,6);
      const kind=f.type.startsWith('image/')?'img':'file';
      await idbPut({id,blob:f});
      doc.att.push({id,name:f.name,mime:f.type,size:f.size,kind});
      dbg('[ATT] saved '+f.name+' '+bytesHuman(f.size));
    }catch(err){
      dbg('[ATT] ERR '+err.message);
      toast('ATT FAILED: '+err.message);
    }
  }
  doc.updated=Date.now();save();
  renderAttStrip(doc);
  updateFooter(doc);
  toast(files.length+' ATTACHED');
  e.target.value=''; // reset
});

async function removeAtt(idx){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc||!doc.att)return;
  const a=doc.att[idx];if(!a)return;
  if(!confirm('Remove "'+(a.name||'attachment')+'"?'))return;
  try{await idbDelete(a.id);}catch(e){}
  doc.att.splice(idx,1);
  doc.updated=Date.now();save();
  renderAttStrip(doc);
  updateFooter(doc);
  toast('REMOVED');
}

async function openAttViewer(idx){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc||!doc.att)return;
  const a=doc.att[idx];if(!a)return;
  _activeAttIdx=idx;
  const viewer=document.getElementById('att-viewer');
  const body=document.getElementById('vw-body');
  document.getElementById('vw-name').textContent=a.name||'';
  try{
    const rec=await idbGet(a.id);
    if(!rec||!rec.blob){body.innerHTML='<div style="color:#f87171">ATTACHMENT NOT FOUND</div>';viewer.classList.add('open');return;}
    const url=URL.createObjectURL(rec.blob);
    if(a.kind==='img'){
      body.innerHTML='<img src="'+url+'" alt="'+escAttr(a.name)+'">';
    } else {
      body.innerHTML='<div class="file-box"><div class="icon">📄</div><div class="name">'+escHtml(a.name)+'</div><div class="size">'+escHtml(a.mime||'')+' · '+bytesHuman(a.size||0)+'</div></div>';
    }
    viewer.classList.add('open');
  }catch(e){body.innerHTML='<div style="color:#f87171">'+escHtml(e.message)+'</div>';viewer.classList.add('open');}
}
function closeAttViewer(){document.getElementById('att-viewer').classList.remove('open');_activeAttIdx=-1;}
async function downloadActiveAtt(){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc||_activeAttIdx<0)return;
  const a=doc.att[_activeAttIdx];if(!a)return;
  try{
    const rec=await idbGet(a.id);if(!rec||!rec.blob)return;
    const url=URL.createObjectURL(rec.blob);
    const link=document.createElement('a');link.href=url;link.download=a.name||'download';document.body.appendChild(link);link.click();link.remove();
    setTimeout(()=>URL.revokeObjectURL(url),500);
    toast('DOWNLOAD');
  }catch(e){toast('DOWNLOAD FAILED');}
}

// ═══ WAVE 2: MD TOOLBAR HANDLERS ═══
function mdWrap(pre,post){
  const ta=document.getElementById('edit-body');
  if(!ta||ta.classList.contains('hide'))return;
  const v=ta.value,s=ta.selectionStart,e=ta.selectionEnd;
  const sel=v.slice(s,e);
  const insert=pre+sel+post;
  ta.value=v.slice(0,s)+insert+v.slice(e);
  ta.selectionStart=s+pre.length;
  ta.selectionEnd=s+pre.length+sel.length;
  ta.focus();
  syncContent();
}
function mdWrapBlock(pre,post){
  const ta=document.getElementById('edit-body');
  if(!ta||ta.classList.contains('hide'))return;
  const v=ta.value,s=ta.selectionStart,e=ta.selectionEnd;
  const sel=v.slice(s,e)||'code';
  const insert=pre+sel+post;
  ta.value=v.slice(0,s)+insert+v.slice(e);
  ta.selectionStart=s+pre.length;
  ta.selectionEnd=s+pre.length+sel.length;
  ta.focus();
  syncContent();
}
function mdLinePrefix(prefix){
  const ta=document.getElementById('edit-body');
  if(!ta||ta.classList.contains('hide'))return;
  const v=ta.value,s=ta.selectionStart;
  // find start of current line
  const lineStart=v.lastIndexOf('\n',s-1)+1;
  ta.value=v.slice(0,lineStart)+prefix+v.slice(lineStart);
  ta.selectionStart=ta.selectionEnd=s+prefix.length;
  ta.focus();
  syncContent();
}
function mdInsert(text){
  const ta=document.getElementById('edit-body');
  if(!ta||ta.classList.contains('hide'))return;
  const v=ta.value,s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=v.slice(0,s)+text+v.slice(e);
  ta.selectionStart=ta.selectionEnd=s+text.length;
  ta.focus();
  syncContent();
}
function mdInsertLink(){
  const url=prompt('URL:','https://');
  if(!url)return;
  const ta=document.getElementById('edit-body');
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.slice(s,e)||'link';
  const insert='['+sel+']('+url+')';
  ta.value=ta.value.slice(0,s)+insert+ta.value.slice(e);
  ta.selectionStart=ta.selectionEnd=s+insert.length;
  ta.focus();syncContent();
}

function syncContent(){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  if(doc.type==='md'||doc.type==='code') doc.content=document.getElementById('edit-body').value;
  else if(doc.type==='snip') doc.content=document.getElementById('snip-body').value;
  doc.updated=Date.now();
  updateFooter(doc);
}

// footer updater
function updateFooter(doc){
  const f=document.getElementById('edit-footer');
  if(!f||!doc){return;}
  // Only show for md/code/snip editing (not checklist)
  if(doc.type==='check'){f.classList.add('hide');return;}
  f.classList.remove('hide');
  let text='';
  if(doc.type==='md'||doc.type==='code') text=document.getElementById('edit-body').value||'';
  else if(doc.type==='snip') text=document.getElementById('snip-body').value||'';
  else text=doc.content||'';
  const words=text.trim()?text.trim().split(/\s+/).length:0;
  document.getElementById('ef-words').textContent=words+(words===1?' word':' words');
  document.getElementById('ef-chars').textContent=text.length+' chars';
  const attCount=(doc.att||[]).length;
  document.getElementById('ef-att').textContent=attCount?('📎 '+attCount):'';
}

// wire live count while typing
document.addEventListener('input',e=>{
  if(e.target&&(e.target.id==='edit-body'||e.target.id==='snip-body'||e.target.id==='edit-title')){
    const doc=S.vaultDocs.find(d=>d.id===activeId);if(doc){updateFooter(doc);}
  }
});

function setMode(m){
  mode=m;
  document.getElementById('mode-edit').classList.toggle('on',m==='edit');
  document.getElementById('mode-prev').classList.toggle('on',m==='preview');
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  // snapshot body before switching to preview
  if(m==='preview'){
    if(doc.type==='md'||doc.type==='code'){
      doc.content=document.getElementById('edit-body').value;
    }
  }
  renderTypeView(doc);
}

function setType(t){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  // Persist current content based on previous type
  if(doc.type==='md'||doc.type==='code'){doc.content=document.getElementById('edit-body').value;}
  if(doc.type==='snip'){doc.content=document.getElementById('snip-body').value;}
  doc.type=t;
  mode='edit';
  document.querySelectorAll('#type-picker .type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  // Sync inputs
  document.getElementById('edit-body').value=doc.content||'';
  document.getElementById('snip-body').value=doc.content||'';
  renderTypeView(doc);
  save();
}

function togglePin(){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  doc.pinned=!doc.pinned;
  document.getElementById('pin-btn').classList.toggle('on',doc.pinned);
  save();toast(doc.pinned?'PINNED':'UNPINNED');
}

// ── CODE LANG ──
document.addEventListener('change',e=>{
  if(e.target&&e.target.id==='code-lang'){
    const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
    doc.codeLang=e.target.value;save();
    if(mode==='preview') renderTypeView(doc);
  }
});

// ── CHECKLIST ──
function renderChecklist(doc){
  if(!doc.checklist) doc.checklist=[];
  // parse lines from content if checklist empty (migration on first open)
  if(!doc.checklist.length&&doc.content){
    doc.checklist=doc.content.split('\n').filter(l=>l.trim()).map(line=>{
      const m=line.match(/^\s*[-*]\s*\[([ xX])\]\s*(.*)$/);
      return m?{text:m[2],done:m[1].toLowerCase()==='x'}:{text:line.replace(/^\s*[-*]\s*/,''),done:false};
    });
  }
  const view=document.getElementById('check-view');
  let h='<div class="chk-add-row"><input class="chk-add-in" id="chk-add-in" placeholder="New item..." onkeydown="if(event.key===\'Enter\')addChkItem()"><button class="chk-add-btn" onclick="addChkItem()">ADD</button></div>';
  doc.checklist.forEach((it,i)=>{
    h+='<div class="chk-row'+(it.done?' done':'')+'" data-i="'+i+'">'+
      '<div class="chk-box" onclick="toggleChk('+i+')"></div>'+
      '<div class="chk-text" onclick="editChkItem('+i+')">'+escHtml(it.text||'')+'</div>'+
      '<button class="chk-copy" onclick="copyText(\''+escAttr(it.text||'')+'\')">⎘</button>'+
      '<button class="chk-copy" onclick="delChk('+i+')" style="color:#f87171">✕</button>'+
    '</div>';
  });
  view.innerHTML=h;
}
function toggleChk(i){const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;doc.checklist[i].done=!doc.checklist[i].done;doc.updated=Date.now();save();renderChecklist(doc);}
function addChkItem(){const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;const inEl=document.getElementById('chk-add-in');const v=inEl.value.trim();if(!v)return;doc.checklist.push({text:v,done:false});doc.updated=Date.now();save();inEl.value='';renderChecklist(doc);setTimeout(()=>document.getElementById('chk-add-in')?.focus(),20);}
function delChk(i){const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;doc.checklist.splice(i,1);doc.updated=Date.now();save();renderChecklist(doc);}
function editChkItem(i){const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;const cur=doc.checklist[i].text;const v=prompt('Edit item:',cur);if(v!==null){doc.checklist[i].text=v;doc.updated=Date.now();save();renderChecklist(doc);}}

// ── SNIPPET COPY ──
function copyActiveBody(){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  let text='';
  if(doc.type==='snip') text=document.getElementById('snip-body').value||doc.content||'';
  else if(doc.type==='md'||doc.type==='code') text=document.getElementById('edit-body').value||doc.content||'';
  if(!text){toast('NOTHING TO COPY');return;}
  copyText(text);
  if(doc.type==='snip'){
    const b=document.getElementById('snip-copy-btn');
    b.classList.add('copied');b.textContent='✓ COPIED';
    setTimeout(()=>{b.classList.remove('copied');b.textContent='⎘ TAP TO COPY';},1500);
  }
}

// ── TAGS ──
function openTagSheet(){
  saveDoc(true); // silent save current
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  const all=[...new Set([...(S.vaultTags||[]),...S.vaultDocs.flatMap(d=>d.tags||[])])].sort();
  const current=new Set(doc.tags||[]);
  let h='<div class="v-sh-title">TAGS</div>';
  h+='<div class="v-sh-chip-row">';
  all.forEach(t=>{
    h+='<span class="v-sh-chip'+(current.has(t)?' on':'')+'" onclick="toggleTag(\''+escAttr(t)+'\')">#'+escHtml(t)+'</span>';
  });
  h+='</div>';
  h+='<input class="v-sh-input" id="new-tag-in" placeholder="new tag name..." maxlength="20">';
  h+='<button class="v-sh-btn primary" onclick="createTag()">+ CREATE TAG</button>';
  h+='<button class="v-sh-btn" onclick="closeSheet()">DONE</button>';
  openSheet(h);
}
function toggleTag(tag){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  if(!doc.tags) doc.tags=[];
  const i=doc.tags.indexOf(tag);
  if(i>=0) doc.tags.splice(i,1); else doc.tags.push(tag);
  doc.updated=Date.now();save();
  openTagSheet();
  renderTagRow(doc);
}
function createTag(){
  const inEl=document.getElementById('new-tag-in');
  let v=(inEl.value||'').trim().toLowerCase().replace(/[^\w-]/g,'-').slice(0,20);
  if(!v)return;
  if(!S.vaultTags.includes(v)) S.vaultTags.push(v);
  const doc=S.vaultDocs.find(d=>d.id===activeId);
  if(doc&&!doc.tags.includes(v)){doc.tags.push(v);doc.updated=Date.now();}
  save();openTagSheet();renderTagRow(doc);
}
function removeTag(tag){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  doc.tags=(doc.tags||[]).filter(t=>t!==tag);
  doc.updated=Date.now();save();renderTagRow(doc);
}

// ── MOVE between shows ──
function openShowPicker(){
  saveDoc(true);
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  let h='<div class="v-sh-title">MOVE TO SHOW</div>';
  h+='<div class="v-sh-row" onclick="setShow(null)">'+
    '<div class="v-sh-row-lbl">GENERAL</div>'+
    (!doc.showId?'<span class="v-sh-row-chk">✓</span>':'')+
  '</div>';
  (S.shows||[]).forEach(s=>{
    h+='<div class="v-sh-row" onclick="setShow(\''+s.id+'\')">'+
      '<div class="v-sh-row-lbl">'+escHtml(s.code)+' — '+escHtml(s.name||'')+'</div>'+
      (doc.showId===s.id?'<span class="v-sh-row-chk">✓</span>':'')+
    '</div>';
  });
  h+='<button class="v-sh-btn" onclick="closeSheet()">CANCEL</button>';
  openSheet(h);
}
function setShow(sid){
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  doc.showId=sid;doc.updated=Date.now();save();
  closeSheet();renderTagRow(doc);toast(sid?'MOVED':'MOVED TO GENERAL');
}

// ── MOVE sheet (long-press on list row) ──
function openMoveSheet(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  let h='<div class="v-sh-title">'+escHtml(doc.title||'Untitled')+'</div>';
  if(!doc.archived){
    h+='<div class="v-sh-row" onclick="toggleDocPin(\''+did+'\')"><div class="v-sh-row-lbl">'+(doc.pinned?'📌 UNPIN':'📌 PIN')+'</div></div>';
    h+='<div class="v-sh-row" onclick="openMoveShowSheet(\''+did+'\')"><div class="v-sh-row-lbl">Move to show →</div></div>';
    h+='<div class="v-sh-row" onclick="openDocTagSheet(\''+did+'\')"><div class="v-sh-row-lbl">Edit tags →</div></div>';
    h+='<div class="v-sh-row" onclick="duplicateDoc(\''+did+'\')"><div class="v-sh-row-lbl">Duplicate</div></div>';
    h+='<div class="v-sh-row" onclick="copyDocContent(\''+did+'\')"><div class="v-sh-row-lbl">Copy content</div></div>';
    h+='<div class="v-sh-row" onclick="archiveDoc(\''+did+'\')"><div class="v-sh-row-lbl">🗄 Archive (30d recovery)</div></div>';
  } else {
    h+='<div class="v-sh-row" onclick="unarchiveDoc(\''+did+'\')"><div class="v-sh-row-lbl">↺ Restore</div></div>';
    h+='<div class="v-sh-row" onclick="copyDocContent(\''+did+'\')"><div class="v-sh-row-lbl">Copy content</div></div>';
  }
  h+='<button class="v-sh-btn danger" onclick="deleteDocById(\''+did+'\')">DELETE PERMANENTLY</button>';
  h+='<button class="v-sh-btn" onclick="closeSheet()">CANCEL</button>';
  openSheet(h);
}
function toggleDocPin(did){const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;doc.pinned=!doc.pinned;save();closeSheet();renderList();toast(doc.pinned?'PINNED':'UNPINNED');}
function openMoveShowSheet(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  let h='<div class="v-sh-title">MOVE TO SHOW</div>';
  h+='<div class="v-sh-row" onclick="setDocShow(\''+did+'\',null)"><div class="v-sh-row-lbl">GENERAL</div>'+(!doc.showId?'<span class="v-sh-row-chk">✓</span>':'')+'</div>';
  (S.shows||[]).forEach(s=>{
    h+='<div class="v-sh-row" onclick="setDocShow(\''+did+'\',\''+s.id+'\')"><div class="v-sh-row-lbl">'+escHtml(s.code)+' — '+escHtml(s.name||'')+'</div>'+(doc.showId===s.id?'<span class="v-sh-row-chk">✓</span>':'')+'</div>';
  });
  h+='<button class="v-sh-btn" onclick="closeSheet()">CANCEL</button>';
  openSheet(h);
}
function setDocShow(did,sid){const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;doc.showId=sid;doc.updated=Date.now();save();closeSheet();renderList();toast('MOVED');}
function openDocTagSheet(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  const all=[...new Set([...(S.vaultTags||[]),...S.vaultDocs.flatMap(d=>d.tags||[])])].sort();
  const current=new Set(doc.tags||[]);
  let h='<div class="v-sh-title">TAGS — '+escHtml(doc.title||'Untitled')+'</div>';
  h+='<div class="v-sh-chip-row">';
  all.forEach(t=>{
    h+='<span class="v-sh-chip'+(current.has(t)?' on':'')+'" onclick="toggleDocTag(\''+did+'\',\''+escAttr(t)+'\')">#'+escHtml(t)+'</span>';
  });
  h+='</div>';
  h+='<input class="v-sh-input" id="new-tag-in2" placeholder="new tag name..." maxlength="20">';
  h+='<button class="v-sh-btn primary" onclick="createDocTag(\''+did+'\')">+ CREATE TAG</button>';
  h+='<button class="v-sh-btn" onclick="closeSheet()">DONE</button>';
  openSheet(h);
}
function toggleDocTag(did,tag){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  if(!doc.tags) doc.tags=[];
  const i=doc.tags.indexOf(tag);
  if(i>=0) doc.tags.splice(i,1); else doc.tags.push(tag);
  doc.updated=Date.now();save();openDocTagSheet(did);
}
function createDocTag(did){
  const inEl=document.getElementById('new-tag-in2');
  let v=(inEl.value||'').trim().toLowerCase().replace(/[^\w-]/g,'-').slice(0,20);
  if(!v)return;
  if(!S.vaultTags.includes(v)) S.vaultTags.push(v);
  const doc=S.vaultDocs.find(d=>d.id===did);
  if(doc&&!doc.tags.includes(v)){doc.tags.push(v);doc.updated=Date.now();}
  save();openDocTagSheet(did);
}
function duplicateDoc(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  const copy=JSON.parse(JSON.stringify(doc));
  copy.id='v'+Date.now();copy.title=(doc.title||'Untitled')+' (copy)';copy.updated=Date.now();copy.pinned=false;
  S.vaultDocs.unshift(copy);save();closeSheet();renderList();toast('DUPLICATED');
}
function copyDocContent(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  let text=doc.content||'';
  if(doc.type==='check'&&doc.checklist?.length){
    text=doc.checklist.map(c=>(c.done?'[x] ':'[ ] ')+c.text).join('\n');
  }
  copyText(text);closeSheet();
}
function deleteDocById(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  if(!confirm('Delete "'+(doc.title||'Untitled')+'"?'))return;
  // cleanup attachments from IDB
  (doc.att||[]).forEach(a=>{idbDelete(a.id).catch(()=>{});});
  S.vaultDocs=S.vaultDocs.filter(d=>d.id!==did);save();closeSheet();renderList();toast('DELETED');
}

// ── ACTION SHEET from editor (⋯ button) ──
function openActionSheet(){
  saveDoc(true);
  if(!activeId)return;
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  let h='<div class="v-sh-title">'+escHtml(doc.title||'Untitled')+'</div>';
  h+='<div class="v-sh-row" onclick="copyActiveBody();closeSheet()"><div class="v-sh-row-lbl">⎘ Copy all content</div></div>';
  h+='<div class="v-sh-row" onclick="duplicateDoc(\''+activeId+'\')"><div class="v-sh-row-lbl">Duplicate</div></div>';
  if(doc.archived){
    h+='<div class="v-sh-row" onclick="unarchiveDoc(\''+activeId+'\');showList()"><div class="v-sh-row-lbl">↺ Restore from archive</div></div>';
  } else {
    h+='<div class="v-sh-row" onclick="archiveDoc(\''+activeId+'\');showList()"><div class="v-sh-row-lbl">🗄 Archive (30d recovery)</div></div>';
  }
  h+='<button class="v-sh-btn danger" onclick="deleteDoc()">DELETE PERMANENTLY</button>';
  h+='<button class="v-sh-btn" onclick="closeSheet()">CANCEL</button>';
  openSheet(h);
}

// ── SHEET helpers ──
function openSheet(html){
  document.getElementById('sh-content').innerHTML=html;
  document.getElementById('sh-wrap').classList.add('open');
}
function closeSheet(){document.getElementById('sh-wrap').classList.remove('open');}
document.getElementById('sh-ovl').addEventListener('click',function(e){if(e.target===this)closeSheet();});

// ═══ WAVE 4: TEMPLATES ═══
const TEMPLATES={
  blank:{type:'md',title:'New Note',content:''},
  bid:{type:'md',title:'Bid — ',content:'# Bid Sheet\n\n**Show:** \n**Project:** \n**Date:** \n\n## Scope\n- \n\n## Shots / Items\n| # | Description | Days | Notes |\n|---|---|---|---|\n| 01 |  |  |  |\n\n## Totals\n- **Total days:** \n- **Rate:** \n- **Total:** \n\n## Terms\n- \n\n---\n'},
  meeting:{type:'md',title:'Meeting — ',content:'# Meeting\n\n**Date:** \n**Attendees:** \n**Project:** \n\n## Agenda\n- \n\n## Notes\n- \n\n## Action Items\n- [ ] \n\n## Next steps\n- \n'},
  recipe:{type:'md',title:'Recipe — ',content:'# Recipe\n\n**Serves:** \n**Time:** \n\n## Ingredients\n- \n\n## Steps\n1. \n\n## Notes\n- \n'},
  bug:{type:'md',title:'Bug — ',content:'# Bug Report\n\n**Where:** \n**Version:** \n**Priority:** \n\n## Steps to reproduce\n1. \n\n## Expected\n\n\n## Actual\n\n\n## Logs\n```\n\n```\n\n## Fix\n- [ ] \n'},
  snip:{type:'snip',title:'Snippet',content:''},
  code:{type:'code',title:'Code',content:'',codeLang:'js'},
  list:{type:'check',title:'Checklist',content:'',checklist:[]}
};

function openNewSheet(){
  let h='<div class="v-sh-title">NEW NOTE</div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'blank\')"><div class="v-sh-row-lbl">📝 Blank (markdown)</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'code\')"><div class="v-sh-row-lbl">&lt;/&gt; Code snippet</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'list\')"><div class="v-sh-row-lbl">☐ Checklist</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'snip\')"><div class="v-sh-row-lbl">⎘ Quick snippet</div></div>';
  h+='<div style="height:1px;background:var(--b2);margin:10px 0"></div>';
  h+='<div class="v-sh-title" style="margin-top:0">TEMPLATES</div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'bid\')"><div class="v-sh-row-lbl">💰 Bid sheet</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'meeting\')"><div class="v-sh-row-lbl">📅 Meeting notes</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'recipe\')"><div class="v-sh-row-lbl">🍳 Recipe</div></div>';
  h+='<div class="v-sh-row" onclick="newDocFromTpl(\'bug\')"><div class="v-sh-row-lbl">🐛 Bug report</div></div>';
  h+='<button class="v-sh-btn" onclick="closeSheet()">CANCEL</button>';
  openSheet(h);
}

function newDocFromTpl(tplKey){
  closeSheet();
  const tpl=TEMPLATES[tplKey]||TEMPLATES.blank;
  const id='v'+Date.now();
  const show=S.shows[0]||null;
  const doc={
    id,
    title:tpl.title||'New Note',
    content:tpl.content||'',
    showId:show?show.id:null,
    tags:[],
    type:tpl.type||'md',
    pinned:false,
    codeLang:tpl.codeLang||'plain',
    checklist:tpl.checklist||[],
    att:[],
    archived:false,
    archivedAt:0,
    updated:Date.now()
  };
  S.vaultDocs.unshift(doc);
  save();
  openDoc(id);
}

function newDoc(){newDocFromTpl('blank');} // legacy shim

// ═══ WAVE 4: SEARCH ═══
function clearVaultSearch(){
  const inEl=document.getElementById('vault-search-in');
  if(inEl){inEl.value='';vaultSearchQ='';}
  document.getElementById('vault-search-x').classList.add('hide');
  renderList();
}
document.getElementById('vault-search-in').addEventListener('input',function(e){
  vaultSearchQ=e.target.value;
  document.getElementById('vault-search-x').classList.toggle('hide',!vaultSearchQ);
  renderList();
});

// ═══ WAVE 4: ARCHIVE ═══
function toggleArchView(){
  showArchived=!showArchived;
  document.getElementById('vault-arch-toggle').classList.toggle('on',showArchived);
  document.getElementById('vault-arch-toggle').textContent=showArchived?'● ARCH':'ARCH';
  renderList();
}

function archiveDoc(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  doc.archived=true;doc.archivedAt=Date.now();doc.pinned=false;
  save();closeSheet();renderList();toast('ARCHIVED');
}
function unarchiveDoc(did){
  const doc=S.vaultDocs.find(d=>d.id===did);if(!doc)return;
  doc.archived=false;doc.archivedAt=0;
  save();closeSheet();renderList();toast('RESTORED');
}

function saveDoc(silent){
  if(!activeId)return;
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  doc.title=document.getElementById('edit-title').value.trim()||'Untitled';
  if(doc.type==='md'||doc.type==='code') doc.content=document.getElementById('edit-body').value;
  else if(doc.type==='snip') doc.content=document.getElementById('snip-body').value;
  // checklist saves itself on toggle/add/del
  doc.updated=Date.now();
  save();
  if(!silent) toast('SAVED');
  dbg('[VAULT] saved '+activeId);
  document.getElementById('title-lbl').textContent=doc.title.toUpperCase().slice(0,18);
}

function deleteDoc(){
  if(!activeId)return;
  const doc=S.vaultDocs.find(d=>d.id===activeId);if(!doc)return;
  if(!confirm('Delete "'+(doc.title||'Untitled')+'"?'))return;
  (doc.att||[]).forEach(a=>{idbDelete(a.id).catch(()=>{});});
  S.vaultDocs=S.vaultDocs.filter(d=>d.id!==activeId);
  save();closeSheet();showList();toast('DELETED');
}

document.getElementById('back-btn').addEventListener('click',function(){
  if(activeId){saveDoc(true);showList();}
  else{window.location.href='./';}
});

// Edge-swipe-right gesture to exit note (Obsidian / iOS style)
let _swStartX=null,_swStartY=null,_swStartT=0;
document.addEventListener('touchstart',function(e){
  if(!activeId)return;
  const t=e.touches[0];
  if(t.clientX<24){ // left edge
    _swStartX=t.clientX;_swStartY=t.clientY;_swStartT=Date.now();
  } else { _swStartX=null; }
},{passive:true});
document.addEventListener('touchend',function(e){
  if(_swStartX===null)return;
  const t=(e.changedTouches&&e.changedTouches[0]);
  if(!t){_swStartX=null;return;}
  const dx=t.clientX-_swStartX, dy=Math.abs(t.clientY-_swStartY), dt=Date.now()-_swStartT;
  if(dx>60 && dy<60 && dt<600){
    // confirmed edge swipe right
    saveDoc(true);showList();
  }
  _swStartX=null;
},{passive:true});

dbg('[VAULT] '+BUILD_ID+' boot | docs='+S.vaultDocs.length+' tags='+S.vaultTags.length);
renderList();
</script>
