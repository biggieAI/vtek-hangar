/* ════════════════════════════════════════════════════
   V//TEK — MECH DARK DESIGN SYSTEM v16
   Black + Electric Yellow. Flat. Precise. No mercy.
════════════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
*, *::before, *::after { box-sizing: border-box; }
html, body, .shell, .page-area, .page {
  max-width: 100vw;
  overflow-x: hidden;
}

:root {
  /* VTEK GEO — PLASMA WHITE */
  --bg:    #000003;
  --s1:    #0a0b10;
  --s2:    #14161d;
  --s3:    #1e2029;
  --s4:    #292d36;
  --s5:    #363b47;
  --neo-raise: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.72), 0 6px 28px rgba(0,0,0,0.92);
  --neo-inset: inset 0 2px 6px rgba(0,0,0,0.85), inset 0 -1px 0 rgba(255,255,255,0.03);
  --y:      rgba(244,247,250,0.92);
  --y-hi:   #f4f7fa;
  --y-mid:  rgba(232,237,242,0.55);
  --y-dim:  rgba(232,237,242,0.20);
  --y-deep: rgba(232,237,242,0.07);
  --y2:     rgba(232,237,242,0.04);
  --y3:     rgba(232,237,242,0.025);
  --y4:     rgba(232,237,242,0.01);
  --y-glow: none;
  --y-glow-sm: none;
  --t0: #c8cdd8;
  --t1: #525a68;
  --t2: #282d38;
  --t3: #141820;
  --wip:   #6a7280;
  --blk:   #404550;
  --rev:   #585e6a;
  --app:   #8890a0;
  --hld:   #1e2029;
  --del:   #a8b0bc;
  --accent:     #e8edf2;
  --accent-hi:  #f4f7fa;
  --accent-dim: #0e1018;
  --accent-ice: #f4f7fa;
  --accent-bg:  #080a10;
  --accent-red: #e8edf2;
  --accent-red-hi: #f4f7fa;
  --accent-glow: rgba(232,237,242,0.15);
  --b0: 1px solid rgba(255,255,255,0.028);
  --b1: 1px solid rgba(255,255,255,0.055);
  --b2: 1px solid rgba(255,255,255,0.085);
  --b3: 1px solid rgba(255,255,255,0.120);
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --nav-h: 56px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --accent: var(--y);
  --s-blk: var(--blk);
  --s-wip: var(--wip);
  --s-rev: var(--rev);
  --s-app: var(--app);
  --s-hld: var(--hld);
  --s-del: var(--del);
  --s-act: var(--wip);
  --row: var(--s2);
  --row-hi: var(--s3);
  --text-dark: var(--t0);
  --text2-dark: var(--t1);
  --text3-dark: var(--t2);
  --text: var(--t0);
  --text2: var(--t1);
  --text3: var(--t2);
  --bg-compat: var(--bg);
  --step1: var(--s1);
  --step2: var(--s2);
  --step3: var(--s3);
  --pill: var(--s3);
  --p0:var(--bg); --p1:var(--s1); --p2:var(--s2);
  --p3:var(--s3); --p4:#2e3240; --p5:#363b47; --p6:#424955; --p7:#545c6a;
  --t-compat0:var(--t0); --t-compat1:var(--t1); --t-compat2:var(--t2); --t-compat3:var(--t3);
  --ac: var(--y);
  --ac-lo: var(--y3);
  --ac-md: var(--y2);
  --ac-bd: rgba(232,237,242,0.20);
  --b-compat0: rgba(255,255,255,0.04);
  --b-compat1: rgba(255,255,255,0.08);
  --b-compat2: rgba(255,255,255,0.14);
  --bd: var(--b2);
  --chf:0px; --chf-md:0px; --chf-sm:0px;
  --r-pill:3px; --r-card:4px;
  --rs-ok:var(--app); --rs-warn:var(--wip); --rs-crit:var(--blk);
  --rs-ok-t:var(--app); --rs-warn-t:var(--wip); --rs-crit-t:var(--blk);
  --sh-r:none; --sh-rm:none; --sh-in:none; --sh-is:none; --sh-fl:none;
}

/* ── GLOBAL ── */
html { height: -webkit-fill-available; background: var(--bg); }
body {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  color: var(--t0);
  background: var(--bg);
  min-height: -webkit-fill-available;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
::-webkit-scrollbar { display: none; }

/* ── SHELL ── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  width: 100%;
  position: relative;
}

/* ── TOPBAR ── */
.topbar {
  height: calc(52px + var(--safe-t));
  padding-top: var(--safe-t);
  padding-left: 16px;
  padding-right: 12px;
  padding-bottom: 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 100vw;
  box-sizing: border-box;
  overflow: hidden;
}

/* Wordmark */
.wordmark { display: flex; align-items: center; user-select: none; flex-shrink: 1; min-width: 0; overflow: visible; gap: 0; line-height: 1; }
.wm-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  flex-shrink: 0;
  white-space: nowrap;
  color: #f4f7fa;
  display: flex;
  align-items: center;
}
.wm-chev { display: flex; align-items: center; margin-right: 6px; flex-shrink: 0; }
.wm-div {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.20);
  -webkit-text-fill-color: rgba(255,255,255,0.20);
  margin: 0 8px;
  flex-shrink: 0;
}
.wm-p {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 500;
  background: linear-gradient(160deg, #e8edf2 0%, #8890a0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tb-sep { display: none; }

.tb-r { margin-left: auto; display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.tb-btn {
  padding: 0 10px;
  height: 30px;
  border: var(--b2);
  border-radius: 6px;
  background: linear-gradient(180deg, var(--s4) 0%, var(--s3) 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), inset 0 -1px 0 rgba(0,0,0,0.65);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--t1);
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}
.tb-btn:hover { background: linear-gradient(180deg, var(--s5) 0%, var(--s4) 100%); color: var(--t0); }
.tb-btn:active { background: var(--s4); }
.tb-btn.go {
  background: linear-gradient(180deg, #f4f7fa 0%, #e8edf2 100%);
  border: none;
  color: #06080a;
  font-weight: 900;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.60), inset 0 -1px 0 rgba(0,0,0,0.18);
}
.tb-btn.go:hover { background: var(--accent-red-hi); }
.tb-icon-btn {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  background: var(--s2); border: var(--b2); border-radius: 3px;
  cursor: pointer; color: var(--t1); transition: all 0.1s; flex-shrink: 0;
}
.tb-icon-btn:hover { background: var(--s3); color: var(--t0); }

/* ── PAGE AREA ── */
.page-area {
  flex: 1; overflow: hidden; overflow-x: hidden;
  width: 100%; max-width: 100vw; min-height: 0; min-width: 0;
}
.page {
  display: none;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 16px 0;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 24px);
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  -webkit-overflow-scrolling: touch;
}
.page.on { display: block; }

/* ── SECTION HEADERS ── */
.sec {
  display: flex; align-items: center;
  margin-bottom: 10px; margin-top: 22px;
  width: 100%;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.sec:first-child { margin-top: 4px; }
.sec-l {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: linear-gradient(160deg, #909098 0%, #70707a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.sec-r { display: none; }
.sec-a {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  color: var(--t1); cursor: pointer; background: none; border: none;
  letter-spacing: 0.04em; text-transform: uppercase; margin-left: auto;
  transition: color 0.1s;
}
.sec-a:hover { color: var(--t0); }

/* ── SHOW GRID → full-width cards ── */
.show-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; width: 100%; }
.armor-card {
  background: var(--s2);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 0;
  cursor: pointer;
  transition: all 0.15s;
  overflow: hidden;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.armor-card:hover { background: var(--s3); border-color: #333; }
.armor-card:active { background: var(--s3); border-color: rgba(255,255,255,0.13); }
.armor-card-inner { display: none; }
.show-stripe { height: 2px; width: 100%; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%) !important; }
.armor-card-content { padding: 12px 12px 10px; }

/* Show card inner elements */
.ac-code {
  font-family: var(--sans); font-size: 20px; font-weight: 900;
  letter-spacing: -0.02em; text-transform: uppercase;
  color: var(--t0);
  line-height: 1; margin-bottom: 2px;
}
.ac-name { font-size: 13px; color: var(--t1); margin-top: 4px; }
.ac-client { font-size: 12px; color: var(--t2); margin-top: 2px; }
.show-stat-num { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--t0); }
.show-stat-key { font-size: 11px; color: var(--t2); margin-top: 1px; }
.prog-track { height: 2px; background: rgba(255,255,255,0.04); margin-bottom: 8px; overflow: hidden; border-radius: 2px; }
.prog-fill { height: 100%; transition: width 0.4s; }

/* ── STAT CHIPS ── */
.stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 4px; margin-bottom: 8px; width: 100%; }
/* stat chip top borders removed */
.sc { background: var(--s3); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px 8px 10px; text-align: center; position: relative; box-shadow: inset 0 2px 3px rgba(0,0,0,0.60), inset 0 1px 0 rgba(255,255,255,0.04), 0 1px 0 rgba(255,255,255,0.03); }
.sc-n {
  font-family: var(--mono); font-size: 22px; font-weight: 500;
  line-height: 1; margin-bottom: 4px;
  color: var(--t0);
}
.sc-l { font-family: var(--sans); font-size: 10px; font-weight: 600; color: var(--t2); letter-spacing: 0.08em; text-transform: uppercase; }

/* ── DOSSIER ── */
.dossier { background: var(--s2); border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 12px; width: 100%; overflow: hidden; position: relative; }
.dos-border { display: none; } .dos-inner { display: block; position: absolute; inset: 0; pointer-events: none; }
.dos-content { padding: 12px 14px; }
.dos-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.dos-eye { font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t2); display: flex; align-items: center; gap: 6px; }
.dos-eye-bar { width: 14px; height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); flex-shrink: 0; }
.dos-ts { font-family: var(--mono); font-size: 10px; color: var(--t2); }
.dos-num { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
.dos-big { font-family: var(--sans); font-size: 48px; font-weight: 900; color: #ffffff; text-shadow: none; line-height: 1; letter-spacing: -0.03em; }
.dos-unit { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--t1); letter-spacing: 0.06em; text-transform: uppercase; align-self: flex-end; margin-bottom: 6px; }
.dos-seg { margin-bottom: 8px; }
.dos-rows { border-top: var(--b2); padding-top: 14px; display: flex; flex-direction: column; gap: 10px; }
.dos-row { display: flex; align-items: center; }
.dos-rl { font-family: var(--sans); font-size: 11px; color: var(--t2); text-transform: uppercase; font-weight: 500; flex-shrink: 0; width: 100px; letter-spacing: 0.04em; }
.dos-rd { flex: 1; height: 1px; background: repeating-linear-gradient(90deg, #333 0, #333 2px, transparent 2px, transparent 6px); margin: 0 10px; }
.dos-rv { font-family: var(--mono); font-size: 12px; font-weight: 500; flex-shrink: 0; color: var(--t0); }

/* ── SEGMENT BARS ── */
.seg-bar { display: flex; gap: 2px; height: 6px; margin-bottom: 6px; }
.seg { flex: 1; min-width: 0; }
.s-done { background: var(--app); }
.s-wip  { background: var(--wip); }
.s-rev  { background: var(--rev); }
.s-blk  { background: var(--blk); }
.s-hld  { background: var(--s4); }
.s-emp  { background: var(--s4); }
.seg-foot { display: flex; justify-content: space-between; align-items: center; }
.seg-lbl { font-family: var(--mono); font-size: 9px; color: var(--t2); }
.seg-pct { font-family: var(--mono); font-size: 9px; color: var(--t1); }

/* ── STATUS TAGS ── */
.stag {
  display: inline-flex; align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: var(--mono); font-size: 9px; font-weight: 500;
  letter-spacing: 0.06em; flex-shrink: 0; white-space: nowrap;
  background: transparent; color: var(--t2); border: 1px solid rgba(255,255,255,0.06);
}
.stag-wip { background: rgba(138,138,142,0.08); color: var(--wip); border: 1px solid rgba(138,138,142,0.16); }
.stag-rev { background: rgba(104,104,112,0.07); color: #686870; border: 1px solid rgba(104,104,112,0.18); }
.stag-app { background: rgba(160,160,166,0.07); color: #a0a0a6; border: 1px solid rgba(160,160,166,0.18); }
.stag-blk { background: rgba(244,247,250,0.90); color: #040507; border: none; font-weight: 700; }
.stag-hld { background: var(--s3); color: var(--t2); border: var(--b2); }
.stag-del { background: rgba(192,192,196,0.10); color: var(--del); border: 1px solid rgba(192,192,196,0.22); }

/* ── SHOW TABS ── */
.show-tabs { display: flex; gap: 0; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; width: 100%; border: 1px solid rgba(255,255,255,0.05); }
.stab {
  flex-shrink: 0; padding: 6px 14px;
  border: none; border-bottom: 2px solid transparent;
  border-radius: 0; background: transparent;
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--t2); cursor: pointer; transition: all 0.1s; white-space: nowrap;
}
.stab.on { background: transparent; color: #c8dce8; border-bottom: 2px solid transparent; font-weight: 800; position: relative; }
.stab.on::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.95) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.95) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); }
.stab:hover:not(.on) { color: var(--t1); }

#shots-stats { grid-template-columns: repeat(5, minmax(0,1fr)) !important; gap: 3px !important; }
/* ── SHOT GROUPS ── */
.shot-group { display: flex; flex-direction: column; gap: 1px; margin-bottom: 2px; }
.shot-group-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  background: var(--bg); border-bottom: 1px solid rgba(255,255,255,0.04);
  border-left: 3px solid transparent;
}
.shot-group-hd:hover { border-left-color: rgba(255,255,255,0.13); }
.shot-group-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px; color: var(--t2);
}
.gdot { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
.shot-row {
  background: var(--s2);
  position: relative;
  border: 1px solid rgba(255,255,255,0.04);
  border-left: 2px solid var(--rc, var(--s4));
  border-radius: 12px;
  margin-bottom: 5px;
  padding: 12px 16px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -2px 0 rgba(0,0,0,0.70), 0 2px 6px rgba(0,0,0,0.60);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.12s;
  width: 100%; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
.shot-row:hover { background: var(--s3); }
.shot-row:nth-child(even) { background: var(--s1); }
.shot-row:nth-child(even):hover { background: var(--s3); }
.shot-row:active { background: var(--s3); }
.shot-row:last-child { border-bottom: none; }
.sr-code { font-family: var(--mono); font-size: 12px; font-weight: 500; background: linear-gradient(160deg, #dce8f0 0%, #7f90a2 60%, #2a3d50 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.04em; text-transform: uppercase; }
.sr-who { font-family: var(--sans); font-size: 11px; color: var(--t2); flex-shrink: 0; }
.sr-bid { font-family: var(--mono); font-size: 11px; color: var(--t2); flex-shrink: 0; }
.sorb { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sorb-wip { background: var(--wip); }
.sorb-rev { background: var(--rev); }
.sorb-del { background: var(--del); }
.sorb-app { background: var(--app); }
.sorb-hld { background: var(--hld); }
.sorb-blk { background: var(--blk); }
.shot-bar { width: 2px; height: 24px; flex-shrink: 0; }
.shot-info { flex: 1; min-width: 0; }
.shot-code { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--t0); letter-spacing: 0.04em; text-transform: uppercase; }
.shot-meta { display: flex; gap: 8px; margin-top: 3px; }
.shot-meta-tag { font-size: 11px; color: var(--t2); }
.shot-rhs { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.shot-days { font-family: var(--mono); font-size: 11px; color: var(--t2); }

/* ── TASK CARDS ── */
.pl-list { display: flex; flex-direction: column; gap: 0; border: 1px solid rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
/* ── TCARD — BEVELED CELL SHADING ── */
.tcard {
  background: var(--s2);
  border: 1px solid rgba(255,255,255,0.04);
  border-left: 2px solid var(--cc, var(--s4));
  border-radius: 12px;
  margin-bottom: 5px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -2px 0 rgba(0,0,0,0.70), 0 2px 6px rgba(0,0,0,0.60);
  position: relative;
  transition: all 0.12s;
  cursor: default; user-select: none;
  width: 100%; box-sizing: border-box; overflow: hidden;
  -webkit-tap-highlight-color: transparent;

}
/* tcard::before removed */

/* Alternating row cell shading */

.tcard-main { display: flex; align-items: center; gap: 8px; padding: 9px 14px; position: relative; }
.tcard-body { flex: 1; min-width: 0; }
.tcard-title {
  font-size: 14px; font-weight: 500;
  line-height: 1.3; margin-bottom: 5px; cursor: pointer;
  letter-spacing: 0.005em;
   background: linear-gradient(160deg, #dce8f0 0%, #7f90a2 60%, #2a3d50 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tcard-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.tcard-show {

.tcard-due { font-family: var(--mono); font-size: 10px; color: var(--t1); }
.tcard-dur {

}

.tcard-subs { padding: 0 14px 10px 40px; display: flex; flex-direction: column; gap: 2px; }
.sub-row { display: flex; align-items: center; gap: 8px; }
.sub-chk { width: 13px; height: 13px; flex-shrink: 0; background: transparent; border: 1px solid var(--s4); border-radius: 2px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; color: transparent; transition: all 0.1s; }
.sub-chk.on { background: radial-gradient(ellipse at 40% 35%, #ffffff 0%, rgba(190,210,225,0.90) 50%, rgba(127,144,162,0.80) 100%); border-color: transparent; color: #050b10; }
.sub-txt { font-size: 12px; color: var(--t1); }

.sub-prog { height: 1px; background: var(--s4); margin: 2px 0; overflow: hidden; border-radius: 0; }
.sub-prog-fill { height: 100%; background: var(--accent); }
.tcard-expand-inline { display: flex; justify-content: flex-end; padding: 2px 0 0; width: 100%; }
.expand-btn {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--t2); background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 3px 10px;
  cursor: pointer; transition: all 0.1s;
}
.expand-btn:hover { color: var(--t1); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }
.tcard-chk {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 0;
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px; color: transparent;

}

  border-color: rgba(255,255,255,0.55);
  box-shadow: 0 0 0 2px rgba(127,144,162,0.20);
}
.tcard-chk.on { background: radial-gradient(ellipse at 40% 35%, #ffffff 0%, rgba(190,210,225,0.90) 50%, rgba(127,144,162,0.80) 100%); border-color: transparent; color: #050b10; font-size: 11px; font-weight: 900; box-shadow: inset 0 1px 0 rgba(255,255,255,0.30); }
.tcard-notes { padding: 0 14px 10px 40px; font-size: 12px; color: var(--t1); line-height: 1.5; }
.tcard-expand-btn { font-family: var(--sans); font-size: 10px; font-weight: 600; color: var(--t2); background: none; border: none; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.1s; }

/* ── PRIORITY / TAGS ── */
.pri-badge { font-family: var(--sans); font-weight: 600; font-size: 10px; letter-spacing: 0.03em; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; }
.pri-crit { background: rgba(80,80,84,0.2); color: var(--t0); border: 1px solid rgba(255,255,255,0.08); }

.tag-chip { font-family: var(--sans); font-size: 10px; font-weight: 500; padding: 2px 10px; border-radius: 20px; background: var(--s3); border: 1px solid rgba(255,255,255,0.06); color: var(--t1); cursor: pointer; letter-spacing: 0.02em; transition: all 0.1s; }

.overdue-badge { font-family: var(--sans); font-size: 9px; font-weight: 700; color: var(--blk); letter-spacing: 0.04em; display: flex; align-items: center; gap: 3px; }

/* ── PAYLOAD TOOLBAR ── */
.pl-toolbar { display: flex; align-items: center; margin-bottom: 10px; gap: 0; border-bottom: none; padding-bottom: 0; width: 100%; }
.pl-views { display: flex; gap: 0; flex: 1; border: 1px solid rgba(255,255,255,0.05); padding-bottom: 0; }
.pl-vbtn {
  padding: 5px 10px; border: none; border-bottom: 1px solid transparent;
  background: transparent; font-family: var(--sans); font-weight: 600; font-size: 11px;

  cursor: pointer; transition: all 0.1s; border-radius: 0;
}

.pl-vbtn.on::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); }
.pl-actions { display: flex; gap: 4px; margin-left: auto; align-items: center; padding-bottom: 0; }
.pl-act-btn {
  padding: 6px 10px; border: var(--b2); border-radius: 3px;
  background: var(--s2); font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--t1);
  cursor: pointer; transition: all 0.1s; display: flex; align-items: center; gap: 4px;
}
.pl-act-btn:hover { background: var(--s3); color: var(--t0); }
.pl-act-btn:active { background: var(--s4); }
.pl-sec-lbl { font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t2); flex-shrink: 0; }

/* ── QUICK ADD ── */
.pl-quickadd { display: flex; gap: 6px; margin-bottom: 10px; align-items: stretch; }
.pl-qa-wrap {
  flex: 1; background: var(--s2); border: var(--b2); border-radius: 3px;
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
}
.pl-qa-input { flex: 1; background: none; border: none; outline: none; font-family: var(--sans); font-size: 13px; color: var(--t0); }
.pl-qa-input::placeholder { color: var(--t2); font-size: 12px; }
.pl-qa-mic { background: none; border: none; cursor: pointer; color: var(--t2); padding: 0; transition: color 0.1s; }
.pl-qa-mic:hover { color: var(--t1); }
.pl-qa-send {
  padding: 0 14px; border: none; border-radius: 3px;
  background: var(--y); font-family: var(--sans); font-size: 11px; font-weight: 700;
  color: #000; cursor: pointer; transition: all 0.1s; letter-spacing: 0.04em;
}
.pl-qa-send:hover { background: rgba(255,255,255,0.88); }

/* ── FILTER CHIPS ── */

.pl-fchip {
  flex-shrink: 0; padding: 3px 10px; border: none; border-radius: 2px;
  background: transparent; font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--t2);
  cursor: pointer; transition: all 0.1s; white-space: nowrap;
  border-bottom: 1px solid transparent;
}
.pl-fchip.on { background: transparent; color: #ffffff; border-bottom: 1px solid transparent; font-weight: 800; position: relative;  }
.pl-fchip.on::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); }
.pl-fchip:hover:not(.on) { color: var(--t1); }
.pl-ai-banner { display: flex; align-items: center; gap: 6px; padding: 10px 14px; margin-bottom: 10px; background: var(--s2); border: var(--b2); border-left: 2px solid rgba(255,255,255,0.5); box-shadow: -2px 0 8px rgba(255,255,255,0.15), -1px 0 4px rgba(127,144,162,0.15); font-family: var(--sans); font-size: 11px; color: var(--t1); }

/* ── PAYLOAD MODE BAR ── */
.payload-mode-bar { display: flex; gap: 0; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; }
.pmode-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 12px; border: none; border-bottom: 2px solid transparent;
  background: transparent;
  font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--t2);
  cursor: pointer; transition: all 0.1s;
}

.pmode-btn.on::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); }
.pmode-btn:hover:not(.on) { color: var(--t1); }

/* ── PLAN MODE ── */

/* ── VAULT ── */
#vault-delete-btn { color: var(--blk); border-color: rgba(80,80,84,0.3); background: rgba(80,80,84,0.08); }
#vault-delete-btn:hover { background: rgba(80,80,84,0.15); }

/* ── INTEL ── */
@keyframes scanline { 0% { left: -100%; } 100% { left: 200%; } }
.msg { display: flex; flex-direction: column; gap: 2px; max-width: 90%; animation: msgIn 0.16s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai { align-self: flex-start; align-items: flex-start; }
.msg-meta { font-family: var(--mono); font-size: 7px; color: var(--t3); letter-spacing: 0.08em; padding: 0 4px; opacity: 0; transition: opacity 0.2s; }
.msg:hover .msg-meta { opacity: 1; }
.msg-bubble { padding: 10px 14px; font-size: 13px; line-height: 1.5; }
.msg.user .msg-bubble { background: var(--s3); border: var(--b2); border-radius: 8px 8px 2px 8px; color: var(--t0); }
.msg.ai .msg-bubble { background: var(--s2); border: var(--b2); border-radius: 8px 8px 8px 2px; color: var(--t0); }
.msg-thinking .msg-bubble { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
.think-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--t2); animation: think 1.3s ease-in-out infinite; }
.think-dot:nth-child(2) { animation-delay: 0.2s; }
.think-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes think { 0%,60%,100% { transform: translateY(0); opacity: 0.25; } 30% { transform: translateY(-5px); opacity: 1; } }
.action-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid rgba(255,255,255,0.17); border-radius: 3px; background: var(--y3); font-family: var(--sans); font-size: 11px; font-weight: 500; color: var(--y); cursor: pointer; transition: all 0.12s; }
.action-chip:hover { background: var(--y2); }
@keyframes listenPulse { 0%,100% { border-color: rgba(255,255,255,0.17); } 50% { border-color: rgba(255,255,255,0.36); } }
.mic-icon { display: flex; }
.mic-wave { display: none; align-items: center; gap: 2px; height: 18px; }
.wave-bar { width: 2px; background: rgba(255,255,255,0.7); border-radius: 1px; animation: waveAnim 0.8s ease-in-out infinite; }
.wave-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 12px; animation-delay: 0.1s; }
.wave-bar:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.wave-bar:nth-child(4) { height: 10px; animation-delay: 0.3s; }
.wave-bar:nth-child(5) { height: 6px; animation-delay: 0.15s; }
@keyframes waveAnim { 0%,100% { transform: scaleY(0.4); opacity: 0.4; } 50% { transform: scaleY(1); opacity: 1; } }

/* ── CONFIG ── */
.cfg-block { overflow: hidden; margin-bottom: 2px; }
.cfg-hd { padding: 10px 0 8px; font-family: var(--sans); font-size: 9px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--t2); border-bottom: 1px solid rgba(255,255,255,0.05); margin-top: 8px; }
.cfg-row { background: var(--s2); position: relative; border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; margin-bottom: 6px; padding: 13px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; box-shadow: 3px 5px 12px rgba(0,0,0,0.5), -1px -2px 4px rgba(255,255,255,0.04); transition: all 0.1s; }

.cfg-key { font-family: var(--sans); font-size: 14px; color: var(--t0); font-weight: 500; }
.cfg-lbl { font-family: var(--sans); font-size: 14px; color: var(--t0); flex: 1; font-weight: 500; }
.cfg-val { font-family: var(--mono); font-size: 11px; color: var(--t2); display: flex; align-items: center; gap: 6px; }
.sdot { width: 6px; height: 6px; border-radius: 50%; }
.sdot-on { background: var(--app); }
.sdot-off { background: var(--s4); }

/* ── OVERLAY / SHEETS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 10100; display: none; align-items: flex-end; justify-content: center; -webkit-tap-highlight-color: transparent; }

  border-top: none;
  border-radius: 18px 20px 0 0;
  overflow-y: auto;
  padding: 12px 20px 28px;
  padding-bottom: calc(28px + var(--safe-b));
  box-shadow: 0 -20px 60px rgba(0,0,0,0.8);
  animation: su 0.24s cubic-bezier(0.32,0.72,0,1);
}
@keyframes su { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.grab { width: 32px; height: 3px; background: var(--s4); border-radius: 99px; margin: 0 auto 16px; }
.sh-eye { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--t2); margin-bottom: 4px; }
.sh-title { font-family: var(--sans); font-size: 20px; font-weight: 900; letter-spacing: -0.01em; text-transform: uppercase; color: var(--t0); margin-bottom: 16px; }
.sh-acts { display: flex; gap: 6px; margin-top: 20px; }
.sh-ok { flex: 1; padding: 11px; border: none; border-radius: 12px; background:var(--accent-red); color:#050b10; box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 0 12px rgba(255,255,255,0.35), 0 0 28px rgba(127,144,162,0.18), inset 0 1px 0 rgba(255,255,255,0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.1); font-family: var(--sans); font-size: 13px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.sh-ok:hover { background: #c8dce8; box-shadow: 0 0 0 1px rgba(200,220,232,0.30), inset 0 1px 0 rgba(255,255,255,0.40); }
.sh-no { flex: 1; padding: 11px; border: var(--b2); border-radius: 3px; background: var(--s2); color: var(--t1); font-family: var(--sans); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.12s; }
.sh-no:hover { background: var(--s3); color: var(--t0); }
.f { display: flex; flex-direction: column; gap: 6px; }
.f-row { display: flex; gap: 8px; }
.fl { font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--t2); letter-spacing: 0.06em; text-transform: uppercase; }
.fh { font-family: var(--mono); font-size: 9px; color: var(--t2); letter-spacing: 0.04em; margin-top: -3px; opacity: 0.7; line-height: 1.4; }
.fc { background: var(--s2); border: var(--b2); border-radius: 3px; padding: 10px 12px; font-family: var(--sans); font-size: 14px; color: var(--t0); width: 100%; outline: none; transition: border-color 0.12s; resize: none; appearance: none; }
.fc:focus { border-color: rgba(255,255,255,0.27); }
.fc::placeholder { color: var(--t2); font-size: 13px; }
.sh-sep { height: 1px; background: var(--s4); margin: 14px 0; }
.f-small { font-size: 12px; color: var(--t2); }
.stat-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
.sopt { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border: var(--b2); border-radius: 3px; background: var(--s2); cursor: pointer; transition: all 0.12s; font-family: var(--sans); font-size: 12px; color: var(--t1); }
.sopt:hover { background: var(--s3); color: var(--t0); border-color: #333; }
.sopt:active { background: var(--s4); }
.sopt.on { border-color: var(--oc, var(--y)); color: var(--oc, var(--y)); background: var(--s3); }
.sopt-dot { width: 6px; height: 6px; flex-shrink: 0; border-radius: 1px; }
.color-picker-row { display: flex; gap: 6px; flex-wrap: wrap; }
.cp-swatch { width: 22px; height: 22px; border-radius: 2px; cursor: pointer; transition: all 0.12s; border: 2px solid transparent; }
.cp-swatch.on { border-color: var(--t0); box-shadow: 0 0 0 1px var(--t0); }
.sh-acts-full { display: flex; gap: 6px; margin-top: 12px; }
.sh-title-sm { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--t2); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; margin-top: 12px; }
.sub-item-sheet { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--s2); border: var(--b2); border-radius: 3px; margin-bottom: 3px; }
.sub-item-sheet-txt { font-family: var(--sans); font-size: 13px; color: var(--t1); flex: 1; }
.sub-del { background: none; border: none; color: var(--t2); font-size: 16px; cursor: pointer; padding: 0; transition: color 0.1s; }

.dep-badge { font-family: var(--sans); font-size: 10px; font-weight: 600; color: var(--t2); display: flex; align-items: center; gap: 3px; }

.vlog-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.vlog-body { flex: 1; min-width: 0; }
.vlog-label { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--t0); }
.vlog-date { font-family: var(--mono); font-size: 10px; color: var(--t2); margin-top: 2px; }
.vlog-notes { font-size: 12px; color: var(--t2); margin-top: 3px; }

/* ── SEARCH ── */
.search-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; display: none; flex-direction: column; align-items: center; padding-top: 80px; }
.search-overlay.open { display: flex; }
.search-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; display: none; flex-direction: column; align-items: center; padding-top: 80px; backdrop-filter: blur(4px); }

.search-box { width: calc(100% - 32px); max-width: 480px; background: var(--s2); border: 1px solid rgba(255,255,255,0.13); border-radius: 16px; display: flex; align-items: center; gap: 10px; padding: 14px 16px; margin-bottom: 6px; }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: calc(var(--nav-h) + var(--safe-b) + 12px); left: 50%; transform: translateX(-50%); z-index: 600; display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; white-space: nowrap; }
.toast { background: var(--s3); border: var(--b2); border-top: 1px solid transparent; background-image: linear-gradient(var(--s3), var(--s3)), linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(255,255,255,0.95) 40%, rgba(255,255,255,1.0) 50%, rgba(255,255,255,0.95) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); background-origin: border-box; background-clip: padding-box, border-box; box-shadow: 0 -3px 14px rgba(255,255,255,0.12), 0 -1px 6px rgba(127,144,162,0.15); border-radius: 10px; padding: 9px 18px; font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--t0); animation: tpop 0.2s cubic-bezier(0.16,1,0.3,1); pointer-events: auto; }
@keyframes tpop { from { transform: translateY(8px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.toast.out { animation: tout 0.16s ease forwards; }
@keyframes tout { to { transform: translateY(4px) scale(0.96); opacity: 0; } }

/* ── SCHEDULE ── */

/* ── HALFTONE DOT PATTERN ── */
.halftone-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.halftone-bg::before,
.halftone-bg::after {
  content: '';
  position: absolute;
  inset: -50%;
  width: 200%;
  height: 200%;
}

/* Primary dot grid — green dots fading out */
.halftone-bg::before {
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,255,255,0.17) 1px, transparent 1px);
  background-size: 18px 18px, 18px 18px;
  background-position: 0 0, 9px 9px;
  /* Diamond mask — fade toward edges */
  mask-image: 
    radial-gradient(ellipse 60% 60% at 30% 25%, rgba(255,255,255,0.95) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 75% 70%, rgba(255,255,255,0.62) 0%, transparent 65%),
    radial-gradient(ellipse 35% 40% at 15% 75%, rgba(255,255,255,0.36) 0%, transparent 60%),
    radial-gradient(ellipse 30% 35% at 85% 20%, rgba(255,255,255,0.27) 0%, transparent 55%);
  -webkit-mask-image: 
    radial-gradient(ellipse 60% 60% at 30% 25%, rgba(255,255,255,0.95) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 75% 70%, rgba(255,255,255,0.62) 0%, transparent 65%),
    radial-gradient(ellipse 35% 40% at 15% 75%, rgba(255,255,255,0.36) 0%, transparent 60%),
    radial-gradient(ellipse 30% 35% at 85% 20%, rgba(255,255,255,0.27) 0%, transparent 55%);
  mask-composite: add;
  -webkit-mask-composite: source-over;
  transform: rotate(-30deg);
  animation: halftone-drift 20s ease-in-out infinite alternate;
}

/* Secondary dot grid — offset, dimmer */
.halftone-bg::after {
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.19) 1.5px, transparent 1.5px);
  background-size: 28px 28px;
  background-position: 0 0;
  mask-image: 
    radial-gradient(ellipse 45% 55% at 65% 35%, rgba(255,255,255,0.71) 0%, transparent 65%),
    radial-gradient(ellipse 40% 45% at 20% 60%, rgba(255,255,255,0.43) 0%, transparent 60%);
  -webkit-mask-image: 
    radial-gradient(ellipse 45% 55% at 65% 35%, rgba(255,255,255,0.71) 0%, transparent 65%),
    radial-gradient(ellipse 40% 45% at 20% 60%, rgba(255,255,255,0.43) 0%, transparent 60%);
  mask-composite: add;
  -webkit-mask-composite: source-over;
  transform: rotate(15deg);
  animation: halftone-drift2 25s ease-in-out infinite alternate;
}

@keyframes halftone-drift {
  0%   { transform: rotate(-30deg) translate(0, 0); }
  50%  { transform: rotate(-28deg) translate(8px, -6px); }
  100% { transform: rotate(-32deg) translate(-6px, 8px); }
}
@keyframes halftone-drift2 {
  0%   { transform: rotate(15deg) translate(0, 0); }
  50%  { transform: rotate(17deg) translate(-5px, 8px); }
  100% { transform: rotate(13deg) translate(7px, -5px); }
}

/* Compact version for dossier/hangar hero */
.halftone-sm::before {
  mask-image: 
    radial-gradient(ellipse 70% 70% at 80% 50%, rgba(255,255,255,0.95) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 20% 80%, rgba(255,255,255,0.36) 0%, transparent 60%);
  -webkit-mask-image: 
    radial-gradient(ellipse 70% 70% at 80% 50%, rgba(255,255,255,0.95) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 20% 80%, rgba(255,255,255,0.36) 0%, transparent 60%);
  animation-duration: 15s;
}
.halftone-sm::after {
  opacity: 0.6;
  animation-duration: 18s;
}

/* ── BOTTOM NAV ── */
.bnav {
  height: auto;
  padding-top: 8px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  display: flex; flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.6);
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 300; overflow-x: hidden; scrollbar-width: none;
  width: 100%; box-sizing: border-box;
  transform: translateZ(0);
  -webkit-transform: translateZ(0);
  will-change: transform;
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px);
}
.bnav::before {
  content: ''; position: fixed; bottom: -1px; left: 0; right: 0;
  height: calc(env(safe-area-inset-bottom, 0px) + 2px);
  background: var(--s1); z-index: 301; pointer-events: none;
}
.bnav::after { display: none; }
.bnav::-webkit-scrollbar { display: none; }
.nb {
  flex: 1; min-width: 44px; height: 52px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding-top: 4px;
  background: none; border: none; cursor: pointer;
  color: var(--t2); transition: all 0.12s; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nb svg { width: 18px; height: 18px; stroke-width: 1.5; }
.nb .nl { font-family: var(--sans); font-size: 8px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.nb.on { color: rgba(255,255,255,0.92); }
.nb.on::after {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  box-shadow: 0 0 6px var(--y2);
  width: 28px; height: 2px; background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.4) 15%, rgba(200,220,232,0.90) 40%, rgba(200,220,232,1.0) 50%, rgba(200,220,232,0.90) 60%, rgba(127,144,162,0.4) 85%, transparent 100%); border-radius: 0 0 2px 2px;
}

/* ── DESKTOP ── */

  /* Nav items — horizontal row style */

    flex-direction: row;
    justify-content: flex-start;
    align-items: center;

    width: 100%;

  .nb .nl { font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .nb.on { background: var(--s1); color: #ffffff; filter: drop-shadow(0 0 4px rgba(255,255,255,0.35)) drop-shadow(0 0 10px rgba(127,144,162,0.2)); }
  .nb.on::after {

  }

  /* ── MAIN COLUMN ── */
  .shell > .topbar,
  .shell > .page-area {
    /* These are now inside .main-col wrapper via JS — handled via CSS order */
  }

  /* Topbar — horizontal strip across main area */
  .topbar {
    width: auto;
    height: 52px;
    flex-direction: row;
    align-items: center;
    padding: 0 24px;
    border: 1px solid rgba(255,255,255,0.05);

  .tb-r { margin-left: auto; flex-direction: row; gap: 6px; }
  .tb-btn { width: auto; }

  /* Page area fills remaining space */
  .page-area {
    flex: 1;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    padding-bottom: 0;
  }

  /* Pages — generous desktop padding, scrollable */
  .page {
    padding: 28px 32px 0;
    padding-bottom: 32px;
    height: 100%;
    overflow-y: auto;
  }

  /* Content layout constraints */
  .show-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
  #shots-stats { grid-template-columns: repeat(5, minmax(0,1fr)) !important; }

  /* ── HANGAR — two-column layout ── */
  #pg-hangar .page-split {
    display: grid;
    grid-template-columns: 1fr 320px;

    align-items: start;
  }

  /* Shots — wider stat row */
  .stat-row { grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }

  /* Plan — split: timeline 60% | tasks 40% */

  /* Intel — centered content */
  .msg { max-width: 60%; }

  /* Vault — split: list | editor */
  #vault-delete-btn { display: flex !important; } /* always visible on desktop */

  /* Sheets — centered modal */
  .overlay { align-items: center; justify-content: center; padding: 48px; }
  .sheet { max-height: 80vh; border-radius: 6px; max-width: 520px; width: 100%; }

  /* Config — two-column sections */
  #pg-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 0 32px; }

  /* Plan quick-add sheet — centered instead of bottom */
  #plan-qa-sheet {
    position: fixed;

  /* Plan task sheet — right panel */
  #plan-task-sheet {

    border-top: none;

}

/* ── SHELL FLEX ORDER on desktop ── */
@media (min-width: 768px) {
  /* Shell children order: bnav(-1) | topbar(0) + page-area(1) */
  /* Topbar + page-area stack vertically inside the main area */
  /* We need a wrapper — achieve with CSS column flex on the right side */
  .shell {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: 52px 1fr;
  }
  .bnav {
    grid-column: 1;
    grid-row: 1 / 3;
  }
  .topbar {
    grid-column: 2;
    grid-row: 1;
    height: 52px;
  }
  .page-area {
    grid-column: 2;
    grid-row: 2;
    overflow: hidden;
  }
}


/* ── INDEX SHELL ── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #1a1a1c; color: #ececee; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  --bg:   #1a1a1c;
  --s1:   #1f1f21;
  --s2:   #222224;
  --s3:   #272729;
  --s4:   #2e2e30;
  --t0:   #ececee;
  --t1:   #b0b0bc;

  --card-shadow: 4px 6px 18px rgba(0,0,0,0.55), -1px -2px 5px rgba(255,255,255,0.04);

/* ── TOPBAR ── */
.topbar {

  padding: 6px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: var(--t1);
  cursor: pointer; transition: all 0.1s;
}
.mod-btn.primary {
  background: rgba(255,255,255,0.90); color: #08080e;
  border-color: transparent; font-weight: 800;
}
.mod-btn:active { transform: scale(0.96); }

/* Module content scroll area */
.module-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none; padding-bottom: calc(var(--safe-b) + 16px);
}
.module-content::-webkit-scrollbar { display: none; }

/* ── PLACEHOLDER MODULE CONTENT ── */
.module-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 16px; padding: 40px 24px; text-align: center;
}
.placeholder-icon {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, rgba(40,40,50,0.9), rgba(30,30,38,0.95));
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: var(--card-shadow);
  position: relative;
}
.placeholder-icon::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2) 40%, rgba(255,255,255,0.3) 50%, rgba(127,144,162,0.2) 60%, transparent);
}
.placeholder-name {
  font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
  color: #c8cdd8;
}
.placeholder-desc { font-size: 13px; color: var(--t2); line-height: 1.6; max-width: 280px; }
.placeholder-cta {
  padding: 10px 24px; border-radius: 20px;
  background: rgba(255,255,255,0.88); color: #08080e;
  font-family: var(--mono); font-size: 10px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: none; cursor: pointer; transition: all 0.12s;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 0 14px rgba(255,255,255,0.15);
}

/* Feature grid */
.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px; margin-top: 12px; }
.feature-item {
  background: var(--s2); border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px; padding: 12px; position: relative; overflow: hidden;
  box-shadow: 3px 5px 12px rgba(0,0,0,0.4);
}
.feature-item::before {
  content: '';
  position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10) 40%, rgba(255,255,255,0.18) 50%, rgba(127,144,162,0.10) 60%, transparent);
}
.feature-icon { margin-bottom: 8px; opacity: 0.6; }
.feature-title { font-size: 10px; font-weight: 700; color: var(--t0); letter-spacing: 0.04em; margin-bottom: 3px; }
.feature-desc { font-size: 10px; color: var(--t3); line-height: 1.45; }

/* ── FOOTER NAV ── */
.footer-nav {
  flex-shrink: 0;
  display: flex; align-items: stretch;
  background: var(--s1);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-bottom: var(--safe-b);
  position: relative;
}
.footer-nav::before {
  content: '';
  position: absolute; top: -1px; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(127,144,162,0.25) 15%, rgba(255,255,255,0.65) 50%, rgba(127,144,162,0.25) 85%, transparent 100%);
}
.fnav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  padding: 10px 0 8px;
  background: none; border: none;
  cursor: pointer; transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.fnav-btn:active { background: rgba(255,255,255,0.03); }
.fnav-btn svg { opacity: 0.45; transition: opacity 0.1s; }
.fnav-btn:active svg { opacity: 0.7; }
.fnav-lbl {
  font-family: var(--mono); font-size: 8px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase; color: var(--t3);
  transition: color 0.1s;
}
.fnav-btn:active .fnav-lbl { color: var(--t2); }
.fnav-divider {
  width: 1px; background: rgba(255,255,255,0.05);
  margin: 10px 0;
}
/* Primary action (+ SHOT) stands out */
.fnav-btn.primary .fnav-lbl { color: rgba(255,255,255,0.88); }
.fnav-btn.primary svg { opacity: 0.9; }
.fnav-btn.primary::after {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.5) 60%, transparent);
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}


/* ══════════════════════════════════════
   GESTURE SYSTEM
══════════════════════════════════════ */

/* Swipe container wraps the card */
.swipe-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  margin-bottom: 6px;
}
.swipe-wrap .tcard,
.swipe-wrap .shot-row {
  margin-bottom: 0;
  border-radius: 16px;
  transition: transform 0.18s cubic-bezier(0.32,0.72,0,1), box-shadow 0.18s;
  will-change: transform;
  touch-action: pan-y;
  position: relative;
  z-index: 2;
}

/* Swipe action reveals */
.swipe-action {
  position: absolute; top: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 20px;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  z-index: 1; pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
  white-space: nowrap;
}
.swipe-action.left  { right: 0; border-radius: 0 16px 16px 0; }
.swipe-action.right { left: 0;  border-radius: 16px 0 0 16px; }
.swipe-action.done-action  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
.swipe-action.defer-action { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
.swipe-action.edit-action  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
.swipe-action.copy-action  { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
.swipe-action.show { opacity: 1; }
.swipe-action svg  { opacity: 0.8; flex-shrink: 0; }

/* Press spring — tap feedback */
.tcard:active,
.shot-row:active,
.module-card:active {
  transform: scale(0.985) !important;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.5) !important;
}

/* Pull to refresh */
.ptr-indicator {
  height: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  transition: height 0.2s;
  font-family: var(--mono); font-size: 9px; color: var(--t3);
  letter-spacing: 0.1em; text-transform: uppercase; gap: 8px;
}
.ptr-indicator.show { height: 44px; }
.ptr-spin {
  width: 14px; height: 14px;
  border: 1.5px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Undo toast */
.undo-toast {
  position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 80px);
  left: 50%; transform: translateX(-50%);
  background: var(--s3); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px; padding: 10px 20px;
  display: flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 11px; color: var(--t1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), var(--glow-sm);
  z-index: 9999; opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap;
}
.undo-toast.show {
  opacity: 1; pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.undo-btn {
  background: rgba(255,255,255,0.88); color: #08080e;
  border: none; border-radius: 20px; padding: 4px 12px;
  font-family: var(--mono); font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; cursor: pointer;
}

/* Badge on module cards */
.mc-badge {
  position: absolute; top: 10px; right: 36px;
  min-width: 18px; height: 18px; border-radius: 9px;
  background: radial-gradient(ellipse at 35% 35%, #c8dce8 0%, rgba(127,144,162,0.90) 45%, rgba(90,110,130,0.80) 100%);
  color: #08080e; font-family: var(--mono); font-size: 9px;
  font-weight: 900; display: flex; align-items: center;
  justify-content: center; padding: 0 5px;
  box-shadow: 0 0 8px rgba(255,255,255,0.25), 0 0 16px rgba(127,144,162,0.15);
}

/* Global search overlay */
.search-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  display: flex; flex-direction: column;
  padding: calc(env(safe-area-inset-top,0px) + 16px) 16px 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.search-overlay.open { opacity: 1; pointer-events: all; }
.search-bar-wrap {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.search-bar {
  flex: 1; background: var(--s2); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; color: var(--t0); font-family: var(--mono);
  font-size: 14px; padding: 12px 16px; outline: none;
}
.search-cancel {
  background: none; border: none; color: var(--t2);
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; cursor: pointer; padding: 4px;
  text-transform: uppercase;
}
.search-results {
  flex: 1; overflow-y: auto; scrollbar-width: none;
}
.search-results::-webkit-scrollbar { display: none; }
.search-group-label {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: linear-gradient(160deg, #909098, #70707a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  padding: 10px 4px 6px;
}
.search-result-item {
  background: var(--s2); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 10px 14px; margin-bottom: 6px;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: background 0.1s; position: relative; overflow: hidden;
}
.search-result-item::before {
  content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.14) 50%, rgba(127,144,162,0.08) 60%, transparent);
}
.search-result-item:active { background: var(--s3); }
.sr-icon { opacity: 0.5; flex-shrink: 0; }
.sr-body { flex: 1; min-width: 0; }
.sr-title {
  font-size: 13px; font-weight: 500;
  background: linear-gradient(160deg, #ffffff, #d0d4f0);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sr-sub { font-family: var(--mono); font-size: 10px; color: var(--t2); margin-top: 2px; }
.sr-tag {
  font-family: var(--mono); font-size: 8px; color: var(--t3);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
  padding: 2px 7px; flex-shrink: 0;
}
.search-empty {
  text-align: center; padding: 40px 20px;
  font-family: var(--mono); font-size: 11px; color: var(--t3);
  letter-spacing: 0.06em;
}

/* Empty states */
.module-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px; gap: 12px;
  text-align: center;
}
.module-empty-icon { opacity: 0.2; margin-bottom: 4px; }
.module-empty-title {
  font-size: 14px; font-weight: 600;
  color: #c8cdd8;
}
.module-empty-sub { font-size: 12px; color: var(--t3); line-height: 1.6; max-width: 260px; }
.module-empty-cta {
  margin-top: 8px; padding: 9px 22px; border-radius: 20px;
  background: rgba(255,255,255,0.88); color: #08080e;
  font-family: var(--mono); font-size: 10px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: none; cursor: pointer;
  box-shadow: 0 0 12px rgba(255,255,255,0.15);
}

/* Task templates */
.template-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  padding: 8px 16px 0;
}
.template-btn {
  background: var(--s2); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 10px 12px;
  cursor: pointer; text-align: left; position: relative; overflow: hidden;
  transition: all 0.1s; -webkit-tap-highlight-color: transparent;
}
.template-btn::before {
  content: ''; position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10) 40%, rgba(255,255,255,0.16) 50%, rgba(127,144,162,0.10) 60%, transparent);
}
.template-btn:active { transform: scale(0.97); background: var(--s3); }
.template-name {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #c8cdd8;
  margin-bottom: 2px;
}
.template-desc { font-size: 10px; color: var(--t3); line-height: 1.3; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.module-card { animation: fadeUp 0.3s ease both; }
.module-card:nth-child(1) { animation-delay: 0.05s; }
.module-card:nth-child(2) { animation-delay: 0.10s; }
.module-card:nth-child(3) { animation-delay: 0.15s; }
.module-card:nth-child(4) { animation-delay: 0.20s; }
.module-card:nth-child(5) { animation-delay: 0.25s; }
.quick-bar { animation: fadeUp 0.3s 0.30s ease both; }

/* Slide transition */
.view { transition: opacity 0.18s ease; }
.view:not(.active) { opacity: 0; pointer-events: none; }
.view.active { opacity: 1; }


/* ── APP LAYOUT ── */
html, body { height:100%; overflow:hidden; }
.shell { height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
#view-index { flex:1; display:flex; flex-direction:column; height:100dvh; overflow:hidden; }

/* Module views slide in over index */
.module-view {
  display:none;
  width:100%;
  flex:1;
  min-height:0;
  flex-direction:column;
  background:var(--bg);
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
}
.module-view.open {
  display:flex;
}

/* Module topbar */
.module-topbar {
  display:flex; align-items:center; gap:12px;
  padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
  flex-shrink:0; background:var(--s1);
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:relative;
  touch-action:manipulation;
}
.module-topbar::after {
  content:''; position:absolute; bottom:-1px; left:8%; right:8%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(127,144,162,0.3) 15%,rgba(255,255,255,0.65) 50%,rgba(127,144,162,0.3) 85%,transparent 100%);
  opacity:0.45;
}
.back-btn {
  display:flex; align-items:center; gap:5px;
  background:none; border:none; color:var(--t1);
  -webkit-text-fill-color:var(--t1);
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  cursor:pointer; padding:10px 12px 10px 0; flex-shrink:0;
  min-height:44px; min-width:44px;
  -webkit-tap-highlight-color:transparent; transition:color 0.1s;
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
}
.back-btn svg { color: #21e1df; stroke: #21e1df; }
.back-btn:active { color:var(--t0); }
.back-btn span, .back-btn svg { -webkit-user-select:none; user-select:none; pointer-events:none; }
.module-title-lbl {
  font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:800;
  letter-spacing:0.10em; text-transform:uppercase;
  color:#f4f7fa; -webkit-text-fill-color:#f4f7fa;
}
.module-actions-bar { margin-left:auto; display:flex; gap:4px; align-items:center; overflow-x:auto; -webkit-overflow-scrolling:touch; flex-shrink:0; min-width:0; padding-right:2px; }
.module-actions-bar::-webkit-scrollbar{display:none;}
.tb-btn{white-space:nowrap;flex-shrink:0;}
.tb-icon{padding:5px 6px !important;font-size:10px;}
.module-actions-bar .tb-btn{padding:0 8px;height:28px;font-size:10px;}

/* Module scroll */
.module-scroll {
  flex:1;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
}
.module-scroll::-webkit-scrollbar { display:none; }

/* v16 pages inside module-scroll */
.module-scroll .page { display:none; height:auto !important; overflow:visible !important; padding-bottom:8px !important; }
.module-scroll .page.on { display:block; }

/* Full-height modules */
#mv-intel .module-scroll { padding-bottom:0; display:flex; flex-direction:column; }
#mv-vault .module-scroll { padding-bottom:0; display:flex; flex-direction:column; }
#mv-schedule .module-scroll { padding-bottom:0; display:flex; flex-direction:column; }

/* ═══════════════════════════════════════
   HANGAR v2 — redesigned two-view module
   ═══════════════════════════════════════ */

/* View container */
.hng-view {
  display: flex; flex-direction: column;
  flex: 1; overflow: hidden;
  position: absolute; inset: 0; top: 48px; /* below topbar */
}
#mv-hangar .module-topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 2; }

/* Status banner */
.hng-banner {
  display: flex; align-items: center;
  background: transparent;
  margin: 8px 16px 0;
  padding: 4px 0 14px; overflow: hidden;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.hng-banner-cell {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
}
.hng-banner-sep {
  width: 1px; align-self: stretch;
  background: rgba(255,255,255,0.09);
  margin: 4px 0;
}
.hng-b-n {
  font-family: var(--mono); font-size: 26px; font-weight: 700;
  color: #e0dcd4; line-height: 1; letter-spacing: -0.02em;
}
.hng-b-l {
  font-family: var(--sans); font-size: 9px; font-weight: 500;
  color: var(--t3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px;
}
.hng-wip  { color: rgba(255,255,255,0.45); }
.hng-blk  { color: rgba(244,247,250,0.92); text-shadow: 1px 2px 0 rgba(0,0,0,0.95); }
.hng-done { color: rgba(255,255,255,0.65); }

/* Section headers */
.hng-row-head {
  display: flex; align-items: center;
  padding: 18px 16px 6px;
}
.hng-row-lbl {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  color: var(--t3); letter-spacing: 0.12em; flex: 1;
}
.hng-row-add {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  color: var(--t2); background: none; border: var(--b2);
  border-radius: 4px; padding: 2px 7px; cursor: pointer;
  letter-spacing: 0.05em;
}
.hng-row-add:active { color: var(--t0); background: var(--s3); }
.hng-row-ct {
  font-family: var(--mono); font-size: 9px; color: var(--t3);
}

/* Show cards grid — new card style matching index */
.hng-show-grid {
  display: flex; flex-direction: column;
  gap: 10px; padding: 0 16px 8px;
}
.hng-show-card {
  background: linear-gradient(155deg, var(--s4) 0%, var(--s3) 55%, var(--s2) 100%); border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.055);
  border-left: 3px solid rgba(232,237,242,0.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.72), 0 6px 28px rgba(0,0,0,0.92);
  overflow: hidden; cursor: pointer;
  transition: transform 0.12s, background 0.12s;
  display: flex; flex-direction: column;
}
.hng-show-card:active { transform: scale(0.985); background: var(--s3); }
.hng-show-card:hover { background: linear-gradient(155deg, var(--s5) 0%, var(--s4) 55%, var(--s3) 100%); border-left-color: rgba(232,237,242,0.45); }
.hng-show-card-accent { display: none; }
.hng-show-card-body {
  padding: 16px 18px 18px; display: flex; gap: 14px; align-items: flex-start;
}
.hng-show-card-left { flex: 1; min-width: 0; }
.hng-show-card-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.hng-show-code {
  font-family: var(--mono); font-size: 15px; font-weight: 700;
  color: var(--t0); letter-spacing: 0.04em;
}
.hng-show-name {
  font-family: var(--sans); font-size: 12px; color: var(--t2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hng-show-prog-track {
  height: 1px; background: rgba(255,255,255,0.05); border-radius: 0;
  overflow: hidden; margin: 8px 0 6px;
}
.hng-show-prog-fill { height: 100%; border-radius: 1px; background: var(--accent); transition: width 0.4s ease; }
.hng-show-meta {
  display: flex; gap: 10px;

/* ════════════════════════════
   STAGGER ENTRANCE ANIMATIONS
════════════════════════════ */
@keyframes vtek-fade-up {
  0%   { opacity: 0; transform: translateY(16px); }
  60%  { opacity: 1; }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes vtek-fade-in {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

.stagger-child {
  opacity: 0;
  animation: vtek-fade-up 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
}
.stagger-child:nth-child(1)  { animation-delay: 0.08s; }
.stagger-child:nth-child(2)  { animation-delay: 0.18s; }
.stagger-child:nth-child(3)  { animation-delay: 0.28s; }
.stagger-child:nth-child(4)  { animation-delay: 0.36s; }
.stagger-child:nth-child(5)  { animation-delay: 0.43s; }
.stagger-child:nth-child(6)  { animation-delay: 0.49s; }
.stagger-child:nth-child(7)  { animation-delay: 0.54s; }
.stagger-child:nth-child(8)  { animation-delay: 0.58s; }
.stagger-child:nth-child(9)  { animation-delay: 0.61s; }
.stagger-child:nth-child(n+10) { animation-delay: 0.63s; }

.stagger-banner {
  opacity: 0;
  animation: vtek-fade-in 0.55s cubic-bezier(0.16,1,0.3,1) forwards 0.05s;
}
.stagger-section {
  opacity: 0;
  animation: vtek-fade-up 0.60s cubic-bezier(0.16,1,0.3,1) forwards;
}

/* reset on re-trigger — JS removes and re-adds the class */
.stagger-child.no-anim { animation: none; opacity: 1; }

════════════════════════════════ */

.editor-bar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--s1);border-bottom:var(--b1);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;}

#v-edit > .editor-textarea,

.vault-search-in::placeholder{color:var(--t3);}
.vault-search-x{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px 8px;min-height:36px;min-width:36px;touch-action:manipulation;}
.vault-arch-toggle { background:linear-gradient(180deg,var(--s4) 0%,var(--s3) 100%); border:var(--b2); color:var(--t1); font-family:var(--sans); font-size:10px; font-weight:600; padding:0 10px; height:30px; border-radius:6px; cursor:pointer; letter-spacing:0.04em; text-transform:uppercase; display:inline-flex; align-items:center; box-shadow:inset 0 1px 0 rgba(255,255,255,0.09),inset 0 -1px 0 rgba(0,0,0,0.65); touch-action:manipulation; }

.vault-new-row { display:flex; align-items:center; gap:8px; padding:7px 10px 7px 14px; cursor:pointer; transition:background 0.08s; -webkit-tap-highlight-color:transparent; background:transparent; border-radius:4px; margin:4px 4px 1px; touch-action:manipulation; -webkit-user-select:none; user-select:none; }
.vault-new-row:hover { background:var(--s2); } .vault-new-row:active { background:var(--s3); }
.vault-new-icon { font-size:14px; color:var(--t2); flex-shrink:0; } .vault-new-label { font-family:var(--sans); font-size:12px; font-weight:400; color:var(--t2); }
.vault-list-section{padding-top:4px;}
.vault-list-sec-lbl { font-family:var(--sans); font-size:10px; font-weight:600; letter-spacing:0.04em; color:var(--t2); padding:10px 10px 4px 14px; background:transparent; display:flex; align-items:center; gap:6px; }
.vault-doc-row { display:flex; align-items:center; gap:8px; padding:10px 12px 10px 14px; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; position:relative; background:var(--s2); border:1px solid rgba(255,255,255,0.04); border-radius:14px; margin:3px 4px; box-shadow:3px 5px 12px rgba(0,0,0,0.5),-1px -2px 4px rgba(255,255,255,0.04); touch-action:manipulation; -webkit-user-select:none; user-select:none; }
.vault-doc-row:hover { background:var(--s1); } .vault-doc-row:active { background:var(--s3); } .vault-doc-row.on { background:rgba(255,255,255,0.07); }
.vault-doc-icon { display:none; }
.vault-doc-info{flex:1;min-width:0;}
.vault-doc-title { font-family:var(--sans); font-size:13px; font-weight:500; background:linear-gradient(160deg,#dce8f0 0%,#7f90a2 60%,#2a3d50 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.vault-doc-meta { font-family:var(--mono); font-size:9px; color:var(--t1); display:flex; gap:6px; margin-top:1px; }
.vault-doc-chevron { color:var(--t2); font-size:12px; flex-shrink:0; }
.editor-view{display:flex;flex-direction:column;flex:1;min-height:0;}
.editor-topbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:var(--b1);background:var(--s1);flex-shrink:0;}
.editor-back{background:none;border:none;color:var(--teal);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;padding:8px;cursor:pointer;touch-action:manipulation;}
.editor-title-in{width:100%;background:transparent;border:none;color:var(--t0);font-family:var(--sans);font-size:20px;font-weight:700;padding:14px 20px 4px;outline:none;letter-spacing:-0.01em;flex-shrink:0;flex-grow:0;flex-basis:auto;}
.editor-title-in::placeholder{color:var(--t3);}
.editor-save{background:#fff;color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:7px 14px;border-radius:8px;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}
.editor-del{background:none;border:var(--b2);color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:700;padding:7px 10px;border-radius:8px;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}
.editor-textarea{flex:1;width:100%;background:transparent;border:none;color:var(--t0);font-family:var(--sans);font-size:15px;line-height:1.6;padding:14px 20px;outline:none;resize:none;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.vault-tag-row{display:flex;gap:6px;padding:6px 20px 10px;flex-shrink:0;}
.vault-doc-tag{display:inline-block;padding:3px 8px;background:var(--s3);border:var(--b2);color:var(--t1);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.08em;border-radius:4px;}
.mode-toggle{display:flex;gap:0;background:var(--s2);border:var(--b2);border-radius:8px;overflow:hidden;margin-right:6px;flex-shrink:0;}

.vault-preview{flex:1;width:100%;padding:14px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.7;}
.vault-preview h1{font-size:20px;font-weight:800;margin:12px 0 8px;color:var(--t0);letter-spacing:-0.01em;}
.vault-preview h2{font-size:17px;font-weight:700;margin:10px 0 6px;color:var(--t0);}
.vault-preview h3{font-size:14px;font-weight:700;margin:8px 0 4px;color:var(--t1);letter-spacing:0.02em;}
.vault-preview p{margin:6px 0;}
.vault-preview ul{margin:6px 0;padding-left:20px;}
.vault-preview li{margin:2px 0;}
.vault-preview hr{border:none;border-top:var(--b1);margin:14px 0;}
.vault-preview code{background:var(--s3);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:12px;color:var(--teal);}

.vault-preview em{color:var(--t1);font-style:italic;}
.type-picker{display:flex;gap:0;background:var(--s2);border:var(--b2);border-radius:8px;overflow:hidden;flex-shrink:0;}
.type-btn{padding:6px 9px;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.04em;cursor:pointer;min-height:32px;min-width:42px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.type-btn.on{background:var(--s4);color:var(--teal);}
.vault-doc-row.pinned { border-left:2px solid rgba(33,225,223,0.5); }
.vault-doc-row-tags { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; }
.vault-doc-row-tag { font-family:var(--sans); font-size:9px; font-weight:700; padding:2px 6px; border:1px solid #2e2e2e; border-radius:2px; color:var(--t1); background:var(--s1); letter-spacing:0.04em; text-transform:uppercase; display:inline-block; }
.vault-doc-type-icon{display:inline-block;width:14px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;font-weight:800;}
.vault-tag-row{display:flex;gap:6px;padding:6px 20px 10px;flex-shrink:0;flex-wrap:wrap;align-items:center;flex-grow:0;}
.vault-tag-row .vault-doc-tag{cursor:pointer;touch-action:manipulation;}
.vault-tag-row .vault-doc-tag.show-tag{background:var(--s4);color:var(--accent-hi);}
.vault-tag-row .vault-doc-tag.user-tag{background:rgba(33,225,223,0.1);color:var(--teal);border-color:rgba(33,225,223,0.2);}
.vault-tag-row .tag-add{background:var(--s2);color:var(--t2);border:1px dashed rgba(255,255,255,0.15);cursor:pointer;min-height:20px;}
.editor-textarea.code-mode{font-family:var(--mono);font-size:12.5px;line-height:1.55;letter-spacing:0;tab-size:2;white-space:pre;color:#d4d4d8;background:#0d0e13;border-top:1px solid #1a1c24;}
.editor-textarea.code-mode::placeholder{color:#3e4452;font-style:italic;}
.code-meta{display:flex;gap:10px;padding:6px 16px;background:#0d0e13;border-bottom:1px solid #1a1c24;flex-shrink:0;font-family:var(--mono);font-size:10px;color:#6b7280;}
.code-meta select{background:#1a1c24;color:#d4d4d8;border:1px solid #2a2d37;border-radius:4px;padding:2px 8px;font-family:var(--mono);font-size:10px;outline:none;}
.code-meta .code-copy{margin-left:auto;background:#1a1c24;border:1px solid #2a2d37;color:var(--teal);padding:3px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.06em;touch-action:manipulation;}
.code-preview{flex:1;overflow:auto;background:#0d0e13;padding:0;position:relative;}
.code-preview pre{margin:0;padding:14px 16px 14px 48px;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:#d4d4d8;white-space:pre;counter-reset:ln;}
.code-preview .ln{display:block;position:relative;}
.code-preview .ln::before{content:counter(ln);counter-increment:ln;position:absolute;left:-36px;width:28px;text-align:right;color:#3e4452;font-size:10px;user-select:none;}
.code-preview .k{color:#c586c0;}
.code-preview .s{color:#ce9178;}
.code-preview .n{color:#b5cea8;}
.code-preview .c{color:#6a9955;font-style:italic;}
.code-preview .f{color:#dcdcaa;}
.code-preview .t{color:#4ec9b0;}
.code-preview .p{color:#d4d4d8;}
.code-preview .copy-code-btn{position:absolute;top:8px;right:8px;background:#1a1c24;border:1px solid #2a2d37;color:var(--teal);padding:4px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;z-index:5;letter-spacing:0.06em;touch-action:manipulation;}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:var(--b1);cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.chk-row:active{background:var(--s2);}
.chk-box{width:20px;height:20px;border:1.5px solid var(--t2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.12s;}
.chk-row.done .chk-box{background:var(--teal);border-color:var(--teal);}

.chk-text{flex:1;font-size:14px;line-height:1.4;color:var(--t0);}

.chk-add-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:var(--b1);}
.chk-add-in{flex:1;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;border-radius:6px;min-height:36px;}
.chk-add-btn{background:var(--teal);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:8px 14px;border-radius:6px;cursor:pointer;letter-spacing:0.06em;min-height:36px;touch-action:manipulation;}
.snippet-view{flex:1;display:flex;flex-direction:column;min-height:0;}
.snippet-big-copy{background:var(--teal);color:#000;border:none;font-family:var(--mono);font-size:13px;font-weight:800;padding:14px;cursor:pointer;letter-spacing:0.12em;flex-shrink:0;touch-action:manipulation;}
.snippet-big-copy:active{background:#18c0be;}
.snippet-big-copy.copied{background:var(--s-app,#4ade80);}
.v-sheet-wrap{position:fixed;inset:0;z-index:900;pointer-events:none;}

.v-sheet-wrap.open{pointer-events:auto;}
.v-sheet-wrap.open .v-sheet-ovl{opacity:1;pointer-events:auto;}
.v-sheet{position:absolute;left:0;right:0;bottom:0;background:var(--s1);border-top:var(--b2);border-radius:14px 14px 0 0;max-height:72dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 28px calc(var(--safe-b)+28px);transform:translateY(100%);transition:transform 0.22s cubic-bezier(0.16,1,0.3,1);box-shadow:0 -8px 30px rgba(0,0,0,0.5);}
.v-sheet-wrap.open .v-sheet{transform:translateY(0);}
.pin-btn{background:none;border:var(--b2);color:var(--t2);font-family:var(--mono);font-size:11px;padding:6px 8px;border-radius:6px;cursor:pointer;min-height:32px;min-width:32px;touch-action:manipulation;}
.pin-btn.on{color:var(--teal);border-color:rgba(33,225,223,0.3);}
.md-toolbar{display:flex;gap:3px;padding:6px 10px;background:var(--s1);border-top:var(--b1);border-bottom:var(--b1);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;}

.edit-footer{padding:2px 12px;background:var(--s1);border-top:var(--b1);font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:0.08em;display:flex;gap:12px;flex-shrink:0;height:18px;line-height:14px;align-items:center;}

.att-viewer .vw-dl{background:var(--teal);color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:8px 14px;border-radius:6px;cursor:pointer;letter-spacing:0.08em;touch-action:manipulation;}

<script>
'use strict';
const BUILD_ID='VTEK-VAULT-20260418-19';
const LS='vtek9';

if(!S.vaultDocs)S.vaultDocs=[];
if(!S.vaultTags)S.vaultTags=[];

let activeId=null;
