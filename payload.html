*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{

body{display:flex;flex-direction:column;height:100dvh;min-height:-webkit-fill-available;overflow:hidden;}

.filter-bar::-webkit-scrollbar{display:none;}
.pl-fchip{flex-shrink:0;padding:8px 14px;border:none;border-bottom:2px solid transparent;background:transparent;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--t2);cursor:pointer;white-space:nowrap;touch-action:manipulation;}
.pl-fchip.on{color:#fff;font-weight:800;position:relative;}

      html+=`<div class="pl-sec"><span class="pl-sec-lbl">${show.code} ГўВЂВ” ${show.name}</span><span class="pl-sec-rule"></span></div>`;
      html+=st.map(t=>renderTCard(t)).join('');
    });
    const dn=tasks.filter(t=>t.done);
    if(dn.length)html+=`<div class="pl-sec" style="margin-top:14px"><span class="pl-sec-lbl">Completed</span><span class="pl-sec-rule"></span></div>`+dn.map(t=>renderTCard(t)).join('');
  }else if(plView==='tag'){
    const allTags=[...new Set(tasks.flatMap(t=>t.tags||[]))].filter(Boolean);
    allTags.forEach(tag=>{
      const tt=tasks.filter(t=>!t.done&&(t.tags||[]).includes(tag));if(!tt.length)return;
      html+=`<div class="pl-sec"><span class="pl-sec-lbl">${tag}</span><span class="pl-sec-rule"></span></div>`+tt.map(t=>renderTCard(t)).join('');
    });
    const untagged=tasks.filter(t=>!t.done&&!(t.tags||[]).length);
    if(untagged.length)html+=`<div class="pl-sec"><span class="pl-sec-lbl">Untagged</span><span class="pl-sec-rule"></span></div>`+untagged.map(t=>renderTCard(t)).join('');
    const dn=tasks.filter(t=>t.done);
    if(dn.length)html+=`<div class="pl-sec" style="margin-top:14px"><span class="pl-sec-lbl">Completed</span><span class="pl-sec-rule"></span></div>`+dn.map(t=>renderTCard(t)).join('');
  }else{
    const priGroups=[{key:'critical',label:'CRITICAL'},{key:'high',label:'HIGH'},{key:'med',label:'MED'},{key:'low',label:'LOW'}];
    const open=tasks.filter(t=>!t.done);
    let hasAny=false;
    priGroups.forEach(function(g){
      var gt=open.filter(function(t){return t.pri===g.key;});
      if(!gt.length)return;
      hasAny=true;
      html+=`<div class="pl-sec"><span class="pl-sec-dot"></span><span class="pl-sec-lbl">${g.label}</span><span class="pl-sec-rule"></span></div>`;
      html+=gt.map(t=>renderTCard(t)).join('');
    });
    const dn=tasks.filter(t=>t.done);
    if(dn.length)html+=`<div class="pl-sec" style="margin-top:14px"><span class="pl-sec-dot"></span><span class="pl-sec-lbl">COMPLETED</span><span class="pl-sec-rule"></span></div>`+dn.map(t=>renderTCard(t)).join('');
    if(!tasks.length)html=emptyState('<svg viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="white" stroke-width="1.2"><rect x="4" y="4" width="24" height="24" rx="3"/><path d="M10 16l4 4 8-8"/></svg>','ALL CLEAR','No open tasks. Tap + TASK to add one or use QUICK LOG in INTEL.','+ TASK',"openSheet(\'ol-task\')")
  }
  listEl.innerHTML=html;
  // Attach swipe gestures
  setTimeout(()=>{
    listEl.querySelectorAll('.tcard').forEach(el=>{
      const id=el.id.replace('tc-','');
      if(id && !el.dataset.swiped) { el.dataset.swiped='1'; attachTaskSwipes(el,id); }
    });
  },20);
}

function quickLog() {
  const inp = document.getElementById('intel-quicklog');
  const raw = (inp?.value || '').trim();
  if (!raw) return;

  const lower = raw.toLowerCase();
  const todStr = tod();

  // ГўВ”ВЂГўВ”ВЂ Parse due date ГўВ”ВЂГўВ”ВЂ
  let due = '';
  if (/tomorrow/.test(lower)) {
    const d = new Date(); d.setDate(d.getDate()+1);
    due = d.toISOString().split('T')[0];
  } else if (/today/.test(lower)) {
    due = todStr;
  } else if (/monday|mon/.test(lower))  { due = nextWeekday(1); }
  else if (/tuesday|tue/.test(lower))   { due = nextWeekday(2); }
  else if (/wednesday|wed/.test(lower)) { due = nextWeekday(3); }
  else if (/thursday|thu/.test(lower))  { due = nextWeekday(4); }
  else if (/friday|fri/.test(lower))    { due = nextWeekday(5); }
  // date format YYYY-MM-DD or MM/DD
  const dateMatch = raw.match(/\b(\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2})\b/);
  if (dateMatch && !due) {
    if (dateMatch[1].includes('-')) {
      due = dateMatch[1];
    } else {
      const [m,d] = dateMatch[1].split('/');
      due = new Date().getFullYear()+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    }
  }

  // ГўВ”ВЂГўВ”ВЂ Parse priority ГўВ”ВЂГўВ”ВЂ
  let pri = S.config?.defaultPri || 'med';
  if (/\bhigh\b|urgent|asap|critical/.test(lower)) pri = 'high';
  else if (/\blow\b|whenever|backlog/.test(lower))  pri = 'low';
  else if (/\bmed\b|medium|normal/.test(lower))    pri = 'med';

  // ГўВ”ВЂГўВ”ВЂ Parse duration ГўВ”ВЂГўВ”ВЂ
  let dur = S.config?.defaultDur || 45;
  const durMatch = raw.match(/(\d+)\s*h(?:r|ours?)?/i);
  const minMatch = raw.match(/(\d+)\s*m(?:in)?/i);
  if (durMatch)      dur = parseInt(durMatch[1]) * 60;
  else if (minMatch) dur = parseInt(minMatch[1]);

  // ГўВ”ВЂГўВ”ВЂ Parse show ГўВ”ВЂГўВ”ВЂ
  let sid = (S.shows||[])[0]?.id || '';
  (S.shows||[]).forEach(sh => {
    if (lower.includes(sh.code.toLowerCase())) sid = sh.id;
  });

  // ГўВ”ВЂГўВ”ВЂ Build title ГўВЂВ” strip parsed tokens ГўВ”ВЂГўВ”ВЂ
  let title = raw
    .replace(/(tomorrow|today|monday|tuesday|wednesday|thursday|friday|mon|tue|wed|thu|fri)/gi, '')
    .replace(/(\d+)\s*h(?:r|ours?)?/gi, '')
    .replace(/(\d+)\s*m(?:in)?/gi, '')
    .replace(/\b(high|low|med|medium|urgent|asap|critical|normal|backlog|whenever)\b/gi, '')
    .replace(/\b\d{4}-\d{2}-\d{2}\b/, '')
    .replace(/\b\d{1,2}\/\d{1,2}\b/, '')
    .replace(/\s+/g, ' ').trim();

  if (!title) { toast('NEED A TITLE'); return; }

  // Capitalize first letter
  title = title.charAt(0).toUpperCase() + title.slice(1);

  const task = {
    id: 't'+Date.now(),
    sid, title, due, pri, dur,
    tags: [], color: '', notes: '',
    subtasks: [], dep: '',
    done: false, expanded: false,
  };

  if (!S.tasks) S.tasks = [];
  S.tasks.unshift(task);
  save();

  if (inp) inp.value = '';
  toast('ГўВњВ“ LOGGED: ' + title.slice(0,30));

  // If schedule open, reactive rack
  try { reactiveRack(); } catch(e) {}
}
