<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VTEK // Hangar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1a1a1c;--s1:#1f1f21;--s2:#222224;--s3:#272729;--s4:#2e2e30;--s5:#353537;
  --t0:#ececee;--t1:#b0b0bc;--t2:#787882;--t3:#505058;
  --accent:rgba(244,247,250,0.92);--accent-hi:#f4f7fa;--teal:#21e1df;
  --wip:#6a7280;--blk:#c8c8cc;--rev:#909098;--app:#a8a8b0;--del:#c0c0c8;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  --b0:1px solid rgba(255,255,255,0.04);
  --b1:1px solid rgba(255,255,255,0.07);
  --b2:1px solid rgba(255,255,255,0.10);
  --b3:1px solid rgba(255,255,255,0.15);
  --y:rgba(244,247,250,0.92);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.4;overflow:hidden;height:100dvh;width:100vw;}
body{display:flex;flex-direction:column;height:100dvh;min-height:-webkit-fill-available;overflow:hidden;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;padding:calc(var(--safe-t) + 12px) 12px 12px;background:var(--s1);border-bottom:var(--b1);flex-shrink:0;touch-action:manipulation;position:relative;}
.topbar::after{content:'';position:absolute;bottom:-1px;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(127,144,162,0.3) 15%,rgba(200,220,232,0.7) 50%,rgba(127,144,162,0.3) 85%,transparent);opacity:0.35;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--t1);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:10px 10px 10px 8px;min-height:44px;min-width:44px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.back-btn svg,.back-btn span{pointer-events:none;}
.title{font-family:var(--mono);font-size:14px;font-weight:800;letter-spacing:0.10em;color:var(--accent-hi);}
.actions{margin-left:auto;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.actions::-webkit-scrollbar{display:none;}
.tb-btn{padding:6px 12px;background:var(--s3);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.05em;cursor:pointer;min-height:32px;border-radius:8px;touch-action:manipulation;-webkit-user-select:none;user-select:none;flex-shrink:0;white-space:nowrap;}
.tb-btn.primary{background:#fff;color:#000;border-color:#fff;}
.tb-btn.icon{min-width:34px;padding:6px 8px;font-size:12px;}

.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;padding:0 0 40px;background:var(--bg);}

/* ============ BANNER STATS (hng-banner canonical) ============ */
.hng-banner{display:flex;align-items:center;background:transparent;margin:8px 16px 0;padding:4px 0 14px;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.05);}
.hng-banner-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hng-banner-sep{width:1px;align-self:stretch;background:rgba(255,255,255,0.09);margin:4px 0;}
.hng-b-n{font-family:var(--mono);font-size:26px;font-weight:700;color:#e0dcd4;line-height:1;letter-spacing:-0.02em;}
.hng-b-l{font-family:var(--sans);font-size:9px;font-weight:500;color:var(--t1);letter-spacing:0.06em;text-transform:uppercase;margin-top:3px;}
.hng-wip{color:rgba(255,255,255,0.45);}
.hng-blk{color:rgba(244,247,250,0.92);text-shadow:1px 2px 0 rgba(0,0,0,0.95);}
.hng-done{color:rgba(255,255,255,0.65);}

/* Row headers */
.hng-row-head{display:flex;align-items:center;padding:18px 16px 6px;}
.hng-row-lbl{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t1);letter-spacing:0.12em;flex:1;}
.hng-row-add{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t1);background:none;border:var(--b2);border-radius:4px;padding:4px 10px;cursor:pointer;letter-spacing:0.05em;min-height:28px;touch-action:manipulation;}
.hng-row-add:active{color:var(--t0);background:var(--s3);}
.hng-row-ct{font-family:var(--mono);font-size:9px;color:var(--t1);}

/* ============ ARMOR CARDS (show cards canonical) ============ */
.show-grid{display:flex;flex-direction:column;gap:10px;padding:0 16px 8px;}
.armor-card{
  background:var(--s2);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:14px;
  padding:0;
  cursor:pointer;
  overflow:hidden;
  width:100%;
  position:relative;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.armor-card:active{transform:scale(0.985);}
.armor-card-content{padding:12px 12px 10px;}
.show-stripe{height:2px;width:100%;background:linear-gradient(90deg,transparent 0%,rgba(127,144,162,0.4) 15%,rgba(200,220,232,0.90) 40%,rgba(200,220,232,1.0) 50%,rgba(200,220,232,0.90) 60%,rgba(127,144,162,0.4) 85%,transparent 100%)!important;}
.ac-code{font-family:var(--sans);font-size:20px;font-weight:900;letter-spacing:-0.02em;text-transform:uppercase;color:var(--t0);line-height:1;margin-bottom:2px;}
.ac-name{font-size:13px;color:var(--t1);margin-top:4px;}

/* Status pills */
.stag{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:20px;
  font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:0.06em;flex-shrink:0;white-space:nowrap;
  background:transparent;color:var(--t1);
  border:1px solid rgba(255,255,255,0.06);
}
.stag-blk{background:rgba(244,247,250,0.90);color:#040507;border:none;font-weight:700;}
.stag-wip{background:rgba(138,138,142,0.08);color:var(--wip);border:1px solid rgba(138,138,142,0.16);}
.stag-app{background:rgba(160,160,166,0.07);color:#a0a0a6;border:1px solid rgba(160,160,166,0.18);}
.stag-rev{background:rgba(104,104,112,0.07);color:#686870;border:1px solid rgba(104,104,112,0.18);}

/* Progress */
.prog-track{height:2px;background:rgba(255,255,255,0.04);margin-bottom:8px;overflow:hidden;border-radius:2px;}
.prog-fill{height:100%;transition:width 0.4s;}

/* Show stats */
.show-stat-num{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--t0);}
.show-stat-key{font-size:11px;color:var(--t1);margin-top:1px;letter-spacing:0.05em;text-transform:uppercase;}

/* TODAY / BLOCKERS rows */
.hng-today-list,.hng-blockers-list{padding:0 16px 4px;display:flex;flex-direction:column;gap:6px;}
.hng-today-row,.hng-blk-row{
  display:flex;align-items:center;gap:12px;
  background:var(--s2);border-radius:12px;
  border:1px solid rgba(255,255,255,0.07);
  padding:12px 16px;cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),inset 0 -2px 0 rgba(0,0,0,0.70),0 2px 6px rgba(0,0,0,0.55);
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.hng-today-row:active,.hng-blk-row:active{background:var(--s3);}
.hng-today-code,.hng-blk-code{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t0);}
.hng-today-show,.hng-blk-show{font-family:var(--mono);font-size:9px;color:var(--t1);flex:1;}
.hng-today-empty,.hng-blk-empty{font-family:var(--mono);font-size:10px;color:var(--t1);padding:10px 16px;}

/* Shots view */
.hvs-hero{padding:16px;background:var(--s1);border-bottom:var(--b1);display:flex;align-items:center;gap:14px;}
.hvs-hero-pct{font-family:var(--mono);font-size:32px;font-weight:800;color:var(--t0);line-height:1;}
.hvs-hero-meta{flex:1;}
.hvs-hero-show{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--accent-hi);letter-spacing:0.04em;}
.hvs-hero-name{font-size:12px;color:var(--t1);margin-top:2px;}
.hvs-tabs{display:flex;gap:12px;padding:10px 16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid rgba(255,255,255,0.05);}
.hvs-tabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:10px 4px;border:none;background:transparent;font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--t1);cursor:pointer;white-space:nowrap;position:relative;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.stab.on{color:#c8dce8;font-weight:800;}
.stab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(127,144,162,0.4) 15%,rgba(200,220,232,0.95) 40%,rgba(200,220,232,1.0) 50%,rgba(200,220,232,0.95) 60%,rgba(127,144,162,0.4) 85%,transparent 100%);}
.hvs-filters{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hvs-filters::-webkit-scrollbar{display:none;}
.fchip{padding:5px 12px;background:var(--s3);border:var(--b1);color:var(--t1);font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;cursor:pointer;flex-shrink:0;border-radius:10px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.fchip.on{background:var(--s5);color:var(--accent-hi);border-color:rgba(255,255,255,0.18);}
.hvs-list{padding:0 16px 20px;display:flex;flex-direction:column;gap:6px;}
.hvs-row{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--s2);border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),inset 0 -2px 0 rgba(0,0,0,0.65),0 2px 6px rgba(0,0,0,0.5);
  cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.hvs-row:active{background:var(--s3);}
.hvs-row-code{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t0);}
.hvs-row-show{font-family:var(--mono);font-size:9px;color:var(--t1);}

.empty{padding:40px 24px;text-align:center;color:var(--t1);font-size:11px;font-family:var(--mono);letter-spacing:0.06em;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b) + 48px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s4);border:var(--b2);color:var(--t0);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.10em;padding:9px 20px;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;z-index:600;border-radius:20px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DBG */
.dbg{flex-shrink:0;background:#0a0d0a;border-top:1px solid #1a3a1a;font-family:monospace;font-size:10px;}
.dbg-hd{height:28px;display:flex;align-items:center;padding:0 10px;gap:10px;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.dbg-btn{background:none;border:none;color:#0f0;font-size:10px;font-family:monospace;cursor:pointer;min-width:44px;min-height:28px;padding:0;}
.dbg-id{color:#555;font-size:9px;flex:1;}
.dbg-copy{background:#1a2a1a;border:1px solid #2a4a2a;color:#0f0;padding:2px 8px;font-size:9px;font-family:monospace;cursor:pointer;min-height:24px;}
.dbg-body{display:none;max-height:180px;overflow-y:auto;border-top:1px solid #1a3a1a;-webkit-overflow-scrolling:touch;}
.dbg.open .dbg-body{display:block;}
.dbg-log{color:#0f0;line-height:1.5;white-space:pre-wrap;padding:4px 10px;font-size:9px;}

.hide{display:none !important;}
.dbg{display:none!important;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 12 12" width="13" height="13" fill="none" stroke="#21e1df" stroke-width="2"><path d="M7.5 2L3.5 6l4 4"/></svg>
    <span id="back-lbl">HOME</span>
  </button>
  <span class="title" id="title-lbl">HANGAR</span>
  <div class="actions">
    <button class="tb-btn icon" id="refresh-btn" title="Refresh">&#x21bb;</button>
    <button class="tb-btn icon" id="team-btn" title="Team">&#x1F465;</button>
    <button class="tb-btn icon" id="import-btn" title="Import">&#x2B07;</button>
    <button class="tb-btn" id="show-btn">+ SHOW</button>
    <button class="tb-btn primary" id="shot-btn">+ SHOT</button>
  </div>
</div>

<div class="main" id="main">

  <!-- HOME VIEW -->
  <div id="v-home">
    <div class="hng-banner">
      <div class="hng-banner-cell"><span class="hng-b-n" id="b-total">-</span><span class="hng-b-l">SHOTS</span></div>
      <div class="hng-banner-sep"></div>
      <div class="hng-banner-cell"><span class="hng-b-n hng-wip" id="b-wip">-</span><span class="hng-b-l">WIP</span></div>
      <div class="hng-banner-sep"></div>
      <div class="hng-banner-cell"><span class="hng-b-n" id="b-rev">-</span><span class="hng-b-l">REV</span></div>
      <div class="hng-banner-sep"></div>
      <div class="hng-banner-cell"><span class="hng-b-n hng-blk" id="b-blk">-</span><span class="hng-b-l">BLK</span></div>
      <div class="hng-banner-sep"></div>
      <div class="hng-banner-cell"><span class="hng-b-n hng-done" id="b-done">-</span><span class="hng-b-l">DONE</span></div>
    </div>

    <div class="hng-row-head">
      <span class="hng-row-lbl">ACTIVE SHOWS</span>
      <button class="hng-row-add" id="add-show-inline">+ ADD</button>
    </div>
    <div class="show-grid" id="show-grid"></div>

    <div class="hng-row-head">
      <span class="hng-row-lbl">TODAY</span>
      <span class="hng-row-ct" id="today-ct">0</span>
    </div>
    <div class="hng-today-list" id="today-list"></div>

    <div class="hng-row-head">
      <span class="hng-row-lbl">BLOCKERS</span>
      <span class="hng-row-ct" id="blk-ct">0</span>
    </div>
    <div class="hng-blockers-list" id="blk-list"></div>
  </div>

  <!-- SHOTS VIEW -->
  <div id="v-shots" class="hide">
    <div class="hvs-hero">
      <div class="hvs-hero-pct" id="hero-pct">0%</div>
      <div class="hvs-hero-meta">
        <div class="hvs-hero-show" id="hero-show">SHOW</div>
        <div class="hvs-hero-name" id="hero-name"></div>
      </div>
    </div>
    <div class="hvs-tabs" id="shot-tabs"></div>
    <div class="hvs-filters" id="filter-chips">
      <button class="fchip on" data-f="all">ALL</button>
      <button class="fchip" data-f="wip">WIP</button>
      <button class="fchip" data-f="review">REVIEW</button>
      <button class="fchip" data-f="blocked">BLOCKED</button>
      <button class="fchip" data-f="approved">APPROVED</button>
      <button class="fchip" data-f="delivered">DELIVERED</button>
    </div>
    <div class="hvs-list" id="shots-list"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<div class="dbg" id="dbg">
  <div class="dbg-hd">
    <button class="dbg-btn" id="dbg-toggle">&gt; DBG</button>
    <span class="dbg-id" id="dbg-id"></span>
    <button class="dbg-copy" id="dbg-copy">COPY</button>
  </div>
  <div class="dbg-body"><div class="dbg-log" id="dbg-log"></div></div>
</div>

<script>
'use strict';
const BUILD='VTEK-HANGAR-20260416-6';
const _dbgEl=document.getElementById('dbg-log');
function dbg(msg){const t=new Date().toTimeString().slice(0,8);_dbgEl.textContent+=t+' '+msg+'\n';_dbgEl.scrollTop=_dbgEl.scrollHeight;}
window.addEventListener('error',e=>dbg('ERR: '+e.message+' @ '+e.lineno));

const LS_STATE='vtek9';
let S=JSON.parse(localStorage.getItem(LS_STATE)||'null')||{shows:[],shots:[],tasks:[],team:[]};
if(!S.shows)S.shows=[];if(!S.shots)S.shots=[];if(!S.tasks)S.tasks=[];if(!S.team)S.team=[];
if(!S.activeShow&&S.shows[0])S.activeShow=S.shows[0].id;
let view='home',filter='all';

function save(){localStorage.setItem(LS_STATE,JSON.stringify(S));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function gs(id){return S.shows.find(s=>s.id===id);}
function tod(){return new Date().toISOString().slice(0,10);}

function showView(v){
  view=v;
  document.getElementById('v-home').classList.toggle('hide',v!=='home');
  document.getElementById('v-shots').classList.toggle('hide',v!=='shots');
  const tl=document.getElementById('title-lbl');
  const bl=document.getElementById('back-lbl');
  if(v==='home'){tl.textContent='HANGAR';bl.textContent='HOME';}
  else if(v==='shots'){const sh=gs(S.activeShow);tl.textContent=sh?sh.code:'SHOTS';bl.textContent='HANGAR';}
  dbg('[VIEW] '+v);
}

function renderHome(){
  const total=S.shots.length;
  const wip=S.shots.filter(s=>s.status==='wip').length;
  const rev=S.shots.filter(s=>s.status==='review').length;
  const blk=S.shots.filter(s=>s.status==='blocked').length;
  const done=S.shots.filter(s=>s.status==='approved'||s.status==='delivered').length;
  document.getElementById('b-total').textContent=total;
  document.getElementById('b-wip').textContent=wip;
  document.getElementById('b-rev').textContent=rev;
  document.getElementById('b-blk').textContent=blk;
  document.getElementById('b-done').textContent=done;

  const grid=document.getElementById('show-grid');
  if(!S.shows.length){grid.innerHTML='<div class="empty">NO SHOWS &mdash; TAP + ADD</div>';}
  else{
    grid.innerHTML=S.shows.map(s=>{
      const shots=S.shots.filter(sh=>sh.sid===s.id);
      const d=shots.filter(sh=>sh.status==='approved'||sh.status==='delivered').length;
      const p=shots.length?Math.round(d/shots.length*100):0;
      const wip=shots.filter(sh=>sh.status==='wip').length;
      const blk=shots.filter(sh=>sh.status==='blocked').length;
      const stripe=s.color||'var(--y)';
      const tag=blk?'<span class="stag stag-blk">BLK</span>':wip?'<span class="stag stag-wip">WIP</span>':'<span class="stag stag-app">OK</span>';
      return '<div class="armor-card" data-sid="'+s.id+'">'+
        '<div class="show-stripe" style="background:'+stripe+'"></div>'+
        '<div class="armor-card-content">'+
          '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">'+
            '<div class="ac-code">'+s.code+'</div>'+
            tag+
          '</div>'+
          '<div class="ac-name" style="margin-bottom:10px;">'+(s.name||'')+'</div>'+
          '<div class="prog-track"><div class="prog-fill" style="width:'+p+'%;background:'+stripe+'"></div></div>'+
          '<div style="display:flex;gap:14px;margin-top:8px;">'+
            '<div><div class="show-stat-num" style="font-size:16px;font-weight:700;color:#f4f7fa">'+p+'%</div><div class="show-stat-key" style="font-size:9px;">DONE</div></div>'+
            '<div><div class="show-stat-num" style="font-size:16px;">'+shots.length+'</div><div class="show-stat-key" style="font-size:9px;">SHOTS</div></div>'+
            (wip?'<div><div class="show-stat-num" style="font-size:16px;color:var(--wip)">'+wip+'</div><div class="show-stat-key" style="font-size:9px;color:var(--wip);">WIP</div></div>':'')+
            (blk?'<div><div class="show-stat-num" style="font-size:16px;color:var(--blk)">'+blk+'</div><div class="show-stat-key" style="font-size:9px;color:var(--blk);">BLK</div></div>':'')+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  const today=tod();
  const todayShots=S.shots.filter(s=>s.due===today);
  document.getElementById('today-ct').textContent=todayShots.length;
  document.getElementById('today-list').innerHTML=todayShots.length?
    todayShots.map(sh=>hngRow(sh)).join(''):
    '<div class="hng-today-empty">Nothing due today</div>';

  const blkShots=S.shots.filter(s=>s.status==='blocked');
  document.getElementById('blk-ct').textContent=blkShots.length;
  document.getElementById('blk-list').innerHTML=blkShots.length?
    blkShots.map(sh=>hngRow(sh)).join(''):
    '<div class="hng-blk-empty">No blockers</div>';
}

function hngRow(sh){
  const show=gs(sh.sid);
  const st=sh.status||'wip';
  const tagCls=st==='blocked'?'stag-blk':st==='wip'?'stag-wip':st==='review'?'stag-rev':'stag-app';
  return '<div class="hng-today-row" data-shid="'+sh.id+'">'+
    '<span class="hng-today-code">'+(sh.code||sh.id)+'</span>'+
    '<span class="hng-today-show">'+(show?show.code:'')+'</span>'+
    '<span class="stag '+tagCls+'">'+st.toUpperCase()+'</span>'+
  '</div>';
}

function renderShots(){
  const tabs=document.getElementById('shot-tabs');
  tabs.innerHTML=S.shows.map(s=>'<button class="stab'+(S.activeShow===s.id?' on':'')+'" data-sid="'+s.id+'">'+s.code+'</button>').join('');
  const show=gs(S.activeShow);
  let shots=S.shots.filter(sh=>sh.sid===S.activeShow);
  const total=shots.length;
  const done=shots.filter(sh=>sh.status==='approved'||sh.status==='delivered').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('hero-pct').textContent=pct+'%';
  document.getElementById('hero-show').textContent=show?show.code:'';
  document.getElementById('hero-name').textContent=show?show.name:'';
  if(filter!=='all')shots=shots.filter(sh=>sh.status===filter);
  const list=document.getElementById('shots-list');
  list.innerHTML=shots.length?shots.map(sh=>{
    const st=sh.status||'wip';
    const tagCls=st==='blocked'?'stag-blk':st==='wip'?'stag-wip':st==='review'?'stag-rev':'stag-app';
    return '<div class="hvs-row" data-shid="'+sh.id+'">'+
      '<span class="hvs-row-code">'+(sh.code||sh.id)+'</span>'+
      '<span class="hvs-row-show">'+(show?show.code:'')+'</span>'+
      '<span class="stag '+tagCls+'" style="margin-left:auto;">'+st.toUpperCase()+'</span>'+
    '</div>';
  }).join(''):'<div class="empty">NO SHOTS IN THIS VIEW</div>';
  document.querySelectorAll('.fchip').forEach(c=>c.classList.toggle('on',c.dataset.f===filter));
}

function hangarBack(){if(view==='home'){window.location.href='./';}else{showView('home');renderHome();}}
function addShow(){
  const code=prompt('Show code (e.g. CRL)');if(!code)return;
  const name=prompt('Show name')||code;
  const id='s'+Date.now();
  S.shows.push({id,code:code.toUpperCase(),name});
  if(!S.activeShow)S.activeShow=id;
  save();renderHome();toast('SHOW ADDED');
}
function addShot(){
  if(!S.shows.length){toast('ADD A SHOW FIRST');return;}
  const sid=S.activeShow||S.shows[0].id;
  const code=prompt('Shot code (e.g. 136_STL_0080)');if(!code)return;
  S.shots.push({id:'sh'+Date.now(),sid,code,status:'wip',due:tod()});
  save();renderHome();if(view==='shots')renderShots();toast('SHOT ADDED');
}

document.getElementById('back-btn').addEventListener('click',hangarBack);
document.getElementById('refresh-btn').addEventListener('click',()=>{renderHome();if(view==='shots')renderShots();toast('REFRESHED');});
document.getElementById('team-btn').addEventListener('click',()=>toast('TEAM VIEW SOON'));
document.getElementById('import-btn').addEventListener('click',()=>toast('IMPORT SOON'));
document.getElementById('show-btn').addEventListener('click',addShow);
document.getElementById('shot-btn').addEventListener('click',addShot);
document.getElementById('add-show-inline').addEventListener('click',addShow);

document.getElementById('show-grid').addEventListener('click',function(e){
  const card=e.target.closest('.armor-card');if(!card)return;
  S.activeShow=card.dataset.sid;save();
  showView('shots');renderShots();
});
document.getElementById('shot-tabs').addEventListener('click',function(e){
  const t=e.target.closest('.stab');if(!t)return;
  S.activeShow=t.dataset.sid;save();renderShots();
});
document.getElementById('filter-chips').addEventListener('click',function(e){
  const c=e.target.closest('.fchip');if(!c)return;
  filter=c.dataset.f;renderShots();
});
document.getElementById('main').addEventListener('click',function(e){
  const sr=e.target.closest('.hng-today-row,.hng-blk-row,.hvs-row');if(!sr)return;
  const shot=S.shots.find(s=>s.id===sr.dataset.shid);if(!shot)return;
  const cycle=['wip','review','blocked','approved','delivered'];
  const i=cycle.indexOf(shot.status);
  shot.status=cycle[(i+1)%cycle.length];save();
  if(view==='home')renderHome();else renderShots();
  toast(shot.code+' \u2192 '+shot.status.toUpperCase());
});

document.getElementById('dbg-toggle').addEventListener('click',function(){document.getElementById('dbg').classList.toggle('open');});
document.getElementById('dbg-copy').addEventListener('click',function(){if(navigator.clipboard)navigator.clipboard.writeText(_dbgEl.textContent);this.textContent='COPIED';setTimeout(()=>this.textContent='COPY',1500);});

document.getElementById('dbg-id').textContent=BUILD;
dbg('[INIT] shows='+S.shows.length+' shots='+S.shots.length);
renderHome();
dbg('[INIT] done');
</script>
</body>
</html>
