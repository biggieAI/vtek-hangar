<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VTEK // Intel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root {
  /* VTEK GEO — PLASMA WHITE */
  --bg:    #000003;
  --s1:    #0a0b10;
  --s2:    #14161d;
  --s3:    #1e2029;
  --s4:    #292d36;
  --s5:    #363b47;
  --neo-raise: inset 0 1px 0 rgba(255,255,255,0.10), inset 0 -1px 0 rgba(0,0,0,0.72), 0 6px 28px rgba(0,0,0,0.92);
  --neo-inset: inset 0 2px 6px rgba(0,0,0,0.85), inset 0 -1px 0 rgba(255,255,255,0.03);
  --y:      rgba(244,247,250,0.92);
  --y-hi:   #f4f7fa;
  --y-mid:  rgba(232,237,242,0.55);
  --y-dim:  rgba(232,237,242,0.20);
  --y-deep: rgba(232,237,242,0.07);
  --y2:     rgba(232,237,242,0.04);
  --y3:     rgba(232,237,242,0.025);
  --y4:     rgba(232,237,242,0.01);
  --y-glow: none;
  --y-glow-sm: none;
  --t0: #c8cdd8;
  --t1: #525a68;
  --t2: #282d38;
  --t3: #141820;
  --wip:   #6a7280;
  --blk:   #404550;
  --rev:   #585e6a;
  --app:   #8890a0;
  --hld:   #1e2029;
  --del:   #a8b0bc;
  --accent:     #e8edf2;
  --accent-hi:  #f4f7fa;
  --accent-dim: #0e1018;
  --accent-ice: #f4f7fa;
  --accent-bg:  #080a10;
  --accent-glow: rgba(232,237,242,0.15);
  --teal:  #21e1df;
  --warn:  #f4c06a;
  --hi:    #e85c4b;
  --ok:    #7dd3a0;
  --b0: 1px solid rgba(255,255,255,0.028);
  --b1: 1px solid rgba(255,255,255,0.055);
  --b2: 1px solid rgba(255,255,255,0.085);
  --b3: 1px solid rgba(255,255,255,0.120);
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --nav-h: 56px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
  --ac: var(--y);
  --ac-lo: var(--y3);
  --ac-md: var(--y2);
  --ac-bd: rgba(232,237,242,0.20);
  --b-compat0: rgba(255,255,255,0.04);
  --b-compat1: rgba(255,255,255,0.08);
  --b-compat2: rgba(255,255,255,0.14);
  --bd: var(--b2);
  --row: var(--s2);
  --row-hi: var(--s3);
  --text: var(--t0);
  --text2: var(--t1);
  --text3: var(--t2);
  --pill: var(--s3);
  --r-pill:3px; --r-card:4px;
  --chf:0px; --chf-md:0px; --chf-sm:0px;
  --slab: var(--neo-raise);
  --sh-r:none; --sh-rm:none; --sh-in:none; --sh-is:none; --sh-fl:none;
}
html,body{background:var(--bg);color:var(--t0);font-family:var(--sans);font-size:14px;line-height:1.4;overflow:hidden;height:100dvh;width:100vw;}
body{display:flex;flex-direction:column;height:100dvh;min-height:-webkit-fill-available;overflow:hidden;}

/* TOPBAR */
.topbar {
  height: calc(52px + var(--safe-t));
  padding-top: var(--safe-t);
  padding-left: 12px;
  padding-right: 10px;
  padding-bottom: 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: relative;
  z-index: 10;
  touch-action: manipulation;
}
.topbar::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 8%; right: 8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(127,144,162,0.3) 15%, rgba(200,220,232,0.7) 50%, rgba(127,144,162,0.3) 85%, transparent);
  opacity: 0.35;
}

.back-btn {
  display: flex; align-items: center; gap: 4px;
  background: none; border: none;
  color: var(--t1);
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  padding: 8px; min-height: 40px; min-width: 44px;
  cursor: pointer; touch-action: manipulation;
  -webkit-user-select: none; user-select: none; flex-shrink: 0;
}
.title {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: #f4f7fa;
  flex-shrink: 0;
  white-space: nowrap;
}
.actions { margin-left: auto; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.tb-btn {
  padding: 0 10px;
  height: 30px;
  border: var(--b2);
  border-radius: 6px;
  background: linear-gradient(180deg, var(--s4) 0%, var(--s3) 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.09), inset 0 -1px 0 rgba(0,0,0,0.65);
  font-family: var(--sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--t1); cursor: pointer; transition: all 0.1s;
  white-space: nowrap; display: inline-flex; align-items: center;
  touch-action: manipulation; -webkit-user-select: none; user-select: none; flex-shrink: 0;
}
.tb-btn:hover { background: linear-gradient(180deg, var(--s5) 0%, var(--s4) 100%); color: var(--t0); }
.tb-btn:active { background: var(--s4); }
.tb-btn.primary, .tb-btn.go {
  background: linear-gradient(180deg, #f4f7fa 0%, #e8edf2 100%);
  border: none; color: #06080a; font-weight: 900;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.60), inset 0 -1px 0 rgba(0,0,0,0.18);
}
.tb-btn.icon { min-width: 30px; padding: 0 8px; }
.tb-icon-btn {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  background: var(--s2); border: var(--b2); border-radius: 3px;
  cursor: pointer; color: var(--t1); transition: all 0.1s; flex-shrink: 0;
}
.tb-icon-btn:hover { background: var(--s3); color: var(--t0); }
.tb-btn.primary{background:var(--teal);color:#000;border-color:var(--teal);}

/* MODEL PICKER */
.model-picker{background:var(--s2);border:var(--b2);color:var(--t1);font-family:var(--mono);font-size:9px;font-weight:700;padding:6px 8px;border-radius:6px;cursor:pointer;min-height:32px;outline:none;letter-spacing:0.04em;}

/* KEY BANNER */
.key-banner{display:none;padding:10px 16px;background:rgba(232,92,75,0.08);border-bottom:1px solid rgba(232,92,75,0.2);flex-shrink:0;gap:10px;align-items:center;}
.key-banner.show{display:flex;}
.key-txt{flex:1;font-size:11px;color:var(--hi);font-family:var(--mono);letter-spacing:0.04em;}
.key-in{flex:1;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;border-radius:6px;min-height:32px;}
.key-save{background:#fff;color:#000;border:none;font-family:var(--mono);font-size:10px;font-weight:800;padding:7px 12px;border-radius:6px;cursor:pointer;touch-action:manipulation;letter-spacing:0.06em;}

/* MAIN */
.main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;background:var(--bg);}

/* ═══ BRIEFING PANEL ═══ */
.brief{padding:0;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;}
.hud-panel{padding:12px 16px 12px;background:var(--bg);}

/* header row: agent name + date */
.hud-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hud-title-block{flex:1;}
.hud-designation{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--t3);letter-spacing:0.2em;}
.hud-name{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--accent-hi);letter-spacing:0.1em;margin-top:2px;}
.hud-status-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.hud-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 5px rgba(33,225,223,0.5);flex-shrink:0;}
.hud-status-txt{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--teal);letter-spacing:0.14em;}
.hud-date-txt{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:0.06em;text-align:right;}

/* stat row — leaderboard style */
.hud-stats{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.hud-show-row{display:flex;align-items:center;gap:10px;}
.hud-show-code{font-family:var(--mono);font-size:10px;font-weight:800;color:var(--t0);letter-spacing:0.08em;width:36px;flex-shrink:0;}
.hud-bar-wrap{flex:1;height:5px;background:var(--s3);border-radius:2px;overflow:hidden;}
.hud-bar-fill{height:100%;border-radius:2px;background:var(--teal);transition:width 0.3s;}
.hud-bar-fill.warn{background:var(--warn);}
.hud-bar-fill.danger{background:var(--hi);}
.hud-show-pct{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--t2);width:30px;text-align:right;flex-shrink:0;}
.hud-show-meta{font-family:var(--mono);font-size:9px;color:var(--t3);width:52px;text-align:right;flex-shrink:0;}
/* fallback pills when no shows */
.hud-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.hud-pill{background:var(--s2);border:var(--b1);padding:7px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:60px;}
.hud-pill-n{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--t0);}
.hud-pill-n.urgent{color:var(--hi);}
.hud-pill-n.warn{color:var(--warn);}
.hud-pill-n.ok{color:var(--teal);}
.hud-pill-l{font-family:var(--mono);font-size:7px;font-weight:700;color:var(--t3);letter-spacing:0.12em;}

/* summary — plain sentence, no code flags */
.hud-sum{font-size:13px;color:var(--t1);line-height:1.5;}
.hud-sum strong{color:var(--t0);font-weight:600;}
.hud-sum .flag{color:var(--hi);font-weight:700;}

/* ACTION CARDS — bigger icons, readable */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px 10px;flex-shrink:0;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04);}
.ai-card{background:var(--s2);border:1px solid rgba(255,255,255,0.05);padding:12px 13px;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;display:flex;gap:11px;align-items:flex-start;min-height:58px;border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),inset 0 -2px 0 rgba(0,0,0,0.70),0 2px 6px rgba(0,0,0,0.55);transition:all 0.12s;}
.ai-card:active{background:var(--s3);border-color:rgba(33,225,223,0.4);}
.ai-card-icon{width:20px;height:20px;flex-shrink:0;color:var(--teal);opacity:0.7;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.ai-card:active .ai-card-icon{opacity:1;}
.ai-card-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.ai-card-txt{flex:1;min-width:0;}
.ai-card-title{font-family:var(--mono);font-size:10px;font-weight:800;color:var(--t0);letter-spacing:0.08em;}
.ai-card-sub{font-size:11px;color:var(--t2);line-height:1.3;margin-top:3px;}

/* MESSAGES */

.msgs{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 16px 20px;display:flex;flex-direction:column;gap:10px;background:var(--bg);}
.msg{display:flex;flex-direction:column;max-width:92%;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}
.msg-meta{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--t3);letter-spacing:0.1em;margin-bottom:3px;padding:0 4px;}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.55;max-width:100%;}
.msg.user .msg-bubble{background:var(--teal);color:#000;border-bottom-right-radius:4px;}
.msg.ai .msg-bubble{background:var(--s2);color:var(--t0);border:1px solid rgba(255,255,255,0.06);border-radius:14px;border-bottom-left-radius:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);}
.msg-bubble strong{color:var(--accent-hi);font-weight:700;}
.msg.user .msg-bubble strong{color:#000;font-weight:800;}
.msg-bubble em{font-style:italic;}
.msg-bubble code{font-family:var(--mono);font-size:12px;background:rgba(0,0,0,0.35);padding:1px 5px;border-radius:3px;color:var(--teal);}
.msg.user .msg-bubble code{background:rgba(0,0,0,0.25);color:#000;}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-weight:700;margin:8px 0 4px;color:var(--t0);}
.msg-bubble h1{font-size:16px;}
.msg-bubble h2{font-size:14px;}
.msg-bubble h3{font-size:13px;color:var(--t1);}
.msg-bubble ul{padding-left:18px;margin:6px 0;}
.msg-bubble li{margin:2px 0;}
.msg-bubble hr{border:none;border-top:var(--b1);margin:8px 0;}

/* Thinking dots */
.think{display:flex;gap:4px;padding:4px 0;}
.think-dot{width:6px;height:6px;border-radius:50%;background:var(--t2);animation:bounce 1.4s infinite ease-in-out both;}
.think-dot:nth-child(1){animation-delay:-0.32s;}
.think-dot:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}

/* ACTION CHIPS in AI messages */
.action-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:var(--b1);}
.action-chip{background:rgba(33,225,223,0.1);border:1px solid rgba(33,225,223,0.3);color:var(--teal);font-family:var(--mono);font-size:10px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;letter-spacing:0.04em;touch-action:manipulation;min-height:30px;}
.action-chip:active{background:rgba(33,225,223,0.2);}
.action-chip.done{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:var(--ok);pointer-events:none;}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:var(--t2);font-family:var(--mono);font-size:11px;letter-spacing:0.06em;}

/* INPUT DOCK */
.dock{display:flex;align-items:flex-end;gap:8px;padding:10px 12px calc(var(--safe-b)+10px);background:var(--bg);border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;}
.dock-in{flex:1;background:var(--s2);border:var(--b2);color:var(--t0);font-family:var(--sans);font-size:14px;padding:10px 14px;outline:none;border-radius:12px;resize:none;max-height:140px;min-height:44px;overflow-y:auto;line-height:1.4;-webkit-overflow-scrolling:touch;}
.dock-in::placeholder{color:var(--t3);}
.dock-btn{width:44px;height:44px;flex-shrink:0;background:var(--teal);border:none;border-radius:12px;color:#000;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-user-select:none;user-select:none;font-weight:800;}
.dock-btn:disabled{background:var(--s4);color:var(--t3);}
.dock-btn.mic{background:var(--s3);color:var(--t1);}
.dock-btn.mic.listening{background:var(--hi);color:#fff;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

.toast{position:fixed;bottom:calc(var(--safe-b)+80px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--s4);border:var(--b2);color:var(--t0);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.10em;padding:9px 20px;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;z-index:600;border-radius:20px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* DBG */
.dbg{flex-shrink:0;background:#0a0d0a;border-top:1px solid #1a3a1a;font-family:monospace;font-size:10px;}
.dbg-hd{height:20px;display:flex;align-items:center;padding:0 8px;gap:8px;touch-action:manipulation;}
.dbg-btn{background:none;border:none;color:#0f0;font-size:9px;font-family:monospace;cursor:pointer;min-width:36px;min-height:20px;padding:0;}
.dbg-id{color:#444;font-size:8px;flex:1;}
.dbg-copy{background:#1a2a1a;border:1px solid #2a4a2a;color:#0f0;padding:1px 6px;font-size:8px;font-family:monospace;cursor:pointer;min-height:18px;}
.dbg-body{display:none;max-height:120px;overflow-y:auto;border-top:1px solid #1a3a1a;}
.dbg.open .dbg-body{display:block;}
.dbg-log{color:#0f0;line-height:1.4;white-space:pre-wrap;padding:3px 8px;font-size:9px;}

.hide{display:none!important;}
.dbg{display:none!important;}

</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="window.location.href='./'">
    <svg viewBox="0 0 12 12" width="13" height="13" fill="none" stroke="#21e1df" stroke-width="2"><path d="M7.5 2L3.5 6l4 4"/></svg>
    <span>HOME</span>
  </button>
  <span class="title">INTEL</span>
  <div class="actions">
    <select class="model-picker" id="model-picker" onchange="saveModel()">
      <option value="claude-haiku-4-5-20251001">HAIKU</option>
      <option value="claude-sonnet-4-5-20251001">SONNET</option>
      <option value="claude-opus-4-6-20251001">OPUS</option>
    </select>
  </div>
</div>

<div class="key-banner" id="key-banner">
  <input class="key-in" id="key-in" type="password" placeholder="sk-ant-..." autocomplete="off">
  <button class="key-save" onclick="saveKey()">SAVE</button>
</div>

<div class="main">
  <!-- BRIEFING CARD -->
  <div class="brief" id="brief"></div>

  <!-- ACTION CARD GRID (flat line-art) -->
  <div class="card-grid" id="chips">
    <div class="ai-card" onclick="quickAsk('Give me a tight briefing of today — what matters most, in order of urgency.')">
      <div class="ai-card-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg></div>
      <div class="ai-card-txt"><div class="ai-card-title">BRIEFING</div><div class="ai-card-sub">Priority rundown now</div></div>
    </div>
    <div class="ai-card" onclick="quickAsk('Plan my day. Given my open tasks and shot deadlines, what should I do in what order, and when? Be concrete.')">
      <div class="ai-card-icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4M8 14h2M14 14h2M8 18h2M14 18h2"/></svg></div>
      <div class="ai-card-txt"><div class="ai-card-title">PLAN DAY</div><div class="ai-card-sub">Time-blocked schedule</div></div>
    </div>
    <div class="ai-card" onclick="quickAsk('What is urgent right now? Anything overdue, blocked, or at risk?')">
      <div class="ai-card-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 20h20L12 2z"/><path d="M12 10v5M12 18v.5"/></svg></div>
      <div class="ai-card-txt"><div class="ai-card-title">URGENT</div><div class="ai-card-sub">What's at risk</div></div>
    </div>
    <div class="ai-card" onclick="quickAsk('Review all shots. Any stuck in WIP too long? Anything I should chase reviews on?')">
      <div class="ai-card-icon"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M7 6V3M17 6V3M7 18v3M17 18v3M2 10h3M2 14h3M19 10h3M19 14h3"/></svg></div>
      <div class="ai-card-txt"><div class="ai-card-title">SHOT REVIEW</div><div class="ai-card-sub">Stuck shots, chases</div></div>
    </div>
    <div class="ai-card" onclick="quickAsk('Write a short status update I can send to the team about the current show progress.')">
      <div class="ai-card-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/><path d="M7 9h10M7 13h6"/></svg></div>
      <div class="ai-card-txt"><div class="ai-card-title">STATUS</div><div class="ai-card-sub">Draft team update</div></div>
    </div>
    <div class="ai-card" onclick="quickAsk('Suggest optimizations to my current schedule. Where am I wasting time? What can be batched or parallelized?')">

<script>
'use strict';
const BUILD_ID='VTEK-INTEL-20260418-15';
const LS='vtek9';
const HIST_KEY='vtek_intel_hist';
const MODEL_KEY='vtek_intel_model';

let S=JSON.parse(localStorage.getItem(LS)||'null')||{shows:[],shots:[],tasks:[],vaultDocs:[]};
let history=JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
let isListening=false, recognition=null;

function save(){localStorage.setItem(LS,JSON.stringify(S));}
function saveHist(){localStorage.setItem(HIST_KEY,JSON.stringify(history.slice(-30)));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function dbg(m){const el=document.getElementById('dbg-log');el.textContent+=new Date().toTimeString().slice(0,8)+' '+m+'\n';}
window.addEventListener('error',e=>dbg('ERR:'+e.message));

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getKey(){return localStorage.getItem('vtek_claude_key')||'';}
function getModel(){return localStorage.getItem(MODEL_KEY)||'claude-haiku-4-5-20251001';}
function saveModel(){localStorage.setItem(MODEL_KEY,document.getElementById('model-picker').value);toast('MODEL SET');}
function tod(){return new Date().toISOString().slice(0,10);}
function gs(id){return (S.shows||[]).find(s=>s.id===id);}

// ═══ HUD BRIEFING ═══
function renderBrief(){
  const shots=S.shots||[],tasks=S.tasks||[],shows=S.shows||[];
  const todStr=tod();
  const openTasks=tasks.filter(t=>!t.done);
  const overdue=openTasks.filter(t=>t.due&&t.due<todStr).length;
  const blocked=shots.filter(s=>s.status==='blocked').length;
  const wip=shots.filter(s=>s.status==='wip').length;

  const planKey='vtek_plan_'+new Date().toDateString();
  const plan=JSON.parse(localStorage.getItem(planKey)||'[]');
  const now=new Date();
  const tm=now.getHours()*60+now.getMinutes();
  let nextBlock=null;
  plan.forEach(e=>{
    const bs=(e.startH||0)*60+(e.startM||0);
    if(bs>=tm&&!nextBlock){const t=tasks.find(x=>x.id===e.taskId);if(t)nextBlock={startH:e.startH,startM:e.startM,task:t};}
  });

  // Summary sentence
  let sum='';
  if(overdue) sum+='<span class="flag">'+overdue+' overdue</span>. ';
  else sum+='Deadlines clear. ';
  if(blocked) sum+=blocked+' shot'+(blocked>1?'s':'')+' blocked. ';
  if(nextBlock){
    const h=nextBlock.startH,m=String(nextBlock.startM||0).padStart(2,'0');
    sum+='Next: <strong>'+nextBlock.task.title+'</strong> at '+(h>12?h-12:h)+':'+m+(h>=12?'pm':'am')+'.';
  } else if(!overdue&&!blocked){
    sum+='<strong>'+openTasks.length+'</strong> task'+(openTasks.length===1?'':'s')+' open.';
  }

  const dateStr=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();

  // Build leaderboard rows — one per show
  let statsHtml='';
  if(shows.length){
    // Per-show progress bars
    statsHtml='<div class="hud-stats">';
    shows.forEach(sh=>{
      const shShots=shots.filter(s=>s.sid===sh.id);
      const total=shShots.length;
      const done=shShots.filter(s=>s.status==='approved'||s.status==='delivered').length;
      const blk=shShots.filter(s=>s.status==='blocked').length;
      const pct=total?Math.round(done/total*100):0;
      const barClass=blk?'danger':pct>=80?'ok':'';
      const metaParts=[];
      if(blk) metaParts.push(blk+' BLK');
      if(shShots.filter(s=>s.status==='wip').length) metaParts.push(shShots.filter(s=>s.status==='wip').length+' WIP');
      statsHtml+=
        '<div class="hud-show-row">'+
          '<div class="hud-show-code">'+escHtml(sh.code)+'</div>'+
          '<div class="hud-bar-wrap"><div class="hud-bar-fill'+(barClass?' '+barClass:'')+'" style="width:'+pct+'%"></div></div>'+
          '<div class="hud-show-pct">'+pct+'%</div>'+
          '<div class="hud-show-meta">'+(metaParts.length?metaParts.join(' · '):''+done+'/'+total)+'</div>'+
        '</div>';
    });
    statsHtml+='</div>';
  } else {
    // No shows — fallback pills
    statsHtml='<div class="hud-pills">'+
      '<div class="hud-pill"><div class="hud-pill-n '+(overdue?'urgent':'')+'">'+overdue+'</div><div class="hud-pill-l">OVERDUE</div></div>'+
      '<div class="hud-pill"><div class="hud-pill-n">'+openTasks.length+'</div><div class="hud-pill-l">TASKS</div></div>'+
      '<div class="hud-pill"><div class="hud-pill-n '+(blocked?'warn':'')+'">'+blocked+'</div><div class="hud-pill-l">BLOCKED</div></div>'+
      '<div class="hud-pill"><div class="hud-pill-n '+(wip?'ok':'')+'">'+wip+'</div><div class="hud-pill-l">WIP</div></div>'+
    '</div>';
  }

  document.getElementById('brief').innerHTML=
    '<div class="hud-panel">'+
      '<div class="hud-top">'+
        '<div class="hud-title-block">'+
          '<div class="hud-designation">INTEL // AGENT</div>'+
          '<div class="hud-name">SECONDS</div>'+
          '<div class="hud-status-row"><div class="hud-dot"></div><div class="hud-status-txt">ONLINE</div></div>'+
        '</div>'+
        '<div class="hud-date-txt">'+dateStr+'</div>'+
      '</div>'+
      statsHtml+
      '<div class="hud-sum">'+sum+'</div>'+
    '</div>';
}

// ═══ CONTEXT for AI ═══
function buildContext(){
  const todStr=tod();
  const shows=S.shows||[],shots=S.shots||[],tasks=S.tasks||[],docs=S.vaultDocs||[];

  // Shows summary
  const showLines=shows.map(sh=>{
    const shShots=shots.filter(s=>s.sid===sh.id);
    const done=shShots.filter(s=>s.status==='approved'||s.status==='delivered').length;
    const blk=shShots.filter(s=>s.status==='blocked').length;
    const wip=shShots.filter(s=>s.status==='wip').length;
    const pct=shShots.length ? Math.round(done/shShots.length*100) : 0;
    const bidTotal=shShots.reduce((a,s)=>a+(s.bid||0),0);
    return sh.code+' "'+sh.name+'" — '+shShots.length+' shots, '+pct+'% done, '+wip+' WIP, '+blk+' BLK, '+(sh.weeksLeft||'?')+' wks left, bid '+bidTotal+'d total';
  }).join('\n');

  // Shots (compressed)
  const shotLines=shots.map(s=>{
    const sh=shows.find(x=>x.id===s.sid);
    const note=s.notes ? ' ['+s.notes.slice(0,60)+']' : '';
    return (sh?.code||'?')+' '+s.code+' '+(s.status||'?').toUpperCase()+' bid:'+(s.bid||0)+'d'+note;
  }).join('\n');

  // Open tasks
  const taskLines=tasks.filter(t=>!t.done).map(t=>{
    const sh=shows.find(x=>x.id===t.sid);
    const overdue=t.due && t.due<todStr ? ' OVERDUE' : t.due===todStr ? ' DUE-TODAY' : '';
    return '['+(t.pri||'med').toUpperCase()+']'+overdue+' "'+t.title+'" '+(t.dur||45)+'min'+(t.due ? ' due:'+t.due : '')+(sh?' ('+sh.code+')':'');
  }).join('\n');

  // Today's plan
  const planKey='vtek_plan_'+new Date().toDateString();
  const plan=JSON.parse(localStorage.getItem(planKey)||'[]');
  const planLines=plan.map(e=>{
    const t=tasks.find(x=>x.id===e.taskId);
    return (e.startH||0)+':'+String(e.startM||0).padStart(2,'0')+' '+(t?.title||'?')+' ('+(e.durMins||45)+'min)';
  }).join(', ') || 'Nothing scheduled';

  const vaultLines=docs.slice(0,15).map(d=>
    '"'+(d.title||'Untitled')+'"'+(d.tags?.length?' ['+d.tags.join(',')+']':'')
  ).join(', ') || 'None';

  const now=new Date();
  const hhmm=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');

  return `You are SECONDS — a blunt, production-savvy AI assistant embedded in V//TEK HANGAR, Ruben "Biggie" Rodas's personal VFX ops system. Biggie is a VFX Compositor/Supervisor at CBFX (Chicken Bone FX). You have full live context of his shows, shots, tasks, and schedule.

VOICE:
- Blunt, minimal, no corporate fluff. Zero pleasantries.
- Lead with the answer. No preamble, no restating the question.
- Short high-velocity sentences. Use unfiltered vocabulary when it fits.
- Act as Chief of Staff / Technical Lead mode — advise, don't ask permission.
- When asked to "plan my day" or similar, give a concrete time-blocked schedule with specific task names, not vague suggestions.
- When asked to review/optimize, call out specific problems with specific shot/task names from the context below.
- Always reference real data from the context. Never fabricate shot codes, task names, or show codes.

TODAY: ${todStr} | NOW: ${hhmm}
WORK HOURS: 9:00-19:00 (default)

═══ SHOWS ═══
${showLines || 'None'}

═══ SHOTS (${shots.length} total) ═══
${shotLines || 'None'}

═══ OPEN TASKS (${tasks.filter(t=>!t.done).length}) ═══
${taskLines || 'None'}

═══ TODAY'S SCHEDULE ═══
${planLines}

═══ VAULT DOCS ═══
${vaultLines}

═══ ACTIONS YOU CAN TRIGGER ═══
At the END of your reply (NEVER in the middle), you may include a JSON block to suggest actions the user can tap to execute:
{"actions":[
  {"type":"add_task","sid":"SHOW_ID","title":"task name","pri":"high","dur":45,"due":"YYYY-MM-DD"},
  {"type":"update_shot","id":"SHOT_ID_OR_CODE","status":"wip|review|approved|blocked|delivered"},
  {"type":"add_note","shotId":"SHOT_ID","note":"text"},
  {"type":"create_vault_note","title":"string","content":"markdown body"}
]}

Rules for actions:
- Only include actions when they're directly actionable and useful. Don't suggest actions for everything.
- Never fabricate IDs. Use show/shot codes from context above; for shot updates, use the shot's code like "CRL_0010_0080".
- For "plan my day" responses, don't include actions — the schedule is a discussion, not an auto-commit.
- Max 5 actions per response.

Respond in crisp markdown. Bold key terms, use short bullet lists for enumerations, and timestamp-prefix time blocks when outlining a schedule.`;
}

// ═══ MESSAGES ═══
function renderMsgText(t){
  const cleaned=(t||'').replace(/\{"actions":\[[\s\S]*?\]\}/g,'').trim();
  // minimal markdown
  let h=cleaned
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*?<\/li>)(\s*<li>.*?<\/li>)+/gs,m=>'<ul>'+m+'</ul>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n(?!<)/g,'<br>');
  return h;
}

function parseActions(text){
  const m=(text||'').match(/\{"actions":\[[\s\S]*?\]\}/);
  if(!m) return [];
  try{const p=JSON.parse(m[0]);return p.actions||[];}catch(e){return [];}
}

function actionLabel(a){
  if(a.type==='add_task') return 'ADD: '+(a.title||'task')+(a.due?' · '+a.due:'');
  if(a.type==='update_shot') return 'UPDATE: '+(a.id||'shot')+' → '+(a.status||'').toUpperCase();
  if(a.type==='add_note') return 'NOTE: '+(a.shotId||'?');
  if(a.type==='create_vault_note') return 'VAULT: '+(a.title||'note');
  return a.type;
}

function renderChips(actions,msgId){
  if(!actions.length) return '';
  let h='<div class="action-chips">';
  actions.forEach((a,i)=>{
    h+='<span class="action-chip" data-mid="'+msgId+'" data-aidx="'+i+'" onclick="execChip(this)">'+escHtml(actionLabel(a))+'</span>';
  });
  h+='</div>';
  return h;
}

function addMsg(role,text,thinking){
  const wrap=document.getElementById('msgs');
  const id='m'+Date.now()+Math.random().toString(36).slice(2,5);
  const ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const div=document.createElement('div');
  div.className='msg '+role;
  div.id=id;
  if(thinking){
    div.innerHTML='<div class="msg-meta">SECONDS</div>'+
      '<div class="msg-bubble"><div class="think"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div></div>';
  } else {
    const meta=role==='user'?'YOU · '+ts:'SECONDS · '+ts;
    const actions=role==='ai'?parseActions(text):[];
    div.innerHTML='<div class="msg-meta">'+meta+'</div>'+
      '<div class="msg-bubble">'+renderMsgText(text)+renderChips(actions,id)+'</div>';
    // stash actions for execChip
    if(actions.length) div.dataset.actions=JSON.stringify(actions);
  }
  wrap.appendChild(div);
  wrap.scrollTo({top:wrap.scrollHeight,behavior:'smooth'});
  return id;
}

function updateMsg(id,text){
  const el=document.getElementById(id);if(!el)return;
  const ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const actions=parseActions(text);
  el.className='msg ai';
  el.innerHTML='<div class="msg-meta">SECONDS · '+ts+'</div>'+
    '<div class="msg-bubble">'+renderMsgText(text)+renderChips(actions,id)+'</div>';
  if(actions.length) el.dataset.actions=JSON.stringify(actions);
  const wrap=document.getElementById('msgs');
  if(wrap) wrap.scrollTo({top:wrap.scrollHeight,behavior:'smooth'});
}

// ═══ EXECUTE CHIPS ═══
function execChip(el){
  const mid=el.dataset.mid;
  const aidx=parseInt(el.dataset.aidx);
  const msg=document.getElementById(mid);
  if(!msg||!msg.dataset.actions) return;
  const actions=JSON.parse(msg.dataset.actions);
  const a=actions[aidx];
  if(!a) return;

  if(a.type==='add_task'){
    const id='t'+Date.now();
    S.tasks=S.tasks||[];
    S.tasks.unshift({
      id,
      sid:a.sid||S.shows[0]?.id||'',
      title:a.title||'Task',
      due:a.due||'',
      pri:a.pri||'med',
      dur:a.dur||45,
      tags:[],
      color:'',
      notes:a.notes||'',
      subtasks:[],
      dep:'',
      done:false,
      expanded:false
    });
    save();toast('TASK LOGGED');
  } else if(a.type==='update_shot'){
    // match by id or code
    const sh=(S.shots||[]).find(s=>s.id===a.id||s.code===a.id);
    if(!sh){toast('SHOT NOT FOUND: '+a.id);return;}
    if(a.status) sh.status=a.status;
    if(a.notes) sh.notes=(sh.notes?sh.notes+'\n':'')+a.notes;
    save();toast('SHOT UPDATED');
  } else if(a.type==='add_note'){
    const sh=(S.shots||[]).find(s=>s.id===a.shotId||s.code===a.shotId);
    if(!sh){toast('SHOT NOT FOUND');return;}
    sh.notes=(sh.notes?sh.notes+'\n':'')+(a.note||'');
    save();toast('NOTE ADDED');
  } else if(a.type==='create_vault_note'){
    S.vaultDocs=S.vaultDocs||[];
    S.vaultDocs.unshift({
      id:'v'+Date.now(),
      title:a.title||'Note from Seconds',
      content:a.content||'',
      showId:S.activeShow||null,
      tags:['seconds'],
      type:'md',
      pinned:false,
      codeLang:'plain',
      checklist:[],
      att:[],
      archived:false,
      archivedAt:0,
      updated:Date.now()
    });
    save();toast('VAULT NOTE CREATED');
  }

  el.classList.add('done');
  el.textContent='✓ '+el.textContent.replace(/^(✓\s)?/,'');
  renderBrief(); // refresh stats
}

// ═══ SEND ═══
async function send(){
  const input=document.getElementById('dock-in');
  const text=(input.value||'').trim();
  if(!text) return;

  const key=getKey();
  if(!key){
    const v=prompt('Anthropic API key (sk-ant-...):','');
    if(v&&v.startsWith('sk-')){localStorage.setItem('vtek_claude_key',v.trim());toast('KEY SAVED');}
    else{toast('NO KEY — tap send again after adding');return;}
  }

  input.value='';
  autoResize(input);
  addMsg('user',text);
  history.push({role:'user',content:text});

  const thinkId=addMsg('ai','',true);
  const sendBtn=document.getElementById('send-btn');
  sendBtn.disabled=true;

  try{
    const model=getModel();
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model,
        max_tokens:2000,
        system:buildContext(),
        messages:history
      })
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({error:{message:res.statusText}}));
      throw new Error(e.error?.message||res.statusText);
    }
    const data=await res.json();
    const reply=data.content?.[0]?.text || '(no response)';
    history.push({role:'assistant',content:reply});
    saveHist();
    updateMsg(thinkId,reply);
    dbg('[INTEL] '+(data.usage?.input_tokens||'?')+'→'+(data.usage?.output_tokens||'?')+' tokens');
  }catch(e){
    updateMsg(thinkId,'⚠ **Error:** '+e.message);
    dbg('[ERR] '+e.message);
  }finally{
    sendBtn.disabled=false;
  }
}

function quickAsk(prompt){
  document.getElementById('dock-in').value=prompt;
  autoResize(document.getElementById('dock-in'));
  send();
}

// ═══ CLEAR ═══
function clearChat(){
  if(!history.length){toast('ALREADY EMPTY');return;}
  if(!confirm('Clear conversation history?'))return;
  history=[];
  saveHist();
  document.getElementById('msgs').innerHTML='';
  renderBrief();
  toast('CLEARED');
}

// ═══ KEY MGMT ═══
function toggleKey(force){
  const b=document.getElementById('key-banner');
  if(force===true){b.classList.add('show');}
  else b.classList.toggle('show');
  if(b.classList.contains('show')){
    const inEl=document.getElementById('key-in');
    inEl.value=getKey();
    setTimeout(()=>inEl.focus(),50);
  }
}
function saveKey(){
  const v=(document.getElementById('key-in').value||'').trim();
  if(!v||!v.startsWith('sk-')){toast('INVALID — must start with sk-');return;}
  localStorage.setItem('vtek_claude_key',v);
  toast('KEY SAVED');
  document.getElementById('key-banner').classList.remove('show');
}

// ═══ VOICE ═══
function toggleMic(){
  if(isListening){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('VOICE UNSUPPORTED');return;}
  recognition=new SR();
  recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  const btn=document.getElementById('mic-btn');
  const input=document.getElementById('dock-in');
  recognition.onstart=()=>{isListening=true;btn.classList.add('listening');toast('LISTENING');};
  recognition.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join('');
    input.value=t;autoResize(input);
  };
  recognition.onend=()=>{isListening=false;btn.classList.remove('listening');if(input.value.trim()) send();};
  recognition.onerror=e=>{isListening=false;btn.classList.remove('listening');if(e.error!=='no-speech')toast('MIC: '+e.error.toUpperCase());};
  recognition.start();
}
function stopMic(){if(recognition)recognition.stop();}

// ═══ INPUT ═══
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
document.getElementById('dock-in').addEventListener('input',function(){autoResize(this);});
document.getElementById('dock-in').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

// ═══ BOOT ═══
function boot(){
  // Set model dropdown
  const saved=getModel();
  const pick=document.getElementById('model-picker');
  if(pick){
    [...pick.options].forEach(o=>{if(o.value===saved)o.selected=true;});
  }

  renderBrief();

  // Replay history
  history.forEach(m=>{
    if(m.role==='user') addMsg('user',m.content);
    else addMsg('ai',m.content);
  });

  // Refresh briefing state every 5s
  setInterval(()=>{
    const fresh=JSON.parse(localStorage.getItem(LS)||'null');
    if(fresh){S=fresh;renderBrief();}
  },5000);

  // Long-press message area to clear chat
  let _clrTimer=null;
  const msgsEl=document.getElementById('msgs');
  if(msgsEl){
    msgsEl.addEventListener('touchstart',()=>{_clrTimer=setTimeout(()=>{if(confirm('Clear conversation?')){history=[];saveHist();msgsEl.innerHTML='';renderBrief();toast('CLEARED');}},800);},{passive:true});
    msgsEl.addEventListener('touchend',()=>clearTimeout(_clrTimer),{passive:true});
    msgsEl.addEventListener('touchmove',()=>clearTimeout(_clrTimer),{passive:true});
  }

  dbg('[INIT] '+BUILD_ID+' | key='+(getKey()?'SET':'MISSING')+' | model='+getModel().split('-')[1].toUpperCase()+' | hist='+history.length);
}
boot();
</script>
